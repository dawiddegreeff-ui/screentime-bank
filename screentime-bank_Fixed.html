function rWallet(){
  const c=child(childId);
  const rate=c.pointsPerRand||10;
  const owed=Math.max(0,c.walletBalance||0);
  const bonusPts=c.bonusPts||0;
  const totalEarned=getTotalEarned(childId);
  const totalPaidOut=getTotalPaidOut(childId);
  const weekEarned=getWeeklyEarned(childId);
  const weekRemaining=Math.max(0,(c.weeklyBudget||0)-weekEarned);
  const minPayout=c.minPayoutBalance||20;
  const canRequestPayout=owed>=minPayout;
  // Pending payout requests
  const pendingRequest=D.log.find(l=>l.childId===childId&&l.type==='payout-request'&&l.status==='pending');
  // Transaction history
  const txs=D.log.filter(l=>l.childId===childId&&
    ['pocket-money','physical-payout','bonus-to-cash','payout-request','goal-money','goal-parent-match'].includes(l.type)
  ).slice(0,30);
  return`<div class="header">
    <button class="back-btn" data-a="go-back">←</button>
    <h2>💰 My Wallet</h2>
    <div class="balance-chip">🌟 ${bonusPts}</div>
  </div>
  <!-- LEDGER SUMMARY -->
  <div class="card" style="background:linear-gradient(135deg,#065F46,#047857)">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:12px">
      <div style="text-align:center;padding:4px 0">
        <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.7;font-weight:700">Total Earned</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff">R${totalEarned.toFixed(2)}</div>
        <div style="font-size:.67rem;opacity:.65">pocket money + bonus</div>
      </div>
      <div style="text-align:center;padding:4px 0;border-left:1px solid rgba(255,255,255,.2)">
        <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.7;font-weight:700">Paid Out</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff">R${totalPaidOut.toFixed(2)}</div>
        <div style="font-size:.67rem;opacity:.65">bank transfer + cash</div>
      </div>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,.2);padding-top:12px;text-align:center">
      <div style="font-size:.7rem;opacity:.8;font-weight:700;text-transform:uppercase;letter-spacing:1px">Pocket Money Savings</div>
      <div style="font-family:'Fredoka One',cursive;font-size:2.4rem;color:${owed>0?'#FCD34D':'#6EE7B7'}">R${owed.toFixed(2)}</div>
      <div style="font-size:.75rem;opacity:.8">${owed>=minPayout?'✅ Ready to request payout!':owed>0?`R${(minPayout-owed).toFixed(2)} more until you can request payout`:'All paid up!'}</div>
    </div>
  </div>
  <!-- PAYOUT REQUEST -->
  <div class="card">
    <div style="font-weight:800;margin-bottom:6px">💸 Request Payout</div>
    <div style="font-size:.82rem;color:var(--muted);margin-bottom:10px">
      Payout sent via <strong style="color:var(--text)">${c.preferredPayMethod||'Bank transfer'}</strong>
      ${c.bankAccount?`to <strong style="color:var(--text)">${c.bankAccount}</strong>`:''}
      · Min: <strong style="color:var(--text)">R${minPayout.toFixed(2)}</strong>
    </div>
    ${pendingRequest?`<div style="background:rgba(245,158,11,.08);border:1px solid var(--gold)44;border-radius:10px;padding:9px 12px;font-size:.85rem;font-weight:700;color:var(--gold)">
      ⏳ Payout request of R${(pendingRequest.amount||0).toFixed(2)} is waiting for parent approval
    </div>`
    :canRequestPayout?`<button class="btn btn-success btn-full" data-a="request-payout" data-cid="${childId}">
      💸 Request R${owed.toFixed(2)} Payout
    </button>`
    :`<div style="background:var(--card2);border-radius:10px;padding:9px 12px;font-size:.83rem;color:var(--muted)">
      Save R${(minPayout-owed).toFixed(2)} more pocket money to unlock payout request
      <div style="height:5px;background:var(--border);border-radius:3px;margin-top:7px">
        <div style="height:5px;border-radius:3px;background:var(--gold);width:${Math.min(100,Math.round(owed/minPayout*100))}%"></div>
      </div>
    </div>`}
  </div>
  <!-- BONUS POINTS → POCKET MONEY -->
  ${bonusPts>0?`<div class="card" style="border-color:var(--gold)44;background:rgba(245,158,11,.04)">
    <div style="font-weight:800;margin-bottom:6px">🌟 Convert Bonus Points to Pocket Money</div>
    <div style="font-size:.82rem;color:var(--muted);margin-bottom:10px">
      You have <strong style="color:var(--gold)">${bonusPts} bonus pts</strong> = R${(bonusPts/rate).toFixed(2)} value · No parent approval needed!
    </div>
    <div class="row" style="gap:10px;margin-bottom:8px">
      <input type="number" class="form-input" id="bonus-convert-pts" value="${bonusPts}" min="1" max="${bonusPts}" step="${rate}">
      <span style="font-size:.88rem;color:var(--muted);white-space:nowrap" id="bonus-convert-preview">= R${(bonusPts/rate).toFixed(2)}</span>
    </div>
    <button class="btn btn-primary btn-full" data-a="convert-bonus-to-cash" data-cid="${childId}">🌟 Convert to Pocket Money</button>
  </div>`:''}
  <!-- TRANSACTION HISTORY -->
  ${txs.length?`<div class="sec-title">📋 Transaction History</div>
  <div>${txs.map(t=>{
    const isPayout=t.type==='physical-payout';
    const isPending=t.status==='pending';
    const isGoalMatch=t.type==='goal-parent-match';
    const isGoalMoney=t.type==='goal-money';
    const isBonus=t.type==='bonus-to-cash';
    const isRequest=t.type==='payout-request';
    let amtColor=isPayout||isGoalMoney?'var(--danger)':isPending?'var(--gold)':'var(--success)';
    let sign=isPayout||isGoalMoney?'-':'+';
    return`<div class="log-item">
      <div class="log-icon" style="background:${isPayout?'rgba(16,185,129,.15)':isBonus?'rgba(245,158,11,.15)':isPending?'rgba(245,158,11,.1)':'rgba(96,165,250,.12)'}">${t.emoji}</div>
      <div style="flex:1;min-width:0">
        <div class="log-name">${t.actName}</div>
        <div class="log-meta">${fmtTime(t.ts)}${t.method?' · '+t.method:''}</div>
      </div>
      ${t.amount!=null?`<div style="font-weight:900;text-align:right">
        <div style="color:${amtColor}">${sign}R${(t.amount||0).toFixed(2)}</div>
        <div style="font-size:.65rem;color:${isPending?'var(--gold)':'var(--muted)'}">
          ${isPayout?'paid':isPending?'⏳ pending':isGoalMoney?'to goal':isGoalMatch?'matched':isBonus?'bonus':'earned'}
        </div>
      </div>`:''}
    </div>`;
  }).join('')}</div>`:''}`;
}

      <div><label class="form-label">Goal Name</label><input type="text" class="form-input" id="goal-name" placeholder="e.g. Hair dye, Room makeover…"></div>
    </div>
    <div style="margin-bottom:4px">
      <label class="form-label">How much does it cost? (R)</label>
      <input type="number" class="form-input" id="goal-rand" value="50" min="1" step="5" placeholder="e.g. 150" oninput="const p=document.getElementById('goal-pts-preview');if(p){const r=${rate};p.textContent='= '+Math.ceil(this.value*r)+' pts needed ('+r+' pts = R1)'}">
    </div>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:12px" id="goal-pts-preview">
      = ${Math.ceil(50*rate)} pts needed (${rate} pts = R1)
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" data-a="save-goal">💾 Create Goal</button>
      <button class="btn btn-ghost" data-a="cancel-edit">Cancel</button>
    </div>
  </div>`:'';
  return`<div class="header">
    <button class="back-btn" data-a="go-back">←</button>
    <h2>🎯 My Goals</h2>
    <div class="balance-chip">🪙 ${c.points}</div>
  </div>
  <!-- BONUS POINTS BALANCE -->
  ${bonusPts>0?`<div class="card" style="border-color:var(--gold)44;background:rgba(245,158,11,.06)">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:1.6rem">🌟</span>
      <div style="flex:1">
        <div style="font-weight:800">Bonus Points Available</div>
        <div style="font-size:.8rem;color:var(--muted)">Use these toward goals (no screen time / cashout)</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--gold)">${bonusPts}</div>
        <div style="font-size:.68rem;color:var(--muted)">= R${(bonusPts/rate).toFixed(2)} value</div>
      </div>
    </div>
  </div>`:''}
  <div style="margin:12px 14px 4px;display:flex;align-items:center;justify-content:space-between">
    <div style="font-weight:800">${active.length?'Active Goals':'No goals yet!'}</div>
    <button class="btn btn-primary" style="padding:6px 13px;font-size:.78rem" data-a="add-goal">+ Add Goal</button>
  </div>
  ${active.map(g=>{
    const targetPts=goalTargetPts(g,c);
    const targetRand=g.targetRand||(targetPts/rate);
    const totalSaved=goalTotalSaved(g,c);
    const childMoney=g.childMoneySaved||0;
    const parentMatch=g.parentMatched||0;
    const bonusPtsSaved=g.bonusPtsSaved||0;
    const bonusRand=bonusPtsSaved/rate;
    const pct=Math.min(100,Math.round(totalSaved/targetPts*100));
    const remainPts=Math.max(0,targetPts-totalSaved);
    const remainRand=(remainPts/rate);
    return`<div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <div style="font-size:2rem">${g.emoji}</div>
        <div style="flex:1">
          <div style="font-weight:900;font-size:1rem">${g.name}</div>
          <div style="margin-top:2px">
            <span style="font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--gold)">R${targetRand.toFixed(2)}</span>
            <span style="font-size:.75rem;color:var(--muted);margin-left:4px">goal</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:900;font-size:1.2rem;color:${pct>=100?'var(--success)':'var(--text)'}">${pct}%</div>
          <div style="font-size:.7rem;color:var(--muted)">R${(totalSaved/rate).toFixed(2)} saved</div>
        </div>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;margin-bottom:8px">
        <div style="height:8px;border-radius:4px;background:linear-gradient(90deg,var(--gold),#FF6B6B);width:${pct}%;transition:width .5s"></div>
      </div>
      <!-- BREAKDOWN -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;font-size:.72rem;text-align:center">
        <div style="background:var(--card2);border-radius:8px;padding:5px">
          <div style="color:var(--muted)">💰 You saved</div>
          <div style="font-weight:800;color:var(--success)">R${childMoney.toFixed(2)}</div>
        </div>
        <div style="background:var(--card2);border-radius:8px;padding:5px">
          <div style="color:var(--muted)">🤝 Parent match</div>
          <div style="font-weight:800;color:#60A5FA">R${parentMatch.toFixed(2)}</div>
        </div>
        <div style="background:var(--card2);border-radius:8px;padding:5px">
          <div style="color:var(--muted)">🌟 Bonus pts</div>
          <div style="font-weight:800;color:var(--gold)">${bonusPtsSaved>0?'R'+bonusRand.toFixed(2):'—'}</div>
        </div>
      </div>
      ${remainPts>0?`<div style="font-size:.75rem;color:var(--muted);margin-bottom:10px;text-align:center">
        R${remainRand.toFixed(2)} still needed · ${remainPts} pts equivalent
      </div>`:''}
      <div style="display:flex;gap:7px">
        ${bonusPts>0?`<button class="btn btn-primary" style="flex:1;padding:8px;font-size:.8rem" data-a="open-goal-save" data-gid="${g.id}">🌟 Bonus Pts</button>`
          :`<button class="btn btn-ghost" style="flex:1;padding:8px;font-size:.8rem" disabled>🌟 No bonus pts</button>`}
        ${(c.walletBalance||0)>0?`<button class="btn btn-success" style="flex:1;padding:8px;font-size:.8rem" data-a="open-goal-money" data-gid="${g.id}">💰 Save Money</button>`
          :`<button class="btn btn-ghost" style="flex:1;padding:8px;font-size:.8rem" disabled>💰 No wallet</button>`}
        <button class="icon-btn" style="color:var(--danger)" data-a="del-goal" data-gid="${g.id}">🗑</button>
      </div>
    </div>`;
  }).join('')}
  ${addForm}
  ${!active.length&&!done.length?`<div class="empty-state"><div class="icon">🎯</div><p>Set a savings goal to get started!<br><span style="font-size:.85rem">Hair dye? Room makeover? A trip?</span></p></div>`:''}
  ${done.length?`<div class="sec-title">🏆 Completed Goals</div>
  ${done.map(g=>{
    const tp=goalTargetPts(g,c);
    const tr=g.targetRand||(tp/rate);
    return`<div class="card" style="opacity:.8;border-color:var(--success)44">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:1.6rem">${g.emoji}</div>
        <div style="flex:1">
          <div style="font-weight:800;font-size:.9rem">${g.name}</div>
          <div style="font-size:.75rem;color:var(--success)">✅ R${tr.toFixed(2)} goal reached!</div>
          <div style="font-size:.7rem;color:var(--muted)">💰 R${(g.childMoneySaved||0).toFixed(2)} · 🤝 R${(g.parentMatched||0).toFixed(2)} · 🌟 ${g.bonusPtsSaved||0} pts</div>
        </div>
      </div>
    </div>`;
  }).join('')}`:''}`;
}

// WEEKLY REVIEW (PARENT)

function rWeeklyReview(){
  const ws=getWeekStart();
  const wsLabel=ws.toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
  const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const FULL_DAY_NAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const todayDayNum=new Date().getDay();
  return`<div style="padding:10px 14px 4px;font-size:.8rem;color:var(--muted)">Week of ${wsLabel} · Today: ${FULL_DAY_NAMES[todayDayNum]}</div>
  ${D.children.map(c=>{
    const stats=getWeekStats(c.id);
    const pm=getWeeklyPocketMoneySuggestion(c.id);
    const weekEarned=getWeeklyEarned(c.id);
    const budgetRemaining=Math.max(0,(c.weeklyBudget||0)-weekEarned);
    const maxPM=Math.min(pm.suggested,budgetRemaining);
    const owed=c.walletBalance||0;
    const isPayday=isPocketMoneyDay(c);
    const notPayday=!isPayday;
    const paydayName=FULL_DAY_NAMES[c.pocketMoneyDay??5];
    // Find most recent reversible payout (within 24hrs)
    const recentPayout=D.log.find(l=>l.childId===c.id&&l.type==='pocket-money'&&l.pairId&&
      (Date.now()-new Date(l.ts).getTime())<24*60*60*1000);
    return`<div class="card">
      <!-- CHILD HEADER -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:${c.bg};flex-shrink:0">${c.emoji}</div>
        <div style="flex:1">
          <div style="font-weight:900;font-size:1.05rem">${c.name}</div>
          <div style="font-size:.75rem;color:var(--muted)">
            🪙 ${c.points} pts ·
            <span style="color:${owed>0?'var(--gold)':'var(--muted)'}">Owed: R${owed.toFixed(2)}</span>
          </div>
        </div>
        ${isPayday?`<span style="background:rgba(16,185,129,.2);color:#6EE7B7;font-size:.72rem;font-weight:800;padding:3px 9px;border-radius:50px">🎉 Payday!</span>`:''}
      </div>
      <!-- WEEK PROGRESS: active days -->
      <div style="background:var(--card2);border-radius:10px;padding:9px 12px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:6px">
          <span>📅 ACTIVITY THIS WEEK</span>
          <span style="color:${pm.activeDays>=(pm.minDays||4)?'var(--success)':'var(--gold)'}">
            ${pm.activeDays} / 7 active days
            ${pm.activeDays>=(pm.minDays||4)?'✅':'(min ${pm.minDays} needed)'}
          </span>
        </div>
        <div style="display:flex;gap:4px">
          ${['M','T','W','T','F','S','S'].map((d,i)=>{
            const dayIndex=[1,2,3,4,5,6,0][i]; // Mon-Sun
            const wsd=new Date(ws);wsd.setDate(wsd.getDate()+i);
            const dayStr=wsd.toDateString();
            const hasActivity=D.log.some(l=>l.childId===c.id&&
              (l.type==='earn'||l.type==='session-school')&&
              l.status==='approved'&&new Date(l.ts).toDateString()===dayStr);
            const isToday=new Date().toDateString()===dayStr;
            const isPast=wsd<=new Date();
            return`<div style="flex:1;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;
              background:${hasActivity?'rgba(16,185,129,.25)':isPast?'rgba(239,68,68,.12)':'var(--border)'};
              color:${hasActivity?'var(--success)':isPast?'var(--danger)':'var(--muted)'};
              border:${isToday?'2px solid var(--gold)':'1px solid transparent'}">
              ${hasActivity?'✓':isPast?'○':d}</div>`;
          }).join('')}
        </div>
      </div>
      <!-- DAILY ALLOWANCE -->
      ${(()=>{
        const da=getDailyStewardshipSuggestion(c.id);
        const today=new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'short'});
        return`<div style="background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.25);border-radius:10px;padding:11px 13px;margin-bottom:12px">
          <div style="font-size:.72rem;font-weight:800;color:#60A5FA;margin-bottom:6px">📅 DAILY ALLOWANCE · ${today}</div>
          <div style="font-size:.8rem;color:var(--muted);margin-bottom:8px">
            Daily cap: <strong style="color:var(--text)">R${da.cap.toFixed(2)}</strong> (R${c.weeklyBudget||0}÷7)
            ${da.alreadyPaid>0?` · Paid today: <strong style="color:var(--success)">R${da.alreadyPaid.toFixed(2)}</strong>`:''}
            · Remaining: <strong style="color:${da.remaining<=0?'var(--danger)':'var(--text)'}">R${da.remaining.toFixed(2)}</strong>
          </div>
          ${da.canAssign?`<div style="display:grid;grid-template-columns:80px 1fr auto;gap:8px;align-items:end">
            <div><label class="form-label">Amount (R)</label>
              <input type="number" class="form-input" id="da-amt-${c.id}" value="${da.suggested.toFixed(2)}" min="0" max="${da.remaining.toFixed(2)}" step="0.5"></div>
            <div style="font-size:.72rem;color:var(--muted)">Suggested: <strong style="color:#60A5FA">R${da.suggested.toFixed(2)}</strong> based on today's stewardship score (${da.scorePct||pm.pct}%)</div>
            <button class="btn btn-primary" style="padding:9px 14px;white-space:nowrap" data-a="pay-daily-allowance" data-cid="${c.id}">💰 Assign</button>
          </div>`:`<div style="font-size:.83rem;color:var(--muted)">Daily cap of R${da.cap.toFixed(2)} reached for today</div>`}
        </div>`;
      })()}
      <!-- WEEK STATS -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px">
        <div style="text-align:center;background:var(--card2);border-radius:10px;padding:8px 4px">
          <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--gold)">${stats.weekPts}</div>
          <div style="font-size:.64rem;color:var(--muted)">pts earned</div>
        </div>
        <div style="text-align:center;background:var(--card2);border-radius:10px;padding:8px 4px">
          <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#60A5FA">${stats.weekSchoolMins||0}</div>
          <div style="font-size:.64rem;color:var(--muted)">school min</div>
        </div>
        <div style="text-align:center;background:var(--card2);border-radius:10px;padding:8px 4px">
          <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--success)">${stats.cleanDays}</div>
          <div style="font-size:.64rem;color:var(--muted)">clean days</div>
        </div>
        <div style="text-align:center;background:var(--card2);border-radius:10px;padding:8px 4px">
          <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:${stats.penaltyDays?'var(--danger)':'var(--success)'}">${stats.penaltyDays}</div>
          <div style="font-size:.64rem;color:var(--muted)">overtime</div>
        </div>
      </div>
      <!-- STEWARDSHIP BREAKDOWN -->
      <div style="background:var(--card2);border-radius:10px;padding:10px 12px;margin-bottom:12px">
        <div style="font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:8px">📊 STEWARDSHIP · ${pm.pct}% score · Day ${pm.daysElapsed}/7</div>
        ${[
          {lbl:'🌿 Device stewardship',pct:pm.stewardPct,color:'var(--success)'},
          {lbl:'📅 Active day spread (${pm.activeDays}/7 days)',pct:pm.balPct,color:'var(--gold)'},
          {lbl:'⏱️ No overtime',pct:pm.noOTPct,color:'#60A5FA'},
          {lbl:'🎓 School goal',pct:pm.schoolPct,color:'#A78BFA'},
        ].map(row=>`<div style="margin-bottom:5px">
          <div style="display:flex;justify-content:space-between;font-size:.73rem;margin-bottom:2px">
            <span>${row.lbl}</span><span style="font-weight:800;color:${row.color}">${row.pct}%</span>
          </div>
          <div style="height:4px;background:var(--border);border-radius:2px">
            <div style="height:4px;border-radius:2px;background:${row.color};width:${row.pct}%"></div>
          </div>
        </div>`).join('')}
      </div>
      <!-- POCKET MONEY PAYOUT -->
      <div style="background:${pm.canPayout?'rgba(16,185,129,.07)':'rgba(100,116,139,.07)'};border:1px solid ${pm.canPayout?'var(--success)44':'var(--border)'};border-radius:10px;padding:12px;margin-bottom:${owed>0?'10px':'0'}">
        <div style="font-size:.72rem;font-weight:800;color:${pm.canPayout?'var(--success)':'var(--muted)'};margin-bottom:6px">
          💰 POCKET MONEY · ${paydayName}s · Budget: R${pm.budget}
        </div>
        <!-- ACTIVE DAYS GATE -->
        ${!pm.canPayout?`<div style="background:rgba(245,158,11,.1);border:1px solid var(--gold)44;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:.82rem">
          ⏳ <strong style="color:var(--gold)">${pm.activeDays} of ${pm.minDays} required active days reached.</strong>
          Payout unlocks when ${c.name} has been active on at least ${pm.minDays} days this week.
          <div style="font-size:.72rem;color:var(--muted);margin-top:3px">You can override below if needed.</div>
        </div>`:''}
        <!-- PAYDAY WARNING -->
        ${notPayday&&pm.canPayout?`<div style="background:rgba(245,158,11,.08);border:1px solid var(--gold)33;border-radius:8px;padding:7px 10px;margin-bottom:10px;font-size:.78rem;color:var(--muted)">
          📅 Scheduled payday is <strong style="color:var(--text)">${paydayName}</strong> — paying now is off-schedule.
        </div>`:''}
        <!-- SCALED SUGGESTION -->
        ${pm.budget>0?`<div style="font-size:.82rem;color:var(--muted);margin-bottom:10px">
          ${pm.canPayout?`Suggested: <strong style="color:var(--gold)">R${pm.suggested.toFixed(2)}</strong>
          <span style="font-size:.72rem"> · Day ${pm.daysElapsed}/7 · ${pm.dayScale}% of week elapsed · ${pm.pct}% stewardship score</span>`
          :`<em>Suggestion available after ${pm.minDays} active days</em>`}
          ${weekEarned>0?` · Paid this week: <strong style="color:var(--success)">R${weekEarned.toFixed(2)}</strong>`:''}
          · Available: <strong style="color:${budgetRemaining<=0?'var(--danger)':'var(--text)'}">R${budgetRemaining.toFixed(2)}</strong>
        </div>`:''}
        ${budgetRemaining>0?`<div>
          <div style="display:grid;grid-template-columns:90px 1fr auto;gap:8px;margin-bottom:8px;align-items:end">
            <div>
              <label class="form-label">Amount (R)</label>
              <input type="number" class="form-input" id="pm-amount-${c.id}" value="${Math.max(0,maxPM).toFixed(2)}" min="0" max="${budgetRemaining.toFixed(2)}" step="0.5">
            </div>
            <div>
              <label class="form-label">Method</label>
              <select class="rate-sel" id="pm-method-${c.id}" style="width:100%">
                <option value="Cash">💵 Cash</option>
                <option value="Bank transfer">🏦 Bank transfer</option>
              </select>
            </div>
            <button class="btn ${pm.canPayout&&isPayday?'btn-success':'btn-primary'}" style="padding:9px 12px;white-space:nowrap"
              data-a="do-pocket-money" data-cid="${c.id}">💰 Pay</button>
          </div>
          ${(c.goals||[]).filter(g=>!g.completedAt).length?`<div style="margin-top:6px">
            <label class="form-label">Or save toward a goal instead (parent matches!)</label>
            <div style="display:grid;grid-template-columns:80px 1fr auto;gap:8px;align-items:end">
              <input type="number" class="form-input" id="pm-goal-amt-${c.id}" value="0" min="0" max="${budgetRemaining.toFixed(2)}" step="0.5" placeholder="R">
              <select class="rate-sel" id="pm-goal-sel-${c.id}" style="width:100%">
                ${(c.goals||[]).filter(g=>!g.completedAt).map(g=>`<option value="${g.id}">${g.emoji} ${g.name}</option>`).join('')}
              </select>
              <button class="btn btn-primary" style="padding:9px 10px;font-size:.78rem" data-a="do-pm-goal-save" data-cid="${c.id}">🤝 Save</button>
            </div>
          </div>`:''}
        </div>`:`<div style="font-size:.83rem;color:var(--danger);font-weight:700">Weekly budget reached</div>`}
        <!-- RECENT REVERSAL -->
        ${recentPayout?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:.78rem">
          <span style="color:var(--muted)">Last payout: <strong style="color:var(--text)">R${(recentPayout.amount||0).toFixed(2)}</strong> ${fmtTime(recentPayout.ts)}</span>
          <button class="btn btn-ghost" style="padding:5px 10px;font-size:.74rem;color:var(--danger);border-color:var(--danger)44" data-a="reverse-payout" data-pid="${recentPayout.pairId}">↩ Reverse</button>
        </div>`:''}
      </div>
      <!-- OUTSTANDING OWED BALANCE -->
      ${owed>0?`<div style="background:rgba(245,158,11,.07);border:1px solid var(--gold)44;border-radius:10px;padding:12px">
        <div style="font-size:.72rem;font-weight:800;color:var(--gold);margin-bottom:8px">💸 PAY OUT OWED BALANCE · R${owed.toFixed(2)}</div>
        <div style="font-size:.78rem;color:var(--muted);margin-bottom:10px">From approved cashouts not yet physically paid</div>
        <div style="display:grid;grid-template-columns:90px 1fr auto;gap:8px;align-items:end">
          <div>
            <label class="form-label">Amount (R)</label>
            <input type="number" class="form-input" id="pay-amount-${c.id}" value="${owed.toFixed(2)}" min="0.50" max="${owed.toFixed(2)}" step="0.5">
          </div>
          <div>
            <label class="form-label">Method</label>
            <select class="rate-sel" id="pay-method-${c.id}" style="width:100%">
              <option value="Cash">💵 Cash</option>
              <option value="Bank transfer">🏦 Bank transfer</option>
            </select>
          </div>
          <button class="btn btn-primary" style="padding:9px 12px;white-space:nowrap" data-a="do-pay-owed" data-cid="${c.id}">💸 Pay</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('')}`;
}

function rGoalSaveModal(){
  if(!pendingGoalSave)return'';
  const c=child(childId);
  const goal=c.goals.find(g=>g.id===pendingGoalSave.gid);
  if(!goal)return'';
  const rate=c.pointsPerRand||10;
  const bonusPts=c.bonusPts||0;
  const targetPts=goalTargetPts(goal,c);
  const totalSaved=goalTotalSaved(goal,c);
  const remainPts=Math.max(0,targetPts-totalSaved);

let _emailjsLoaded=false;
function loadEmailJS(){
  if(_emailjsLoaded)return Promise.resolve();
  return new Promise(res=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
    s.onload=()=>{_emailjsLoaded=true;res();};
    s.onerror=()=>{console.warn('EmailJS failed to load');res();};
    document.head.appendChild(s);
  });
}

function playChime(){
  if(!D?.settings?.notifChime)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Two-tone chime: pleasant and distinct
    [[523,0],[659,0.15],[784,0.3]].forEach(([freq,delay])=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(0,ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+delay+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.6);
      osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+0.6);
    });
  }catch(e){}
}

async function sendEmailNotif(title,body){
  if(!D?.settings?.notifEmail2)return;
  const s=D.settings;
  if(!s.notifEmail||!s.emailjsServiceId||!s.emailjsTemplateId||!s.emailjsPublicKey)return;
  await loadEmailJS();
  if(!window.emailjs)return;
  try{
    emailjs.init({publicKey:s.emailjsPublicKey});
    await emailjs.send(s.emailjsServiceId,s.emailjsTemplateId,{
      to_email:s.notifEmail,
      subject:title,
      message:body,
      app_url:s.appUrl||window.location.href
    });
  }catch(e){console.warn('EmailJS error:',e);}
}

function sendBrowserNotif(title,body){
  if(!D?.settings?.notifBrowser)return;
  if(!('Notification' in window))return;
  const show=()=>{
    try{new Notification(title,{body,icon:'',tag:'screentime-bank'});}catch(e){}
  };
  if(Notification.permission==='granted'){show();}
  else if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted')show();});
  }
}

function notify(title,body){
  playChime();
  sendBrowserNotif(title,body);
  sendEmailNotif(title,body);
}

  else if(a==='cancel-flag'){if(e.target===el){pendingFlagTimer=null;render();}}
  else if(a==='close-flag'){pendingFlagTimer=null;render();}
  else if(a==='open-activity-timer'){
    pendingActivityTimer={cid:el.dataset.cid||childId};render();
  }
  else if(a==='cancel-activity-timer'){if(e.target===el){pendingActivityTimer=null;render();}}
  else if(a==='close-activity-timer'){pendingActivityTimer=null;render();}
  else if(a==='pick-activity-timer'){
    startActivityTimer(el.dataset.cid||childId,el.dataset.aid);
    pendingActivityTimer=null;render();
  }
  else if(a==='stop-activity-timer'){
    stopActivityTimer(el.dataset.cid||childId);
  }
  else if(a==='submit-flag'){
    if(!pendingFlagTimer)return;
    const actualMins=parseInt(document.getElementById('flag-actual-mins')?.value)||0;
    const{cid,sessionSecs,type}=pendingFlagTimer;
    const runMins=Math.round(sessionSecs/60);
    D.log.unshift({id:uid(),childId:cid,type:'timer-flag',
      actName:`🚩 Timer flag: ${type==='school'?'School':'Recreation'} ran ${runMins} min, actual: ${actualMins} min`,
      emoji:'🚩',points:0,runMins,actualMins,timerType:type,status:'pending',
      ts:new Date().toISOString()});
    // Stop the timer using the actual time
    const c=child(cid);
    const today=new Date().toISOString().split('T')[0];
    if(type==='school'&&c.timer){
      if(c.schoolDailyAccumDate!==today){c.schoolDailyAccum=0;c.schoolDailyAccumDate=today;}
      // Adjust accum to use actual mins instead of full elapsed
      const overcount=runMins-actualMins;
      c.schoolDailyAccum=Math.max(0,(c.schoolDailyAccum||0)-overcount+actualMins);
      c.timer=null;
    }
    save();
    const cn=child(cid)?.name||'A child';
    notify(`🚩 ${cn} flagged a timer issue`,
      `${cn} says their ${type} timer ran ${runMins} min but they were actually on it for ${actualMins} min. Open ScreenTime Bank to review.`);
    toast('🚩 Flagged! Parent will review the timer');
    pendingFlagTimer=null;render();
  }
  else if(a==='submit-post-school'){
    if(!pendingPostSchool)return;
    const chips=[...document.querySelectorAll('[data-group="school"].active')].map(b=>b.textContent);
    const other=document.getElementById('school-other')?.value?.trim();
    if(other)chips.push(other);
    logSchoolSession(pendingPostSchool.cid,pendingPostSchool.durationMins,chips);
    pendingPostSchool=null;render();
  }
  else if(a==='submit-post-rec'){
    if(!pendingPostRec)return;
    const chips=[...document.querySelectorAll('[data-group="rec"].active')].map(b=>b.textContent);
    const other=document.getElementById('rec-other')?.value?.trim();
    if(other)chips.push(other);
    if(chips.length)logRecSession(pendingPostRec.cid,chips);
    pendingPostRec=null;render();
  }
  else if(a==='pick-school-direct'){
    startSessionWithType(el.dataset.cid,'school');
  }
  else if(a==='reset-child'){
    if(!confirm(`Reset ${child(el.dataset.cid)?.name}? This clears all their points, timer and history.`))return;
    resetChild(el.dataset.cid);
  }
  else if(a==='reset-all'){
    if(!confirm('Reset ALL children? This clears all points, timers and history for everyone.'))return;
    resetAll();
  }
  else if(a==='pin'){
    if(pinBuf.length>=4)return;
    pinBuf+=el.dataset.d;
    if(pinBuf.length===4){
      if(pinBuf===D.settings.pin){view='parent';parentTab='approvals';}
      else{pinBuf='';toast('❌ Wrong PIN');}
    }
    render();
  }
  else if(a==='pin-del'){pinBuf=pinBuf.slice(0,-1);render();}
  else if(a==='ptab'){parentTab=el.dataset.tab;editMode={type:null,id:null};render();}
  else if(a==='approve'){approve(el.dataset.lid);}
  else if(a==='reject'){reject(el.dataset.lid);}
  else if(a==='approve-all'){
    const pend=allPending();
    pend.forEach(p=>{
      const c=child(p.childId);p.status='approved';
      if(isBonus(p)){c.bonusPts=(c.bonusPts||0)+p.points;}
      else{c.points+=(p.points||0);if(p.bonusPoints)c.bonusPts=(c.bonusPts||0)+p.bonusPoints;tryAwardDailyBalanceBonus(p.childId);}
    });
    save();toast(`✅ Approved all ${pend.length} activities!`);render();
  }
  else if(a==='approve-all-child'){
    const cid=el.dataset.cid;
    const pend=allPending().filter(p=>p.childId===cid);
    const c=child(cid);let bonusTotal=0,ptsTotal=0;
    pend.forEach(p=>{
      p.status='approved';
      if(isBonus(p)){c.bonusPts=(c.bonusPts||0)+p.points;bonusTotal+=p.points;}
      else{c.points+=(p.points||0);ptsTotal+=p.points||0;if(p.bonusPoints){c.bonusPts=(c.bonusPts||0)+p.bonusPoints;bonusTotal+=p.bonusPoints;}}
    });
    tryAwardDailyBalanceBonus(cid);
    save();toast(`✅ Approved all for ${c.name}${ptsTotal?` +${ptsTotal}pts`:''}${bonusTotal?` +${bonusTotal}🌟`:''}`);render();
  }
  else if(a==='setadj-type'){adjVals[el.dataset.cid+'_type']=el.dataset.val;render();}
  else if(a==='addpts'){
    const cid=el.dataset.cid;
    const pts=parseInt(document.querySelector(`[data-a="setadj"][data-cid="${cid}"]`)?.value)||10;
    const type=adjVals[cid+'_type']||'regular';
    adjust(cid,pts,type);
  }
  else if(a==='subpts'){
    const cid=el.dataset.cid;
    const pts=parseInt(document.querySelector(`[data-a="setadj"][data-cid="${cid}"]`)?.value)||10;
    adjust(cid,-pts,'regular');
  }
  // Activity CRUD
  else if(a==='add-act'){editMode={type:'activity',id:null};render();}
  else if(a==='edit-act'){editMode={type:'activity',id:el.dataset.aid};render();}
  else if(a==='del-act'){
    if(!confirm('Delete this activity?'))return;
    D.activities=D.activities.filter(x=>x.id!==el.dataset.aid);
    D.children.forEach(c=>{c.requirements=c.requirements.filter(r=>r!==el.dataset.aid);});
    save();toast('Deleted');render();
  }
  else if(a==='save-act'){
    const name=document.getElementById('aname')?.value?.trim();
    const emoji=document.getElementById('aemoji')?.value?.trim()||'⭐';
    const pts=parseInt(document.getElementById('apts')?.value)||0;
    const bonusPoints=parseInt(document.getElementById('abonuspts')?.value)||0;
    const minMins=parseInt(document.getElementById('aminmins')?.value)||0;
    const bonusIntervalMins=parseInt(document.getElementById('abonusinterval')?.value)||10;
    const cat=document.getElementById('acat')?.value||'cat-general';
    const approval=document.getElementById('aapproval')?.checked!==false;
    if(!name){toast('Please enter a name');return;}
    if(editMode.id)Object.assign(D.activities.find(x=>x.id===editMode.id),{name,emoji,points:pts,bonusPoints,minMins,bonusIntervalMins,cat,approval});
    else D.activities.push({id:uid(),name,emoji,points:pts,bonusPoints,minMins,bonusIntervalMins,cat,approval});
    editMode={type:null,id:null};save();toast('Saved ✅');render();
  }
  else if(a==='cancel-edit'){editMode={type:null,id:null};render();}
  // Category CRUD
  else if(a==='add-cat'){editMode={type:'category',id:null};render();}
  else if(a==='edit-cat'){editMode={type:'category',id:el.dataset.cid};render();}
  else if(a==='del-cat'){
    if(!confirm('Delete category? Activities in it will move to General.'))return;
    D.activities.forEach(a=>{if(a.cat===el.dataset.cid)a.cat='cat-general';});
    D.categories=D.categories.filter(x=>x.id!==el.dataset.cid);
    save();toast('Category deleted');render();
  }
  else if(a==='save-cat'){
    const name=document.getElementById('catname')?.value?.trim();
    const emoji=document.getElementById('catemoji')?.value?.trim()||'📌';
    if(!name){toast('Please enter a name');return;}
    if(editMode.id)Object.assign(D.categories.find(x=>x.id===editMode.id),{name,emoji});
    else D.categories.push({id:'cat-'+uid(),name,emoji});
    editMode={type:null,id:null};save();toast('Saved ✅');render();
  }
  // Time blocks CRUD
  else if(a==='add-tb'){editMode={type:'timeblock',id:null};render();}
  else if(a==='edit-tb'){editMode={type:'timeblock',id:el.dataset.bid};render();}
  else if(a==='del-tb'){
    if(!confirm('Delete this time block?'))return;
    D.timeBlocks=D.timeBlocks.filter(x=>x.id!==el.dataset.bid);
    save();toast('Deleted');render();
  }
  else if(a==='save-tb'){
    const name=document.getElementById('tbname')?.value?.trim();
    const emoji=document.getElementById('tbemoji')?.value?.trim()||'⏱️';
    const pts=parseInt(document.getElementById('tbpts')?.value)||10;
    const mins=parseInt(document.getElementById('tbmins')?.value)||60;
    if(!name){toast('Please enter a name');return;}
    if(editMode.id)Object.assign(D.timeBlocks.find(x=>x.id===editMode.id),{name,emoji,points:pts,minutes:mins});
    else D.timeBlocks.push({id:uid(),name,emoji,points:pts,minutes:mins});
    editMode={type:null,id:null};save();toast('Saved ✅');render();
  }
  // Settings
  else if(a==='bal-inc'||a==='bal-dec'){
    const c=child(el.dataset.cid);if(!c)return;
    if(!c.dailyBalance)c.dailyBalance={};
    const cat=el.dataset.cat;
    const cur=c.dailyBalance[cat]||0;
    if(a==='bal-inc')c.dailyBalance[cat]=cur+1;
    else c.dailyBalance[cat]=Math.max(0,cur-1);
    if(c.dailyBalance[cat]===0)delete c.dailyBalance[cat];
    save();render();
  }
  else if(a==='set-min-payout-days'){
    const c=child(el.dataset.cid);if(!c)return;
    c.minPayoutDays=parseInt(el.dataset.val)||4;
    save();toast(`Min active days set to ${c.minPayoutDays} for ${c.name}`);render();
  }
  else if(a==='set-school-min'){
    D.settings.schoolMinMins=parseInt(el.dataset.val)||15;
    save();toast(`Min school session set to ${D.settings.schoolMinMins} min`);render();
  }
  else if(a==='save-notif-settings'){
    D.settings.notifEmail=document.getElementById('notif-email')?.value?.trim()||'';
    D.settings.emailjsServiceId=document.getElementById('emailjs-service')?.value?.trim()||'';
    D.settings.emailjsTemplateId=document.getElementById('emailjs-template')?.value?.trim()||'';
    D.settings.emailjsPublicKey=document.getElementById('emailjs-key')?.value?.trim()||'';
    D.settings.appUrl=window.location.href;
    save();toast('🔔 Notification settings saved!');render();
  }
  else if(a==='test-notif'){
    notify('🔔 ScreenTime Bank Test','Notifications are working! You will be alerted when children send requests.');
    toast('Test notification sent!');
  }
  else if(a==='save-pin'){
    const np=document.getElementById('newpin')?.value;
    if(!np||!/^\d{4}$/.test(np)){toast('PIN must be exactly 4 digits');return;}
    D.settings.pin=np;save();toast('PIN updated 🔐');document.getElementById('newpin').value='';
  }
  else if(a==='weekly-reset'){
    let n=0;
    D.children.forEach(c=>{
      if(c.rollover==='weekly'){c.points=0;n++;}
      else if(c.rollover==='capped'){c.points=Math.min(c.points,50);n++;}
    });
    save();toast(`Weekly reset done for ${n} child${n!==1?'ren':''} ✅`);render();
  }
});

document.addEventListener('input',e=>{
  if(e.target.id==='cashout-pts'){
    const pts=parseInt(e.target.value)||0;
    const c=child(childId);
    const rate=c?.pointsPerRand||10;
    const preview=document.getElementById('cashout-preview');
    if(preview)preview.textContent=`= R${(pts/rate).toFixed(2)}`;
  }
  if(e.target.id==='bonus-convert-pts'){
    const pts=parseInt(e.target.value)||0;
    const c=child(childId);const rate=c?.pointsPerRand||10;
    const p=document.getElementById('bonus-convert-preview');
    if(p)p.textContent=`= R${(pts/rate).toFixed(2)}`;
  }
  if(e.target.id==='goal-money-amt'){
    const amt=parseFloat(e.target.value)||0;
    const preview=document.getElementById('goal-money-preview');
    if(preview)preview.textContent=`Your R${amt.toFixed(2)} + Parent R${amt.toFixed(2)} = R${(amt*2).toFixed(2)} total toward goal`;
  }
  if(e.target.id==='goal-save-pts'){
    const pts=parseInt(e.target.value)||0;
    const c=child(childId);
    const rate=c?.pointsPerRand||10;
    const preview=document.getElementById('goal-save-preview');
    if(preview)preview.textContent=`= R${(pts/rate).toFixed(2)} toward goal`;
  }
});

document.addEventListener('change',e=>{
  const el=e.target;const a=el.dataset.a;
  if(a==='ename'){const c=child(el.dataset.cid);if(c&&el.value.trim()){c.name=el.value.trim();save();}}
  else if(a==='eage'){const c=child(el.dataset.cid);if(c&&el.value){c.age=parseInt(el.value);save();}}
  else if(a==='rollover'){const c=child(el.dataset.cid);if(c){c.rollover=el.value;save();toast('Rollover updated');}}
  else if(a==='setadj'){adjVals[el.dataset.cid]=parseInt(el.value)||10;}
  else if(a==='toggle-req'){
    const c=child(el.dataset.cid);if(!c)return;
    if(!c.requirements)c.requirements=[];
    if(el.checked){if(!c.requirements.includes(el.dataset.aid))c.requirements.push(el.dataset.aid);}
    else c.requirements=c.requirements.filter(r=>r!==el.dataset.aid);
    save();toast(el.checked?'Requirement added':'Requirement removed');
  }
  else if(a==='toggle-rec-disabled'){
    const c=child(el.dataset.cid);if(!c)return;
    c.recDisabled=el.checked;
    if(!el.checked)c.recDisabledReason='';
    save();
    toast(el.checked?`🚫 Screen time purchases disabled for ${c.name}`:`✅ Screen time purchases re-enabled for ${c.name}`);
    render();
  }
  else if(a==='rec-disabled-reason'){
    const c=child(el.dataset.cid);if(!c)return;
    c.recDisabledReason=el.value;save();
  }
  else if(a==='toggle-school-req'){
    const c=child(el.dataset.cid);if(!c)return;
    c.requireSchoolSession=el.checked;
    save();toast(el.checked?'🎓 School session required for recreation':'School session requirement turned off (holiday mode)');render();
  }
  else if(a==='min-payout-balance'){
    const c=child(el.dataset.cid);if(!c)return;
    c.minPayoutBalance=parseFloat(el.value)||20;save();
  }
  else if(a==='preferred-pay-method'){
    const c=child(el.dataset.cid);if(!c)return;
    c.preferredPayMethod=el.value;save();toast(`Payment method set to ${el.value}`);
  }
  else if(a==='bank-account'){
    const c=child(el.dataset.cid);if(!c)return;
    c.bankAccount=el.value;save();
  }
  else if(a==='weekly-budget'){
    const c=child(el.dataset.cid);if(!c)return;
    c.weeklyBudget=parseFloat(el.value)||0;save();
  }
  else if(a==='points-per-rand'){
    const c=child(el.dataset.cid);if(!c)return;
    c.pointsPerRand=parseInt(el.value)||10;save();
    toast(`Rate updated: ${c.pointsPerRand} pts = R1`);
  }
  else if(a==='pocket-money-day'){
    const c=child(el.dataset.cid);if(!c)return;
    c.pocketMoneyDay=parseInt(el.value);save();
    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    toast(`Payday set to ${days[c.pocketMoneyDay]}`);
  }
  else if(a==='rec-start'){
    const c=child(el.dataset.cid);if(!c)return;
    c.recStart=el.value;save();
    if(el.value)toast(`Earliest rec time: ${el.value}`);
  }
  else if(a==='rec-end'){
    const c=child(el.dataset.cid);if(!c)return;
    c.recEnd=el.value;save();
    if(el.value)toast(`Latest rec time: ${el.value}`);
  }
  else if(a==='rec-max-day'){
    const c=child(el.dataset.cid);if(!c)return;
    c.recMaxDay=parseInt(el.value)||0;save();
  }
  else if(a==='rec-max-weekend'){
    const c=child(el.dataset.cid);if(!c)return;
    c.recMaxWeekend=parseInt(el.value)||0;save();
  }
  else if(a==='rec-max-week'){
    const c=child(el.dataset.cid);if(!c)return;
    c.recMaxWeek=parseInt(el.value)||0;save();
  }
  else if(a==='school-min-day'){
    const c=child(el.dataset.cid);if(!c)return;
    c.schoolMinDay=parseInt(el.value)||0;save();
  }
  else if(a==='school-daily-goal'){
    const c=child(el.dataset.cid);if(!c)return;
    c.schoolDailyGoal=parseInt(el.value)||0;save();
    if(el.value)toast(`Daily school goal set to ${el.value} min`);
  }
  else if(a==='bal-bonus-pts'){
    const c=child(el.dataset.cid);if(!c)return;
    c.dailyBalanceBonusPts=parseInt(el.value)||5;save();
  }
  else if(a==='school-min-week'){
    const c=child(el.dataset.cid);if(!c)return;
    c.schoolMinWeek=parseInt(el.value)||0;save();
  }
  else if(a==='overtime-rate'){
    const c=child(el.dataset.cid);if(!c)return;
    c.overtimeRate=el.value?parseInt(el.value):null;save();toast('Rate updated');
  }
  else if(a==='notif-chime'){D.settings.notifChime=el.checked;save();toast(el.checked?'🔊 Chime enabled':'🔇 Chime disabled');}
  else if(a==='notif-browser'){
    D.settings.notifBrowser=el.checked;save();
    if(el.checked&&'Notification' in window&&Notification.permission==='default'){
      Notification.requestPermission().then(p=>toast(p==='granted'?'🔔 Browser notifications enabled':'⚠️ Permission denied by browser'));
    }else toast(el.checked?'🔔 Browser notifications enabled':'Browser notifications disabled');
  }
  else if(a==='notif-email-toggle'){D.settings.notifEmail2=el.checked;save();toast(el.checked?'📧 Email notifications enabled':'Email notifications disabled');}
  else if(a==='global-ot-rate'){
    D.settings.overtimeRate=parseInt(el.value)||2;save();toast('Global rate updated');
  }
  else if(a==='school-point-mins'){
    D.settings.schoolPointMins=parseInt(el.value)||10;save();toast('School point interval updated');render();
  }
  else if(a==='school-point-amt'){
    D.settings.schoolPointAmt=parseInt(el.value)||2;save();toast('School point amount updated');render();
  }
});

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
render();
window.addEventListener('load',()=>{
  const s1=document.createElement('script');
  s1.src='https://apis.google.com/js/api.js';
  s1.onload=()=>gapi.load('client',async()=>{
    try{await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});}catch(e){}
    gapiReady=true;if(gapiReady&&gisReady)maybeConnect();
  });
  s1.onerror=()=>{D=migrateData(loadLocal()||clone(DEFAULT_DATA));view='home';syncStatus='offline';checkDailyReset();render();startTick();};
  document.head.appendChild(s1);
  const s2=document.createElement('script');
  s2.src='https://accounts.google.com/gsi/client';
  s2.onload=()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:resp=>{
      if(resp.error){syncStatus='error';if(!D){D=migrateData(loadLocal()||clone(DEFAULT_DATA));}view='home';render();return;}
      loadFromDrive();
    }});
    gisReady=true;if(gapiReady&&gisReady)maybeConnect();
  };
  s2.onerror=()=>{D=migrateData(loadLocal()||clone(DEFAULT_DATA));view='home';syncStatus='offline';checkDailyReset();render();startTick();};
  document.head.appendChild(s2);
  setTimeout(()=>{if(view==='loading'){D=migrateData(loadLocal()||clone(DEFAULT_DATA));view='home';syncStatus='offline';checkDailyReset();render();startTick();}},5000);
});
</script>
</body>
</html>
