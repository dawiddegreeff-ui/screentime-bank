<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ScreenTime Bank 🏦</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0F172A;--card:#1E293B;--card2:#243047;--text:#F1F5F9;--muted:#94A3B8;
  --border:#334155;--gold:#F59E0B;--success:#10B981;--danger:#EF4444;--r:18px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;max-width:520px;margin:0 auto;padding-bottom:30px;overflow-x:hidden}
h1,h2,h3{font-family:'Fredoka One',cursive}
h3{font-family:'Nunito',sans-serif;font-weight:900}
.header{padding:14px 18px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.header h2{font-size:1.25rem;flex:1}
.back-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);
  background:none;color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card{background:var(--card);border-radius:var(--r);padding:16px;margin:10px 14px;border:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.9rem;cursor:pointer;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.96)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--gold);color:#1A1000}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:var(--card2);color:var(--text)}
.btn-full{width:100%}
.balance-chip{display:inline-flex;align-items:center;gap:5px;background:var(--gold);
  color:#1A1000;border-radius:50px;padding:4px 12px;font-weight:900;font-size:.9rem}
/* SYNC BAR */
.sync-bar{display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px;background:var(--card2);border-bottom:1px solid var(--border);font-size:.78rem;gap:8px}
.sync-left{display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden}
.sync-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-saved .sync-dot{background:var(--success)}.sync-saved .sync-text{color:var(--success)}
.sync-syncing .sync-dot{background:var(--gold);animation:pulse 1s infinite}.sync-syncing .sync-text{color:var(--gold)}
.sync-offline .sync-dot{background:var(--muted)}.sync-offline .sync-text{color:var(--muted)}
.sync-error .sync-dot{background:var(--danger)}.sync-error .sync-text{color:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* TIMER WIDGET */
.timer-widget{margin:0 14px 10px;border-radius:var(--r);padding:16px 18px;
  display:flex;align-items:center;gap:14px;border:2px solid;position:relative}
.timer-widget.active{border-color:var(--success);background:rgba(16,185,129,.08)}
.timer-widget.overtime{border-color:var(--danger);background:rgba(239,68,68,.08);animation:ovPulse 2s ease-in-out infinite}
@keyframes ovPulse{0%,100%{background:rgba(239,68,68,.08)}50%{background:rgba(239,68,68,.16)}}
.timer-label{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin-bottom:3px}
.active .timer-label{color:var(--success)}.overtime .timer-label{color:var(--danger)}
.timer-display{font-family:'Fredoka One',cursive;font-size:2.4rem;line-height:1}
.active .timer-display{color:var(--success)}.overtime .timer-display{color:var(--danger)}
.timer-session-type{font-size:.78rem;font-weight:700;margin-top:2px;opacity:.8}
.timer-sub{font-size:.73rem;color:var(--muted);margin-top:3px}
.ring-wrap{position:relative;width:54px;height:54px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(255,255,255,.1);stroke-width:4}
.ring-prog{fill:none;stroke-width:4;stroke-linecap:round}
/* HOME */
.home-hero{text-align:center;padding:24px 20px 8px}
.home-hero h1{font-size:2rem;background:linear-gradient(135deg,var(--gold),#FF6B6B,#A78BFA);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-hero p{color:var(--muted);margin-top:4px;font-size:.88rem}
.child-card{border-radius:var(--r);padding:16px;margin:0 14px 10px;cursor:pointer;
  transition:transform .15s;position:relative;overflow:hidden;border:2px solid transparent}
.child-card:active{transform:scale(.98)}
.child-card-inner{display:flex;align-items:center;gap:12px}
.child-avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:1.6rem;background:rgba(255,255,255,.18);flex-shrink:0}
.child-name{font-size:1.1rem;font-weight:900;color:#fff}
.child-meta{font-size:.82rem;color:rgba(255,255,255,.8);margin-top:2px}
.child-meta strong{color:#fff}
.corner-badges{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.badge-pill{border-radius:50px;padding:2px 8px;font-size:.68rem;font-weight:800}
.badge-pending{background:#EF4444;color:#fff}
.badge-timer-active{background:rgba(16,185,129,.3);color:#6EE7B7}
.badge-timer-ot{background:rgba(239,68,68,.3);color:#FCA5A5;animation:ovPulse 2s ease-in-out infinite}
.badge-steward{background:rgba(16,185,129,.2);color:#6EE7B7}
.badge-unlock{background:rgba(245,158,11,.25);color:#FCD34D}
.parent-btn{display:flex;align-items:center;justify-content:center;gap:10px;
  margin:0 14px 10px;padding:13px;border-radius:var(--r);border:1px solid var(--border);
  background:var(--card);color:var(--muted);font-family:'Nunito',sans-serif;
  font-weight:700;cursor:pointer;transition:all .15s;font-size:.9rem;width:calc(100% - 28px)}
.parent-btn:hover{border-color:var(--gold);color:var(--gold)}
.lb-btn{display:flex;align-items:center;justify-content:center;gap:10px;
  margin:0 14px 14px;padding:13px;border-radius:var(--r);border:1px solid var(--border);
  background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(167,139,250,.12));
  color:var(--gold);font-family:'Nunito',sans-serif;
  font-weight:800;cursor:pointer;transition:all .15s;font-size:.9rem;width:calc(100% - 28px)}
/* LEADERBOARD */
.lb-card{background:var(--card);border-radius:var(--r);margin:10px 14px;border:1px solid var(--border);overflow:hidden}
.lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:'Fredoka One',cursive;font-size:1.5rem;width:36px;text-align:center;flex-shrink:0}
.lb-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.lb-name{font-weight:900;font-size:1rem}
.lb-stats{font-size:.75rem;color:var(--muted);margin-top:2px}
.lb-score{text-align:right;flex-shrink:0}
.lb-pts{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--gold)}
.lb-sub{font-size:.7rem;color:var(--muted)}
.lb-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin-top:5px;width:100%}
.lb-bar{height:5px;border-radius:3px;transition:width .6s}
/* CHILD DASHBOARD */
.balance-hero{margin:14px;border-radius:var(--r);padding:20px;text-align:center}
.balance-hero .lbl{font-size:.75rem;opacity:.8;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.balance-hero .amt{font-family:'Fredoka One',cursive;font-size:3.4rem;line-height:1;margin:5px 0;color:#fff}
.balance-hero .pts-lbl{font-size:1rem;opacity:.8;font-weight:700}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 14px 10px}
.action-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 12px;text-align:center;cursor:pointer;transition:transform .15s,border-color .15s}
.action-card:active{transform:scale(.96)}
.action-card .icon{font-size:1.7rem;display:block;margin-bottom:6px}
.action-card .lbl{font-weight:800;font-size:.85rem}
.action-card .sub{font-size:.7rem;color:var(--muted);margin-top:2px}
.req-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)22}
.req-row:last-child{border-bottom:none}
.req-check{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.req-check.done{background:rgba(16,185,129,.2);color:var(--success)}
.req-check.todo{background:rgba(148,163,184,.12);color:var(--muted)}
/* LOG & BUY */
.sec-title{padding:10px 14px 3px;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:800}
.cat-filter{display:flex;overflow-x:auto;gap:7px;padding:8px 14px;scrollbar-width:none}
.cat-filter::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:6px 13px;border-radius:50px;border:1px solid var(--border);
  background:none;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:.75rem;cursor:pointer;transition:all .15s}
.cat-chip.active{background:var(--gold);color:#1A1000;border-color:var(--gold)}
.act-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--card);border-radius:14px;margin:6px 14px;border:1px solid var(--border);
  cursor:pointer;transition:transform .1s,border-color .15s}
.act-item:active{transform:scale(.98)}.act-item:hover{border-color:var(--gold)40}
.act-emoji{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.act-info{flex:1;min-width:0}
.act-name{font-weight:700;font-size:.9rem}
.act-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.act-pts{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--gold);white-space:nowrap}
.tb-card{display:flex;align-items:center;gap:14px;padding:14px;background:var(--card);
  border-radius:var(--r);margin:7px 14px;border:1px solid var(--border)}
.tb-icon{font-size:1.8rem}.tb-info{flex:1}
.tb-name{font-weight:800;font-size:.95rem}
.tb-cost{font-size:.8rem;color:var(--muted);margin-top:2px}
.recent-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.recent-item:last-child{border-bottom:none}
/* PIN */
.pin-screen{display:flex;flex-direction:column;align-items:center;padding:44px 20px}
.pin-dots{display:flex;gap:12px;margin:22px 0}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:background .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:270px;width:100%;margin-top:14px}
.num-btn{height:60px;border-radius:14px;border:2px solid var(--border);background:var(--card);
  color:var(--text);font-family:'Fredoka One',cursive;font-size:1.4rem;cursor:pointer;transition:transform .1s,background .1s}
.num-btn:active{transform:scale(.93);background:var(--card2)}
.num-btn.zero{grid-column:2}
/* PARENT */
.tab-bar{display:flex;flex-wrap:wrap;padding:8px 14px;gap:7px;
  border-bottom:1px solid var(--border);position:sticky;top:57px;background:var(--bg);z-index:9}
.tab-btn{flex-shrink:0;padding:6px 13px;border-radius:50px;border:1px solid var(--border);
  background:none;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .15px;white-space:nowrap}
.tab-btn.active{background:var(--gold);color:#1A1000;border-color:var(--gold)}
.approval-item{padding:13px;background:var(--card);border-radius:14px;margin:7px 14px;border:1px solid var(--border)}
.approval-item.unlock{border-color:var(--gold)55;background:rgba(245,158,11,.05)}
.approval-actions{display:flex;gap:8px;margin-top:9px}
.approval-actions .btn{flex:1;padding:8px;font-size:.82rem}
.edit-row{display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--card);border-radius:13px;margin:5px 14px;border:1px solid var(--border)}
.icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);
  background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.log-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.log-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0}
.log-name{font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-meta{font-size:.7rem;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:50px;font-size:.68rem;font-weight:800}
.badge-pending{background:rgba(245,158,11,.18);color:var(--gold)}
.badge-approved{background:rgba(16,185,129,.18);color:var(--success)}
.badge-rejected{background:rgba(239,68,68,.18);color:var(--danger)}
.form-label{font-weight:700;font-size:.78rem;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:11px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.92rem;outline:none}
.form-input:focus{border-color:var(--gold)}
select.form-input{cursor:pointer}
.small-input{width:68px;padding:7px 10px;background:var(--card2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;text-align:center;outline:none}
.rollover-sel,.rate-sel{padding:6px 10px;background:var(--card2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.8rem;outline:none;cursor:pointer}
.divider{height:1px;background:var(--border);margin:8px 0}
.row{display:flex;align-items:center;gap:8px}
.empty-state{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-state .icon{font-size:2.6rem;margin-bottom:10px}
/* REQ SELECTOR */
.req-select-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;
  border-radius:10px;margin:3px 0;transition:background .12s}
.req-select-item:hover{background:var(--card2)}
.req-cb{width:20px;height:20px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:60;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--card);border-radius:var(--r);padding:24px 20px;
  max-width:340px;width:100%;border:1px solid var(--border)}
.modal-box .cion{font-size:2.6rem;margin-bottom:8px;display:block;text-align:center}
.modal-box h3{text-align:center;margin-bottom:8px}
.modal-box p{color:var(--muted);font-size:.87rem;margin-bottom:16px;text-align:center;line-height:1.55}
.modal-actions{display:flex;gap:8px}
.modal-actions .btn{flex:1}
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:55;display:flex;align-items:flex-end}
.bottom-sheet{background:var(--card);border-radius:22px 22px 0 0;padding:20px 18px 34px;width:100%;max-height:80vh;overflow-y:auto}
/* SESSION TYPE */
.stype-btn{display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--r);
  border:2px solid var(--border);background:var(--card2);cursor:pointer;margin-bottom:10px;transition:border-color .15s}
.stype-btn:hover{border-color:var(--gold)}
.stype-btn .stype-icon{font-size:2rem}
.stype-btn .stype-name{font-weight:800;font-size:1rem}
.stype-btn .stype-desc{font-size:.8rem;color:var(--muted);margin-top:2px}
/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card2);border:1px solid var(--border);color:var(--text);
  padding:10px 20px;border-radius:50px;font-weight:700;font-size:.87rem;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);z-index:100;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.spinner{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
.anim-pop{animation:pop .2s ease-out forwards}
.toggle-row{display:flex;align-items:center;gap:10px;cursor:pointer}
input[type=checkbox]{width:17px;height:17px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.week-stat{text-align:center;flex:1}
.week-stat .ws-val{font-family:'Fredoka One',cursive;font-size:1.6rem}
.week-stat .ws-lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
@media(min-width:520px){body{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>

async function loadFromDrive(){
  syncStatus='syncing';view='loading';render();
  try{
    try{const ui=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      {headers:{Authorization:'Bearer '+gapi.client.getToken().access_token}});
      userEmail=(await ui.json()).email||'';}catch(e){}
    const list=await gapi.client.drive.files.list(
      {q:`name='${DRIVE_FILE}' and trashed=false`,fields:'files(id)',spaces:'drive'});
    const files=list.result.files||[];
    if(files.length>0){
      driveFileId=files[0].id;
      const resp=await gapi.client.drive.files.get({fileId:driveFileId,alt:'media'});
      D=migrateData(JSON.parse(typeof resp.body==='string'?resp.body:JSON.stringify(resp.result)));
      // Capture initial modified time for change detection
      try{
        const meta=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`,
          {headers:{Authorization:'Bearer '+gapi.client.getToken().access_token}});
        const {modifiedTime}=await meta.json();
        driveModifiedTime=modifiedTime;
      }catch(e){}
    }else{
      if(!D)D=migrateData(loadLocal()||clone(DEFAULT_DATA));
      await createDriveFile();
    }
    syncStatus='saved';saveLocal();
  }catch(err){
    console.error(err);syncStatus='error';
    if(!D)D=migrateData(loadLocal()||clone(DEFAULT_DATA));
    toast('Drive sync failed — using local data');
  }
  checkDailyReset();view='home';render();startTick();startPolling();
}
async function createDriveFile(){
  const token=gapi.client.getToken();if(!token)return;
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:DRIVE_FILE,mimeType:'application/json'})],{type:'application/json'}));
  form.append('file',new Blob([JSON.stringify(D)],{type:'application/json'}));
  const r=await(await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {method:'POST',headers:{Authorization:'Bearer '+gapi.client.getToken().access_token},body:form})).json();
  driveFileId=r.id;
}
let driveModifiedTime=null; // track last known Drive modified time
let pollInterval=null;

async function writeToDrive(){
  const token=gapi.client.getToken();
  if(!token||!driveFileId){saveLocal();syncStatus='offline';renderSyncBar();return;}
  syncStatus='syncing';renderSyncBar();
  try{
    // Before writing, check if Drive is newer (another device may have saved)
    const meta=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`,
      {headers:{Authorization:'Bearer '+token.access_token}});
    const {modifiedTime}=await meta.json();
    if(driveModifiedTime&&modifiedTime&&modifiedTime>driveModifiedTime){
      // Drive is newer — fetch it, merge our pending local additions, then write
      const resp=await gapi.client.drive.files.get({fileId:driveFileId,alt:'media'});
      const remote=migrateData(JSON.parse(typeof resp.body==='string'?resp.body:JSON.stringify(resp.result)));
      D=mergeData(remote,D);
      driveModifiedTime=modifiedTime;
    }
    // Now write merged data
    const resp=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media&fields=modifiedTime`,
      {method:'PATCH',headers:{Authorization:'Bearer '+token.access_token,'Content-Type':'application/json'},body:JSON.stringify(D)});
    const result=await resp.json();
    if(result.modifiedTime)driveModifiedTime=result.modifiedTime;
    syncStatus='saved';saveLocal();
  }catch(e){syncStatus='error';saveLocal();toast('Sync failed — saved locally');}
  renderSyncBar();
}

async function pollForUpdates(){
  const token=gapi.client.getToken();
  if(!token||!driveFileId)return;
  try{
    const meta=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`,
      {headers:{Authorization:'Bearer '+token.access_token}});
    if(!meta.ok)return;
    const {modifiedTime}=await meta.json();
    if(driveModifiedTime&&modifiedTime&&modifiedTime>driveModifiedTime){
      // Another device saved — pull updates
      const resp=await gapi.client.drive.files.get({fileId:driveFileId,alt:'media'});
      const remote=migrateData(JSON.parse(typeof resp.body==='string'?resp.body:JSON.stringify(resp.result)));
      D=mergeData(remote,D);
      driveModifiedTime=modifiedTime;
      saveLocal();
      render();
      // Small non-intrusive indicator
      const bar=document.getElementById('sync-bar');
      if(bar){const old=bar.style.background;bar.style.background='rgba(96,165,250,.3)';setTimeout(()=>{bar.style.background=old;},1000);}
    }
  }catch(e){/* silent poll failure */}
}

function mergeData(remote,local){
  // Strategy: remote is source of truth for child data/settings
  // but we keep any local log entries that remote doesn't have yet
  const localOnlyLogs=(local.log||[]).filter(ll=>!(remote.log||[]).find(rl=>rl.id===ll.id));
  const merged=Object.assign({},remote);
  // Prepend any local-only log entries (not yet synced to Drive)
  if(localOnlyLogs.length){
    merged.log=[...localOnlyLogs,...(remote.log||[])];
    // Also apply those local-only approved entries to children pts/bonusPts
    localOnlyLogs.forEach(l=>{
      if(l.status==='approved'&&l.type==='earn'&&l.points>0){
        const c=merged.children.find(x=>x.id===l.childId);
        if(c)c.points=Math.max(0,(c.points||0)+l.points);
      }
    });
  }
  return merged;
}

function startPolling(){
  if(pollInterval)clearInterval(pollInterval);
  pollInterval=setInterval(pollForUpdates,20000);// poll every 20 seconds
}

function save(){saveLocal();clearTimeout(saveTimer);saveTimer=setTimeout(()=>writeToDrive(),900);}

function checkDailyReset(){
  const today=new Date().toISOString().split('T')[0];
  D.children.forEach(c=>{
    if(c.dailyUnlock&&c.dailyUnlock.date!==today)c.dailyUnlock=null;
    if(c.schoolDailyAccumDate&&c.schoolDailyAccumDate!==today){
      c.schoolDailyAccum=0;c.schoolDailyAccumDate='';
    }
    if(c.dailyBalanceBonusDate&&c.dailyBalanceBonusDate!==today)c.dailyBalanceBonusDate='';
    if(c.dailyAllowanceDate&&c.dailyAllowanceDate!==today){
      c.dailyAllowancePaid=0;c.dailyAllowanceDate='';
    }
  });
}
function getDailyAllowanceCap(c){
  return Math.floor(((c.weeklyBudget||0)/7)*100)/100;
}
function getDailyStewardshipSuggestion(cid){
  const c=child(cid);
  const pm=getWeeklyPocketMoneySuggestion(cid);
  const cap=getDailyAllowanceCap(c);
  const today=new Date().toISOString().split('T')[0];
  const alreadyPaid=c.dailyAllowanceDate===today?(c.dailyAllowancePaid||0):0;
  const remaining=Math.max(0,cap-alreadyPaid);
  // Scale the suggestion by stewardship score for today
  const todayPts=(function(){
    const d=new Date().toDateString();
    return D.log.filter(l=>l.childId===cid&&l.type==='earn'&&l.status==='approved'&&new Date(l.ts).toDateString()===d)
      .reduce((s,l)=>s+(l.points||0),0);
  })();
  const scorePct=pm.pct/100;
  const suggested=Math.min(remaining,Math.round(cap*scorePct*100)/100);
  return{cap,alreadyPaid,remaining,suggested,canAssign:remaining>0,scorePct:Math.round(scorePct*100)};
}
function payDailyAllowance(cid,amount){
  const c=child(cid);
  const today=new Date().toISOString().split('T')[0];
  const cap=getDailyAllowanceCap(c);
  if(c.dailyAllowanceDate!==today){c.dailyAllowancePaid=0;c.dailyAllowanceDate=today;}
  const alreadyPaid=c.dailyAllowancePaid||0;
  const remaining=Math.max(0,cap-alreadyPaid);
  const actual=Math.min(amount,remaining);
  if(actual<=0){toast(`Daily allowance cap reached (R${cap.toFixed(2)}/day)`);return;}
  c.dailyAllowancePaid=(c.dailyAllowancePaid||0)+actual;
  c.dailyAllowanceDate=today;
  c.walletBalance=(c.walletBalance||0)+actual;
  D.log.unshift({id:uid(),childId:cid,type:'pocket-money',
    actName:`💰 Daily allowance: R${actual.toFixed(2)}`,emoji:'💰',
    points:0,amount:actual,method:'Daily assessment',status:'approved',ts:new Date().toISOString()});
  save();toast(`💰 R${actual.toFixed(2)} daily allowance added to ${c.name}'s wallet`);render();
}
function awardLeaderboardWinner(){
  // Called manually from weekly reset or leaderboard
  const stats=D.children.map(c=>{const ws=getWeekStats(c.id);return{c,ws,combined:ws.weekPts+ws.stewardshipScore*3};});
  stats.sort((a,b)=>b.combined-a.combined);
  if(!stats.length)return;
  const winner=stats[0].c;
  const weekKey=getWeekStart().toISOString().split('T')[0];
  if(winner.weeklyWinnerBonusDate===weekKey){toast('Winner bonus already awarded this week');return;}
  const bonusPtsAward=10;
  winner.bonusPts=(winner.bonusPts||0)+bonusPtsAward;
  winner.weeklyWinnerBonusDate=weekKey;
  D.log.unshift({id:uid(),childId:winner.id,type:'school-bonus-daily',
    actName:`👑 Weekly leaderboard winner! +${bonusPtsAward} bonus pts`,
    emoji:'👑',points:bonusPtsAward,status:'approved',ts:new Date().toISOString()});
  save();toast(`👑 ${winner.name} wins this week! +${bonusPtsAward} bonus pts awarded`);render();
}

function fmtTime(iso){
  const diff=Date.now()-new Date(iso);
  if(diff<60000)return'just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  return new Date(iso).toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
}

function getWeekRecMins(cid){
  const ws=getWeekStart();
  return D.log.filter(l=>l.childId===cid&&l.type==='spend'&&new Date(l.ts)>=ws)
    .reduce((s,l)=>s+(l.durationMins||0),0);
}
function getDailySchoolMins(cid,date){
  const d=(date||new Date()).toDateString();
  return D.log.filter(l=>l.childId===cid&&l.type==='session-school'&&new Date(l.ts).toDateString()===d)
    .reduce((s,l)=>s+(l.durationMins||0),0);
}
function getWeekSchoolMins(cid){
  const ws=getWeekStart();
  return D.log.filter(l=>l.childId===cid&&l.type==='session-school'&&new Date(l.ts)>=ws)
    .reduce((s,l)=>s+(l.durationMins||0),0);
}
function getRemainingRecMins(cid){
  const c=child(cid);
  const today=new Date();
  const dayMax=isWeekend(today)?c.recMaxWeekend:c.recMaxDay;
  const usedDay=getDailyRecMins(cid);
  const usedWeek=getWeekRecMins(cid);
  const remainDay=(dayMax||0)>0?Math.max(0,dayMax-usedDay):null;
  const remainWeek=(c.recMaxWeek||0)>0?Math.max(0,c.recMaxWeek-usedWeek):null;
  const limited=remainDay!==null||remainWeek!==null
    ?Math.min(remainDay??9999,remainWeek??9999):null;
  return{remainDay,remainWeek,usedDay,usedWeek,dayMax,weekMax:c.recMaxWeek,limited};
}
function getWeekStats(cid){
  const ws=getWeekStart();
  const wlog=D.log.filter(l=>l.childId===cid&&new Date(l.ts)>=ws);
  const weekPts=wlog.filter(l=>l.type==='earn'&&l.status==='approved').reduce((s,l)=>s+l.points,0);
  const penaltyDays=new Set(wlog.filter(l=>l.type==='penalty').map(l=>new Date(l.ts).toDateString()));
  const screenDays=new Set(wlog.filter(l=>l.type==='spend').map(l=>new Date(l.ts).toDateString()));
  const cleanDays=[...screenDays].filter(d=>!penaltyDays.has(d)).length;
  // Stewardship = total responsible device mins: school mins logged + rec mins bought on clean days
  const schoolMins=wlog.filter(l=>l.type==='session-school').reduce((s,l)=>s+(l.durationMins||0),0);
  const recMins=wlog.filter(l=>l.type==='spend'&&!penaltyDays.has(new Date(l.ts).toDateString())).reduce((s,l)=>s+(l.durationMins||0),0);
  // Educational rec counts 1.5x for stewardship
  const eduMins=wlog.filter(l=>l.type==='session-rec').reduce((s,l)=>s+(l.eduCount||0)*10,0);
  const stewardshipMins=schoolMins+recMins+eduMins;
  const stewardshipScore=Math.floor(stewardshipMins/30);
  return{weekPts,cleanDays,screenDays:screenDays.size,penaltyDays:penaltyDays.size,stewardshipScore,stewardshipMins,schoolMins,recMins,weekSchoolMins:schoolMins};
}

function getTimerState(c){
  if(!c||!c.timer)return null;
  const elapsed=Date.now()-c.timer.startedAt;
  const remaining=c.timer.totalMs-elapsed;
  const secsRemaining=Math.floor(remaining/1000);
  return{secsRemaining,isOvertime:secsRemaining<0,pct:Math.max(0,Math.min(1,remaining/c.timer.totalMs)),label:c.timer.label,sessionType:c.timer.sessionType||'recreation'};
}

// Compound school timer — counts DOWN to daily goal, then STOPS (bonus is separate)
function getSchoolTimerState(cid){
  const c=child(cid);
  if(!c||!c.timer||c.timer.sessionType!=='school')return null;
  const today=new Date().toISOString().split('T')[0];
  const sessionElapsedMs=Math.max(0,Date.now()-c.timer.startedAt);
  const sessionMins=sessionElapsedMs/60000;
  // Only count accum from today — never carry over stale dates
  const accum=c.schoolDailyAccumDate===today?(c.schoolDailyAccum||0):0;
  const totalTodayMins=accum+sessionMins;
  const dailyGoal=c.schoolDailyGoal||0;
  const weekGoal=c.schoolMinWeek||0;
  const weekDone=getWeekSchoolMins(cid)+(sessionMins);
  // Main timer: counts down remaining goal time (capped at 0 — never goes negative)
  const dailyRemainSecs=dailyGoal>0?Math.max(0,Math.floor((dailyGoal*60)-(totalTodayMins*60))):null;
  const goalMet=dailyGoal>0&&totalTodayMins>=dailyGoal;
  // Bonus timer: only counts up AFTER goal is met
  const bonusSecs=goalMet?Math.floor((totalTodayMins-dailyGoal)*60):0;
  const dailyPct=dailyGoal>0?Math.min(1,totalTodayMins/dailyGoal):Math.min(1,sessionMins/60);
  // Weekly
  const weekRemainSecs=weekGoal>0?Math.max(0,Math.floor((weekGoal*60)-(weekDone*60))):null;
  const weekGoalMet=weekGoal>0&&weekDone>=weekGoal;
  const weekBonusSecs=weekGoalMet?Math.floor((weekDone-weekGoal)*60):0;
  const sessionSecs=Math.floor(sessionElapsedMs/1000);
  return{
    sessionSecs,
    totalTodayMins,
    dailyGoal,
    dailyRemainSecs,    // null if no goal; 0 when met — never negative
    goalMet,
    bonusSecs,          // counts up after goal met
    dailyPct,
    weekGoal,
    weekRemainSecs,
    weekGoalMet,
    weekBonusSecs,
    sessionType:'school',
    label:c.timer.label
  };
}
function fmtSecs(s){
  const a=Math.abs(s),h=Math.floor(a/3600),m=Math.floor((a%3600)/60),sec=a%60;
  if(h>0)return`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function startTimer(cid,minutes,label,sessionType){
  const c=child(cid);
  c.timer={startedAt:Date.now(),totalMs:minutes*60000,label,sessionType:sessionType||'recreation'};
  save();
}
function startTick(){
  if(tickInterval)clearInterval(tickInterval);
  tickInterval=setInterval(()=>{
    // Update timer displays
    document.querySelectorAll('[data-timer-cid]').forEach(el=>{
      const c=child(el.dataset.timerCid);if(!c||!c.timer)return;
      // School: use compound state
      if(c.timer.sessionType==='school'){
        const sts=getSchoolTimerState(c.id);if(!sts)return;
        const mainEl=el.querySelector('[data-school-main]');
        const bonusEl=el.querySelector('[data-school-bonus]');
        const weekEl=el.querySelector('[data-school-week]');
        const ring=el.querySelector('.ring-prog');
        if(mainEl){
          if(sts.goalMet) mainEl.textContent='✓';
          else mainEl.textContent=fmtSecs(sts.dailyGoal?sts.dailyRemainSecs:sts.sessionSecs);
        }
        if(bonusEl&&sts.goalMet){
          bonusEl.textContent='+'+fmtSecs(sts.bonusSecs);
        }
        if(weekEl&&sts.weekGoal>0){
          weekEl.textContent=(sts.weekGoalMet?'+'+fmtSecs(sts.weekBonusSecs):fmtSecs(sts.weekRemainSecs||0));
        }
        if(ring){
          const circ=2*Math.PI*23;
          ring.style.strokeDasharray=circ;
          ring.style.strokeDashoffset=circ*(1-sts.dailyPct);
          ring.style.stroke=sts.goalMet?'var(--success)':'#60A5FA';
        }
        return;
      }
      // Activity timer
      if(c.timer.sessionType==='activity'){
        const ats=getActivityTimerState(c.id);if(!ats)return;
        const mainEl=el.querySelector('[data-act-main]');
        const ring=el.querySelector('[data-act-ring]');
        if(mainEl)mainEl.textContent=ats.goalMet?'+'+fmtSecs(ats.bonusSecs):fmtSecs(ats.remainSecs);
        if(ring){const circ=2*Math.PI*23;ring.style.strokeDasharray=circ;ring.style.strokeDashoffset=circ*(1-ats.pct);ring.style.stroke=ats.goalMet?'var(--gold)':'#A78BFA';}
        return;
      }
      // Recreation: original logic
      const ts=getTimerState(c);if(!ts)return;
      const d=el.querySelector('.timer-display');const sub=el.querySelector('.timer-sub');
      const ring=el.querySelector('.ring-prog');
      if(d)d.textContent=(ts.isOvertime?'-':'')+fmtSecs(ts.secsRemaining);
      if(sub)sub.textContent=ts.isOvertime?'⚠️ Time is up! Ask a parent to reset':'Time remaining';
      if(ring){const circ=2*Math.PI*23;ring.style.strokeDasharray=circ;ring.style.strokeDashoffset=circ*(1-ts.pct);}
      if(ts.isOvertime&&!el.classList.contains('overtime')){el.classList.remove('active');el.classList.add('overtime');}
    });
    document.querySelectorAll('[data-timer-badge]').forEach(el=>{
      const c=child(el.dataset.timerBadge);if(!c||!c.timer)return;
      if(c.timer.sessionType==='school'){
        const sts=getSchoolTimerState(c.id);if(!sts)return;
        if(sts.goalMet){
          el.textContent='🌟 +'+fmtSecs(sts.bonusSecs);
        }else{
          const secs=sts.dailyGoal?sts.dailyRemainSecs:sts.sessionSecs;
          el.textContent='🎓 '+fmtSecs(secs);
        }
        return;
      }
      const ts=getTimerState(c);if(!ts)return;
      el.textContent=(ts.isOvertime?'⚠️ -':'▶ ')+fmtSecs(ts.secsRemaining);
      if(ts.isOvertime&&el.classList.contains('badge-timer-active')){el.className='badge-pill badge-timer-ot';}
    });
    // Award pending school points every N minutes
    if(D&&D.children){
      const intervalMs=(D.settings.schoolPointMins||10)*60*1000;
      const pts=D.settings.schoolPointAmt||2;
      D.children.forEach(c=>{
        if(!c.timer||c.timer.sessionType!=='school')return;
        const elapsed=Date.now()-c.timer.startedAt;
        const lastAwarded=c.timer.lastSchoolAward||0;
        const intervals=Math.floor(elapsed/intervalMs);
        const lastInterval=Math.floor(lastAwarded/intervalMs);
        if(intervals>lastInterval){
          const newIntervals=intervals-lastInterval;
          for(let i=0;i<newIntervals;i++){
            D.log.unshift({id:uid(),childId:c.id,type:'earn',aid:null,
              actName:`🎓 School time (${D.settings.schoolPointMins} min)`,
              emoji:'🎓',points:pts,note:'Auto-logged from school timer',
              status:'pending',ts:new Date().toISOString()});
          }
          c.timer.lastSchoolAward=elapsed;
          save();
          // Refresh approvals badge if in parent mode
          const badge=document.getElementById('sync-bar');
          if(view==='parent'&&parentTab==='approvals')render();
        }
      });
    }
  },1000);
}

function checkRequirements(cid){
  const c=child(cid);
  const today=new Date().toDateString();
  const doneAids=new Set(D.log.filter(l=>l.childId===cid&&l.status==='approved'&&l.type==='earn'&&new Date(l.ts).toDateString()===today).map(l=>l.aid));
  const completed=[],missing=[];
  // Check activity-based requirements
  (c.requirements||[]).forEach(aid=>{
    const act=D.activities.find(a=>a.id===aid);if(!act)return;
    (doneAids.has(aid)?completed:missing).push(act);
  });
  // Check school session requirement
  let schoolDone=false,schoolMissing=false;
  if(c.requireSchoolSession){
    const minRequired=c.schoolMinDay>0?c.schoolMinDay:(D.settings.schoolMinMins||15);
    // Count logged sessions + any accumulated-but-not-yet-logged time from stopped sessions today
    const todaySchool=D.log.filter(l=>l.childId===cid&&l.type==='session-school'&&new Date(l.ts).toDateString()===today&&(l.durationMins||0)>=1);
    const loggedToday=todaySchool.reduce((s,l)=>s+(l.durationMins||0),0);
    // Also count schoolDailyAccum if it's from today (covers sessions logged but pending post-school dialog)
    const accumToday=c.schoolDailyAccumDate===today?(c.schoolDailyAccum||0):0;
    const totalToday=Math.max(loggedToday, accumToday);
    schoolDone=totalToday>=minRequired;
    if(!schoolDone)schoolMissing=true;
  }
  const allMet=missing.length===0&&!schoolMissing;
  return{met:allMet,completed,missing,schoolDone,schoolMissing};
}

// DAILY BALANCE
// ═══════════════════════════════════════
function checkDailyBalance(cid){
  const c=child(cid);
  const balance=c.dailyBalance||{};
  if(!Object.keys(balance).length)return{configured:false,met:false,progress:[],total:0,done:0};
  const today=new Date().toDateString();
  // Count approved activities per category today
  const catCounts={};
  D.log.filter(l=>l.childId===cid&&l.type==='earn'&&l.status==='approved'&&new Date(l.ts).toDateString()===today)
    .forEach(l=>{
      const act=D.activities.find(a=>a.id===l.aid);
      if(act){catCounts[act.cat]=(catCounts[act.cat]||0)+1;}
    });
  const progress=Object.entries(balance).map(([catId,required])=>{
    const cat=D.categories.find(x=>x.id===catId);
    const done=Math.min(catCounts[catId]||0,required);
    return{catId,catName:cat?.name||catId,catEmoji:cat?.emoji||'📌',required,done,met:done>=required};
  });
  const done=progress.filter(p=>p.met).length;
  const total=progress.length;
  const met=done===total&&total>0;
  return{configured:true,met,progress,total,done};
}
function tryAwardDailyBalanceBonus(cid){
  const c=child(cid);
  const today=new Date().toISOString().split('T')[0];
  if(c.dailyBalanceBonusDate===today)return; // already awarded/queued today
  const bal=checkDailyBalance(cid);
  if(!bal.met)return;
  const pts=c.dailyBalanceBonusPts||5;
  D.log.unshift({id:uid(),childId:cid,type:'daily-balance-bonus',aid:null,
    actName:'🏆 Daily balance completed!',emoji:'🏆',
    points:pts,note:'All daily category minimums met',
    status:'pending',ts:new Date().toISOString()});
  c.dailyBalanceBonusDate=today;
  save();
  const c2=child(cid);
  notify(`🏆 ${c2.name} completed their daily balance!`,
    `${c2.name} has completed all required daily activities. Approve their bonus pts in ScreenTime Bank.`);
  // Refresh approvals count in UI
  const badge=document.querySelector('[data-tab="approvals"] span');
  if(badge){const n=allPending().length;badge.textContent=n||'';if(!n)badge.remove();}
}

function startActivityTimer(cid,aid){
  const c=child(cid);
  const act=D.activities.find(a=>a.id===aid);if(!act||!act.minMins)return;
  // Stop school timer if running
  if(c.timer&&c.timer.sessionType==='school'){stopSchoolSession(cid);return;}
  // Stop rec timer if running
  if(c.timer&&c.timer.sessionType==='recreation'){
    toast('⚠️ Stop your recreation session first');return;
  }
  if(c.timer&&c.timer.sessionType==='activity'){
    toast('⚠️ An activity timer is already running');return;
  }
  c.timer={startedAt:Date.now(),totalMs:act.minMins*60000,label:act.name,
    sessionType:'activity',activityId:aid,emoji:act.emoji};
  save();toast(`▶ ${act.emoji} ${act.name} timer started — ${act.minMins} min`);render();
}
function stopActivityTimer(cid){
  const c=child(cid);
  if(!c.timer||c.timer.sessionType!=='activity')return;
  const aid=c.timer.activityId;
  const act=D.activities.find(a=>a.id===aid);
  const elapsed=Math.max(0,Date.now()-c.timer.startedAt);
  const elapsedMins=Math.round(elapsed/60000);
  const minMins=act?.minMins||0;
  const bonusIntervalMins=act?.bonusIntervalMins||10;
  c.timer=null;
  if(elapsedMins<1){save();toast('Session too short — not logged');render();return;}
  // Regular pts awarded on completion of minimum time
  const regularPts=elapsedMins>=minMins?(act?.points||0):0;
  // Bonus pts for time beyond minimum
  const extraMins=Math.max(0,elapsedMins-minMins);
  const bonusIntervals=Math.floor(extraMins/bonusIntervalMins);
  const bonusPtsEarned=bonusIntervals*(act?.bonusPoints||0);
  D.log.unshift({id:uid(),childId:cid,type:'earn',aid,
    actName:`${act?.emoji||'⏱'} ${act?.name||'Activity'} (${elapsedMins} min)`,
    emoji:act?.emoji||'⏱',points:regularPts,bonusPoints:bonusPtsEarned,
    durationMins:elapsedMins,status:'pending',ts:new Date().toISOString()});
  save();
  let msg=`⏱ ${elapsedMins} min logged`;
  if(regularPts)msg+=` · +${regularPts}pts`;
  if(bonusPtsEarned)msg+=` · +${bonusPtsEarned}🌟 bonus`;
  msg+=' — pending approval';
  toast(msg);render();
}
function getActivityTimerState(c){
  if(!c||!c.timer||c.timer.sessionType!=='activity')return null;
  const elapsed=Math.max(0,Date.now()-c.timer.startedAt);
  const elapsedMins=elapsed/60000;
  const minMs=c.timer.totalMs;
  const remaining=minMs-elapsed;
  const goalMet=elapsed>=minMs;
  const bonusSecs=goalMet?Math.floor((elapsed-minMs)/1000):0;
  const pct=Math.min(1,elapsed/minMs);
  return{elapsedMins,goalMet,bonusSecs,remainSecs:Math.max(0,Math.floor(remaining/1000)),
    pct,label:c.timer.label,emoji:c.timer.emoji,activityId:c.timer.activityId};
}

function requestUnlock(cid){
  const req=checkRequirements(cid);
  const today=new Date().toISOString().split('T')[0];
  const entry={id:uid(),childId:cid,requestedAt:new Date().toISOString(),status:'pending',
    completed:req.completed.map(a=>({id:a.id,name:a.name,emoji:a.emoji})),
    missing:req.missing.map(a=>({id:a.id,name:a.name,emoji:a.emoji})),allMet:req.met};
  if(!D.pendingUnlocks)D.pendingUnlocks=[];
  D.pendingUnlocks=D.pendingUnlocks.filter(u=>!(u.childId===cid&&new Date(u.requestedAt).toDateString()===new Date().toDateString()));
  D.pendingUnlocks.push(entry);
  child(cid).dailyUnlock={date:today,status:'pending',requestId:entry.id};
  save();
  const c=child(cid);
  notify(`🔓 ${c.name} wants to start recreation`,
    `${c.name} has requested recreation time. Open ScreenTime Bank to approve.`);
  return entry;
}
function approveUnlock(uid_){
  const u=(D.pendingUnlocks||[]).find(x=>x.id===uid_);if(!u)return;
  u.status='approved';
  const c=child(u.childId);
  if(c.dailyUnlock)c.dailyUnlock.status='approved';
  save();toast(`✅ Recreation unlocked for ${c.name}`);render();
}
function denyUnlock(uid_){
  const u=(D.pendingUnlocks||[]).find(x=>x.id===uid_);if(!u)return;
  u.status='denied';
  const c=child(u.childId);
  if(c.dailyUnlock)c.dailyUnlock.status='denied';
  save();toast(`❌ Recreation denied for ${c.name}`);render();
}

function logActivity(cid,aid,note){
  const act=D.activities.find(a=>a.id===aid);if(!act)return;
  const c=child(cid);
  const bon=act.bonusPoints||0;
  D.log.unshift({id:uid(),childId:cid,type:'earn',aid,actName:act.name,emoji:act.emoji,
    points:act.points,bonusPoints:bon,note:note||'',status:act.approval?'pending':'approved',ts:new Date().toISOString()});
  if(!act.approval){
    c.points+=act.points;
    if(bon>0)c.bonusPts=(c.bonusPts||0)+bon;
    let msg=`+${act.points} pts`;
    if(bon>0)msg+=` +${bon}🌟 earned!`;
    else msg+=' earned! 🎉';
    toast(msg);
    tryAwardDailyBalanceBonus(cid);
  }else toast('Logged! Waiting for parent approval ⏳');
  save();render();
}
function buyTime(cid,bid){
  const blk=D.timeBlocks.find(b=>b.id===bid),c=child(cid);
  if(!blk||c.points<blk.points)return false;
  if(c.recDisabled){toast('🚫 Screen time purchases are currently disabled by a parent');return false;}
  // Check daily/weekly rec limits
  const rem=getRemainingRecMins(cid);
  if(rem.limited!==null&&rem.limited<=0){toast('🚫 Daily/weekly recreation limit reached');return false;}
  const actualMins=rem.limited!==null?Math.min(blk.minutes,rem.limited):blk.minutes;
  c.points-=blk.points;
  c.pendingMinutes=(c.pendingMinutes||0)+actualMins;
  D.log.unshift({id:uid(),childId:cid,type:'spend',actName:blk.name+' recreation time',
    emoji:blk.emoji,points:-blk.points,durationMins:actualMins,status:'approved',ts:new Date().toISOString()});
  if(actualMins<blk.minutes)toast(`⚠️ Only ${actualMins} min added — limit reached`);
  save();return true;
}
function addMinutesToTimer(cid,minutes,label){
  const c=child(cid);
  const remaining=Math.max(0,c.timer.totalMs-(Date.now()-c.timer.startedAt));
  c.timer.totalMs=remaining+(minutes*60000);c.timer.startedAt=Date.now();
  c.timer.label=c.timer.label+' +'+label;
}
function stopSchoolSession(cid){
  const c=child(cid);if(!c.timer||c.timer.sessionType!=='school')return;
  const elapsed=Math.max(0,Date.now()-c.timer.startedAt);
  const durationMins=Math.round(elapsed/60000);
  // Accumulate into daily total
  const today=new Date().toISOString().split('T')[0];
  if(c.schoolDailyAccumDate!==today){c.schoolDailyAccum=0;c.schoolDailyAccumDate=today;}
  c.schoolDailyAccum=(c.schoolDailyAccum||0)+durationMins;
  c.timer=null;
  const minMins=D.settings.schoolMinMins||1;
  if(durationMins>=minMins){
    pendingPostSchool={cid,durationMins};
    save();
    // Check if daily or weekly bonus should be queued
    tryAwardSchoolBonus(cid);
    render();
  }else{
    save();toast(`School session ended (under ${minMins} min — not logged)`);render();
  }
}

function tryAwardSchoolBonus(cid){
  const c=child(cid);
  const today=new Date().toISOString().split('T')[0];
  const ws=getWeekStart();
  const weekKey=ws.toISOString().split('T')[0];
  // Use schoolDailyAccum (includes just-stopped session, set before this is called)
  const totalToday=c.schoolDailyAccumDate===today?(c.schoolDailyAccum||0):0;
  const totalWeek=getWeekSchoolMins(cid);
  const pts=D.settings.schoolPointAmt||2;
  // Daily bonus: only if today exceeds daily GOAL (not just unlock min)
  if(c.schoolDailyGoal>0&&totalToday>c.schoolDailyGoal){
    const extraMins=totalToday-c.schoolDailyGoal;
    const intervals=Math.floor(extraMins/(D.settings.schoolPointMins||10));
    const alreadyDone=D.log.filter(l=>l.type==='school-bonus-daily'&&l.childId===cid&&new Date(l.ts).toDateString()===new Date().toDateString()).length;
    if(intervals>alreadyDone){
      const newIntervals=intervals-alreadyDone;
      for(let i=0;i<newIntervals;i++){
        D.log.unshift({id:uid(),childId:cid,type:'school-bonus-daily',
          actName:'🌟 Extra school time (daily bonus)',
          emoji:'🌟',points:pts,status:'pending',ts:new Date().toISOString()});
      }
      save();
    }
  }
  // Weekly bonus
  if(c.schoolMinWeek>0&&totalWeek>c.schoolMinWeek&&c.schoolWeeklyBonusDate!==weekKey){

function startSessionWithType(cid,sessionType){
  const c=child(cid);
  if(sessionType==='school'){
    // Stop any running recreation timer first
    if(c.timer&&c.timer.sessionType!=='school'){
      toast('Stopping recreation session to start school 🎓');c.timer=null;
    }
    if(c.timer&&c.timer.sessionType==='school'){toast('School session already running!');return;}
    // School timer runs down to the daily goal, then stops (bonus is separate)
    const today=new Date().toISOString().split('T')[0];
    const alreadyDone=c.schoolDailyAccumDate===today?(c.schoolDailyAccum||0):0;
    const dailyGoalMins=c.schoolDailyGoal||0;
    const remaining=dailyGoalMins>0?Math.max(1,dailyGoalMins-alreadyDone):480; // 8hr fallback if no goal
    c.timer={startedAt:Date.now(),totalMs:remaining*60000,label:'School session',sessionType:'school',dailyGoalAtStart:dailyGoalMins,alreadyDoneAtStart:alreadyDone};
    save();toast('🎓 School session started! Study hard!');render();return;
  }
  // Recreation
  if(c.timer&&c.timer.sessionType==='school'){
    stopSchoolSession(cid);
    return;
  }
  // Check screen time window
  if(c.recDisabled){
    toast('🚫 Screen time purchases are disabled — speak to a parent');return;
  }
  // Check time-of-day window
  if(c.recStart||c.recEnd){
    const now=new Date();
    const hhmm=now.getHours()*60+now.getMinutes();
    const toMins=t=>{ if(!t)return null; const[h,m]=t.split(':').map(Number); return h*60+m; };
    const start=toMins(c.recStart),end=toMins(c.recEnd);
    if(start!==null&&hhmm<start){
      const h=Math.floor(start/60),m=String(start%60).padStart(2,'0');
      toast(`🕐 Screen time not available until ${h}:${m}`);return;
    }
    if(end!==null&&hhmm>=end){
      const h=Math.floor(end/60),m=String(end%60).padStart(2,'0');
      toast(`🕐 Screen time ended for today at ${h}:${m}`);return;
    }
  }
  if(c.timer&&c.timer.sessionType==='recreation'){
    if(c.pendingMinutes>0){addMinutesToTimer(cid,c.pendingMinutes,'extra');c.pendingMinutes=0;save();toast('Time added! ⏱️');render();}
    return;
  }
  // Check requirements (includes school session requirement)
  const req=checkRequirements(cid);
  const today=new Date().toISOString().split('T')[0];
  if(req.met){
    const mins=c.pendingMinutes||60;
    startTimer(cid,mins,mins+'min recreation','recreation');
    c.pendingMinutes=0;save();toast('🎮 Recreation started!');render();return;
  }
  if(c.dailyUnlock&&c.dailyUnlock.date===today&&c.dailyUnlock.status==='approved'){
    const mins=c.pendingMinutes||60;
    startTimer(cid,mins,mins+'min recreation','recreation');
    c.pendingMinutes=0;save();toast('🎮 Recreation started!');render();return;
  }
  if(c.dailyUnlock&&c.dailyUnlock.date===today&&c.dailyUnlock.status==='pending'){toast('Still waiting for parent approval ⏳');return;}
  if(c.dailyUnlock&&c.dailyUnlock.date===today&&c.dailyUnlock.status==='denied'){toast('Recreation denied by parent today 🚫');return;}
  // Requirements not met — show specific reason before sending request
  if(req.schoolMissing){
    const minRequired=c.schoolMinDay>0?c.schoolMinDay:(D.settings.schoolMinMins||15);
    toast(`📚 You need at least ${minRequired} min of school first before recreation`);return;
  }
  if(req.missing&&req.missing.length>0){
    const names=req.missing.map(a=>a.emoji+' '+a.name).join(', ');
    toast(`⭐ Still need to complete: ${names}`);return;
  }
  requestUnlock(cid);toast('📬 Request sent to parent!');render();
}

function getActiveDaysThisWeek(cid){
  const ws=getWeekStart();
  const days=new Set(
    D.log.filter(l=>l.childId===cid&&(l.type==='earn'||l.type==='session-school')
      &&l.status==='approved'&&new Date(l.ts)>=ws)
      .map(l=>new Date(l.ts).toDateString())
  );
  return days.size;
}
function getDaysElapsedThisWeek(){
  // Mon=1 ... Sun=7, week starts Monday
  const day=new Date().getDay(); // 0=Sun
  return day===0?7:day; // Sun counts as day 7
}
function getWeeklyPocketMoneySuggestion(cid){
  const c=child(cid);
  const ws=getWeekStats(cid);
  const budget=c.weeklyBudget||0;
  if(!budget)return{suggested:0,pct:0,budget:0,activeDays:0,daysElapsed:0,minDays:c.minPayoutDays||4,canPayout:false};
  const activeDays=getActiveDaysThisWeek(cid);
  const daysElapsed=getDaysElapsedThisWeek();
  const minDays=c.minPayoutDays||4;
  const canPayout=activeDays>=minDays;

  // Score factors (0–1 each):
  // 1. Stewardship (school + clean rec days) — 40%
  const maxSteward=Math.max(1,(c.schoolDailyGoal||180)/30*7);
  const stewardPct=Math.min(1,ws.stewardshipScore/maxSteward);
  // 2. Active day spread — 30% (unique days with approved activity / 7)
  //    This cannot be gamed in one session — requires spread across the week
  const balPct=Math.min(1,activeDays/7);
  // 3. No overtime penalty — 20%
  const noOTPct=ws.penaltyDays===0?1:Math.max(0,1-(ws.penaltyDays/7));
  // 4. Weekly school goal — 10%
  const schoolPct=c.schoolMinWeek>0?Math.min(1,(ws.weekSchoolMins||0)/c.schoolMinWeek):1;

  const fullScore=stewardPct*0.4+balPct*0.3+noOTPct*0.2+schoolPct*0.1;
  // Scale by days elapsed: day 3 of 7 = 3/7 = 43% of full suggestion shown
  const dayScale=Math.min(1,daysElapsed/7);
  const suggested=canPayout?Math.round(budget*fullScore*dayScale*10)/10:0;

  return{
    suggested,
    pct:Math.round(fullScore*100),
    budget,
    activeDays,
    daysElapsed,
    minDays,
    canPayout,
    dayScale:Math.round(dayScale*100),
    stewardPct:Math.round(stewardPct*100),
    balPct:Math.round(balPct*100),
    noOTPct:Math.round(noOTPct*100),
    schoolPct:Math.round(schoolPct*100),
  };
}

// walletBalance = total owed (earned - paid out)
// getWeeklyEarned = cashouts approved + pocket money recorded this week
// getWeeklyPaidOut = physical payouts this week
// Budget cap applies to earned total (not paid out)

function getWeeklyEarned(cid){
  const ws=getWeekStart();
  return D.log.filter(l=>l.childId===cid&&
    (l.type==='pocket-money'||l.type==='bonus-to-cash')&&

function getTotalEarned(cid){
  return D.log.filter(l=>l.childId===cid&&
    (l.type==='pocket-money'||l.type==='bonus-to-cash')&&l.status==='approved')
    .reduce((s,l)=>s+(l.amount||0),0);

function getTotalPaidOut(cid){

function isPocketMoneyDay(c){
  return new Date().getDay()===(c.pocketMoneyDay??5);
}
function payoutPocketMoney(cid,amount,method){
  const c=child(cid);
  const alreadyEarned=getWeeklyEarned(cid);
  const remaining=Math.max(0,(c.weeklyBudget||0)-alreadyEarned);
  const actual=Math.min(amount,remaining);
  if(actual<=0){toast('Weekly budget cap reached for this week');return;}
  const payoutId=uid();
  // Record pocket money credit + physical payout as paired reversible entries
  D.log.unshift({id:uid(),childId:cid,type:'pocket-money',
    actName:`💰 Pocket money: R${actual.toFixed(2)}`,emoji:'💰',
    points:0,amount:actual,method,status:'approved',pairId:payoutId,ts:new Date().toISOString()});
  D.log.unshift({id:uid(),childId:cid,type:'physical-payout',
    actName:`💸 Paid out — ${method||'Cash'}: R${actual.toFixed(2)}`,emoji:'💸',
    points:0,amount:actual,method:method||'Cash',status:'paid',pairId:payoutId,ts:new Date().toISOString()});
  // walletBalance stays 0 (credit and debit cancel out for pocket money)
  if(actual<amount)toast(`💰 R${actual.toFixed(2)} paid (budget cap applied)`);
  else toast(`💰 R${actual.toFixed(2)} paid to ${c.name} via ${method||'Cash'} ✅`);
  save();render();
}
function reversePayout(pairId){
  // Find the paired pocket-money and physical-payout entries
  const entries=D.log.filter(l=>l.pairId===pairId);
  if(!entries.length){toast('Cannot find payout entries to reverse');return;}
  const pmEntry=entries.find(l=>l.type==='pocket-money');
  const poEntry=entries.find(l=>l.type==='physical-payout');
  if(!pmEntry||!poEntry){toast('Partial payout — cannot auto-reverse');return;}
  // Only reversible within 24 hours
  const age=Date.now()-new Date(pmEntry.ts).getTime();
  if(age>24*60*60*1000){toast('Reversal only allowed within 24 hours of payout');return;}
  const c=child(pmEntry.childId);
  // Remove both entries
  D.log=D.log.filter(l=>l.pairId!==pairId);
  toast(`↩ Payout of R${(pmEntry.amount||0).toFixed(2)} reversed for ${c.name}`);
  save();render();
}
function recordPhysicalPayout(cid,amount,method){
  const c=child(cid);
  const owed=c.walletBalance||0;
  const actual=Math.min(amount,owed);
  if(actual<=0){toast('Nothing owed — wallet is clear');return;}
  c.walletBalance=Math.max(0,owed-actual);
  c.pocketMoneyNotify=false;
  const payoutId=uid();
  D.log.unshift({id:uid(),childId:cid,type:'physical-payout',
    actName:`💸 Paid out — ${method}: R${actual.toFixed(2)}`,emoji:'💸',
    points:0,amount:actual,method,status:'paid',pairId:payoutId,ts:new Date().toISOString()});
  save();toast(`💸 R${actual.toFixed(2)} paid to ${c.name} via ${method} ✅`);render();
}
// Convert bonus points to wallet credit — AUTO-APPROVED, no parent needed
function convertBonusToCash(cid,pts){
  const c=child(cid);
  if((c.bonusPts||0)<pts){toast('Not enough bonus points');return;}
  const rate=c.pointsPerRand||10;
  const rand=Math.round((pts/rate)*100)/100;
  c.bonusPts=Math.max(0,(c.bonusPts||0)-pts);
  c.walletBalance=(c.walletBalance||0)+rand;
  D.log.unshift({id:uid(),childId:cid,type:'bonus-to-cash',

    emoji:'🌟',points:0,amount:rand,bonusPtsUsed:pts,status:'approved',
    ts:new Date().toISOString()});

}

function goalTargetPts(goal,c){
  if(goal.targetRand){return Math.ceil(goal.targetRand*(c.pointsPerRand||10));}
  return goal.targetPts||100;
}
function goalTotalSaved(goal,c){
  const rate=c.pointsPerRand||10;
  const bonusPts=goal.bonusPtsSaved||0;
  const childMoney=(goal.childMoneySaved||0);
  const parentMatch=(goal.parentMatched||0);
  return bonusPts+Math.round((childMoney+parentMatch)*rate);
}
function addBonusPtsToGoal(cid,goalId,pts){
  const c=child(cid);
  if((c.bonusPts||0)<pts){toast('Not enough bonus points');return;}
  const goal=c.goals.find(g=>g.id===goalId);if(!goal)return;
  const rate=c.pointsPerRand||10;
  const randValue=pts/rate;
  c.bonusPts=Math.max(0,(c.bonusPts||0)-pts);
  goal.bonusPtsSaved=(goal.bonusPtsSaved||0)+pts;
  D.log.unshift({id:uid(),childId:cid,type:'goal-bonus-pts',
    actName:`🌟 Bonus pts saved → ${goal.name}: ${pts} pts`,
    emoji:'🌟',points:0,goalId,randValue,status:'approved',ts:new Date().toISOString()});
  const totalSaved=goalTotalSaved(goal,c);
  const targetPts=goalTargetPts(goal,c);
  if(totalSaved>=targetPts&&!goal.completedAt){
    goal.completedAt=new Date().toISOString();
    toast(`🎉 Goal reached! "${goal.name}" fully saved!`);
  }else{
    toast(`🌟 ${pts} bonus pts saved → R${randValue.toFixed(2)} toward "${goal.name}"`);
  }
  save();render();
}
function addMoneyToGoal(cid,goalId,amount){
  const c=child(cid);

  const goal=c.goals.find(g=>g.id===goalId);if(!goal)return;

function approve(lid){

  const btn=conn?`<button class="btn btn-ghost" style="padding:4px 10px;font-size:.72rem;flex-shrink:0" data-a="sign-out">Sign out</button>`
    :`<button class="btn btn-primary" style="padding:4px 10px;font-size:.72rem;flex-shrink:0" data-a="sign-in">🔗 Sync Drive</button>`;
  return`<div id="sync-bar" class="sync-bar ${s.cls}"><div class="sync-left"><div class="sync-dot"></div><div class="sync-text">${s.icon} ${s.lbl}${liveIndicator}</div></div>${btn}</div>`;
}

  let html='';
  if(view==='loading')html=rLoading();
  else if(view==='home')html=buildSyncBar()+rHome();
  else if(view==='leaderboard')html=rLeaderboard();
  else if(view==='wallet')html=rWallet();
  else if(view==='goals')html=rGoals();
  else if(view==='child')html=rChild();
  else if(view==='log')html=rLog();
  else if(view==='buy')html=rBuy();
  else if(view==='pin')html=rPin();

// ── HOME ──────────────────────────────
function rHome(){
  const ap=allPending().length+allUnlockPending().length;
  const cards=D.children.map(c=>{
    const pend=pending4(c.id);
    const ts=getTimerState(c);
    const ws=getWeekStats(c.id);
    const unlock=c.dailyUnlock;
    const badges=[];
    if(pend.length)badges.push(`<span class="badge-pill badge-pending">${pend.length} pending</span>`);
    if(allUnlockPending().filter(u=>u.childId===c.id).length)badges.push(`<span class="badge-pill badge-unlock">🔓 unlock req</span>`);
    if(ts)badges.push(`<span class="badge-pill ${ts.isOvertime?'badge-timer-ot':'badge-timer-active'}" data-timer-badge="${c.id}">${ts.isOvertime?'⚠️ -':'▶ '}${fmtSecs(ts.secsRemaining)}</span>`);
    if(ws.cleanDays>0&&!ts?.isOvertime)badges.push(`<span class="badge-pill badge-steward">🌿 ${ws.cleanDays}d</span>`);
    const bal=checkDailyBalance(c.id);
    if(bal.configured){
      if(bal.met)badges.push(`<span class="badge-pill" style="background:rgba(245,158,11,.25);color:#FCD34D">🏆 balance!</span>`);
      else if(bal.done>0)badges.push(`<span class="badge-pill" style="background:rgba(100,116,139,.2);color:var(--muted)">🏆 ${bal.done}/${bal.total}</span>`);
    }
    if(isPocketMoneyDay(c))badges.push(`<span class="badge-pill" style="background:rgba(16,185,129,.25);color:#6EE7B7">🎉 Payday!</span>`);
    if((c.walletBalance||0)>0)badges.push(`<span class="badge-pill" style="background:rgba(245,158,11,.2);color:var(--gold)">💰 R${c.walletBalance.toFixed(2)} owed</span>`);
    if(c.recDisabled)badges.push(`<span class="badge-pill" style="background:rgba(239,68,68,.25);color:#FCA5A5">🚫 no screen time</span>`);
    if(unlock?.status==='approved'&&!ts)badges.push(`<span class="badge-pill badge-unlock">✅ recreation ok</span>`);
    return`<div class="child-card anim-pop" style="background:${c.bg};border-color:${c.color}55" data-a="go-child" data-cid="${c.id}">
      <div class="corner-badges">${badges.join('')}</div>
      <div class="child-card-inner">
        <div class="child-avatar">${c.emoji}</div>
        <div style="flex:1">
          <div class="child-name">${c.name}</div>
          <div class="child-meta"><strong>${c.points}</strong> pts${(c.bonusPts||0)>0?` · 🌟 ${c.bonusPts}`:''} ${c.walletBalance>0?`· 💰 R${c.walletBalance.toFixed(2)}`:''} ${ts?` · ${ts.sessionType==='school'?'🎓':'🎮'} ${ts.isOvertime?'OVERTIME':'running'}`:''}${c.pendingMinutes>0&&!ts?` · ${c.pendingMinutes}min banked`:''}</div>
        </div>
        <div style="color:rgba(255,255,255,.5);font-size:1.4rem">›</div>
      </div>
    </div>`;
  }).join('');
  return`<div class="home-hero anim-pop"><h1>ScreenTime Bank 🏦</h1><p>Earn points · Buy screen time</p></div>
  ${cards}
  <button class="lb-btn" data-a="go-leaderboard">🏆 Leaderboard <span style="opacity:.7;font-weight:600;font-size:.82rem">· this week</span></button>
  <button class="parent-btn" data-a="go-pin">🔐 Parent Mode
    ${ap?`<span style="background:#EF4444;color:#fff;border-radius:50px;padding:1px 8px;font-size:.7rem;margin-left:4px">${ap}</span>`:''}
  </button>`;
}

// ── LEADERBOARD ───────────────────────
function rLeaderboard(){
  const stats=D.children.map(c=>{const ws=getWeekStats(c.id);return{c,ws,combined:ws.weekPts+ws.stewardshipScore*3};});
  stats.sort((a,b)=>b.combined-a.combined);
  const maxPts=Math.max(1,...stats.map(s=>s.ws.weekPts));
  const rankEmoji=['👑','🥈','🥉'];
  const rows=stats.map((s,i)=>{
    const pct=Math.round((s.ws.weekPts/maxPts)*100);
    return`<div class="lb-row">
      <div class="lb-rank">${rankEmoji[i]||i+1}</div>
      <div class="lb-avatar" style="background:${s.c.bg}">${s.c.emoji}</div>
      <div style="flex:1;min-width:0">
        <div class="lb-name">${s.c.name}</div>
        <div class="lb-stats">🌿 ${s.ws.stewardshipMins||0} responsible min · ${s.ws.cleanDays} clean days</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:${s.c.color}"></div></div>
      </div>
      <div class="lb-score">
        <div class="lb-pts">${s.ws.weekPts}<span style="font-size:.7rem;color:var(--muted)">pts</span></div>
        <div class="lb-sub">🌿 score: ${s.ws.stewardshipScore}</div>
      </div>
    </div>`;
  }).join('');
  const ws=getWeekStart();
  const weekKey=ws.toISOString().split('T')[0];
  const winnerAlreadyAwarded=stats.length&&stats[0].c.weeklyWinnerBonusDate===weekKey;
  return`<div class="header">
    <button class="back-btn" data-a="go-back">←</button>
    <h2>🏆 Leaderboard</h2>
  </div>
  <div style="text-align:center;padding:10px 14px 4px;font-size:.8rem;color:var(--muted)">Week of ${ws.toLocaleDateString('en-ZA',{day:'numeric',month:'short'})}</div>
  <div class="lb-card">${rows}</div>
  ${!winnerAlreadyAwarded?`<div style="margin:0 14px">
    <button class="btn btn-success btn-full" data-a="award-leaderboard-winner">👑 Award Weekly Winner Bonus (10 bonus pts)</button>
  </div>`:`<div style="margin:0 14px;text-align:center;font-size:.8rem;color:var(--success);padding:8px">👑 Winner bonus already awarded this week</div>`}
  <div class="card" style="margin-top:6px">
    <div style="font-size:.8rem;color:var(--muted);line-height:1.7">
      <strong style="color:var(--text)">How it's calculated:</strong><br>
      🪙 Weekly points earned<br>
      🌿 Stewardship score = responsible device minutes ÷ 30 (school + clean recreation)<br>
      👑 = combined highest score this week
    </div>
  </div>`;
}

// ── TIMER WIDGET ─────────────────────
function rTimerWidget(cid){
  const c=child(cid);
  if(!c||!c.timer)return'';
  if(c.timer.sessionType==='school'){
    const sts=getSchoolTimerState(cid);
    if(!sts)return'';
    const circ=2*Math.PI*23;
    const offset=circ*(1-sts.dailyPct);
    // Main goal section
    let mainLabel,mainSecs,mainColor,mainIcon,subText;
    if(!sts.dailyGoal){
      mainLabel='🎓 SCHOOL SESSION';mainSecs=sts.sessionSecs;mainColor='#60A5FA';mainIcon='🎓';
      subText=`Session: ${fmtSecs(sts.sessionSecs)}`;
    }else if(!sts.goalMet){
      mainLabel='🎓 DAILY GOAL';mainSecs=sts.dailyRemainSecs;mainColor='#60A5FA';mainIcon='🎓';
      subText=`Today: ${Math.round(sts.totalTodayMins)} min done · Goal: ${sts.dailyGoal} min`;
    }else{
      mainLabel='✅ DAILY GOAL MET!';mainSecs=0;mainColor='var(--success)';mainIcon='✅';
      subText=`${sts.dailyGoal} min completed today 🎉`;
    }
    // Separate bonus timer section (only shows when goal met)
    const bonusHtml=sts.goalMet?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.12)">
      <div style="font-size:.64rem;text-transform:uppercase;letter-spacing:1px;font-weight:800;color:var(--gold);margin-bottom:3px">🌟 BONUS TIME</div>
      <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--gold)" data-school-bonus="${cid}">+${fmtSecs(sts.bonusSecs)}</div>
      <div style="font-size:.68rem;color:rgba(255,255,255,.5)">Extra school time earns bonus pts</div>
    </div>`:'';
    // Week sub-timer
    const weekHtml=sts.weekGoal>0?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)">
      <div style="font-size:.64rem;text-transform:uppercase;letter-spacing:1px;font-weight:800;color:rgba(167,139,250,.9);margin-bottom:2px">
        ${sts.weekGoalMet?'🌟 WEEKLY BONUS':'📅 WEEKLY GOAL'}</div>
      <div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:rgba(167,139,250,.9)" data-school-week="${cid}">
        ${sts.weekGoalMet?'+'+fmtSecs(sts.weekBonusSecs):fmtSecs(sts.weekRemainSecs||0)}</div>
      <div style="font-size:.65rem;color:rgba(255,255,255,.4)">Week goal: ${sts.weekGoal} min</div>
    </div>`:'';
    return`<div class="timer-widget active anim-pop" data-timer-cid="${cid}" style="border-color:#60A5FA55;background:rgba(96,165,250,.06)">
      <div style="flex:1;min-width:0">
        <div class="timer-label" style="color:${mainColor}">${mainLabel}</div>
        <div class="timer-display" style="color:${mainColor}" data-school-main="${cid}">
          ${sts.goalMet?'✓':fmtSecs(sts.dailyGoal?sts.dailyRemainSecs:sts.sessionSecs)}
        </div>
        <div style="font-size:.75rem;font-weight:700;color:rgba(255,255,255,.7);margin-top:2px">${subText}</div>
        ${bonusHtml}${weekHtml}
        <div style="margin-top:10px;display:flex;gap:7px">
          <button class="btn btn-ghost" style="flex:1;padding:7px;font-size:.78rem" data-a="stop-school" data-cid="${cid}">⏹ Stop Session</button>
          <button class="btn btn-ghost" style="padding:7px 10px;font-size:.78rem;color:var(--gold)" data-a="flag-school-timer" data-cid="${cid}">🚩 Flag</button>
        </div>
      </div>
      <div class="ring-wrap">
        <svg width="54" height="54" viewBox="0 0 54 54">
          <circle class="ring-track" cx="27" cy="27" r="23"/>
          <circle class="ring-prog" cx="27" cy="27" r="23"
            stroke="${sts.goalMet?'var(--success)':'#60A5FA'}"
            style="stroke-dasharray:${circ};stroke-dashoffset:${offset}" data-school-ring="${cid}"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem">${mainIcon}</div>
      </div>
    </div>`;
  }
  // Activity timer
  if(c.timer.sessionType==='activity'){
    const ats=getActivityTimerState(c);if(!ats)return'';
    const circ=2*Math.PI*23;
    const offset=circ*(1-ats.pct);
    const act=D.activities.find(a=>a.id===ats.activityId);
    const bonusIntMins=act?.bonusIntervalMins||10;
    return`<div class="timer-widget active anim-pop" data-timer-cid="${cid}" style="border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.05)">
      <div style="flex:1;min-width:0">
        <div class="timer-label" style="color:#A78BFA">${ats.goalMet?'⭐ BONUS TIME':'⏱ ACTIVITY TIMER'}</div>
        <div class="timer-display" style="color:${ats.goalMet?'var(--gold)':'#A78BFA'}" data-act-main="${cid}">
          ${ats.goalMet?'+'+fmtSecs(ats.bonusSecs):fmtSecs(ats.remainSecs)}
        </div>
        <div style="font-size:.78rem;color:rgba(255,255,255,.75);margin-top:2px">${ats.emoji} ${ats.label}</div>
        ${ats.goalMet&&act?.bonusPoints?`<div style="font-size:.72rem;color:var(--gold);margin-top:3px">+${act.bonusPoints}🌟 every ${bonusIntMins} min extra</div>`:''}
        <div style="margin-top:10px">
          <button class="btn btn-ghost" style="padding:7px 12px;font-size:.78rem" data-a="stop-activity-timer" data-cid="${cid}">⏹ Stop & Log</button>
        </div>
      </div>
      <div class="ring-wrap">
        <svg width="54" height="54" viewBox="0 0 54 54">
          <circle class="ring-track" cx="27" cy="27" r="23"/>
          <circle class="ring-prog" cx="27" cy="27" r="23"
            stroke="${ats.goalMet?'var(--gold)':'#A78BFA'}"
            style="stroke-dasharray:${circ};stroke-dashoffset:${offset}" data-act-ring="${cid}"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem">${ats.emoji}</div>
      </div>
    </div>`;
  }
  // Recreation timer
  const ts=getTimerState(c);if(!ts)return'';
  const circ=2*Math.PI*23;const offset=circ*(1-ts.pct);
  const cls=ts.isOvertime?'overtime':'active';
  return`<div class="timer-widget ${cls} anim-pop" data-timer-cid="${cid}">
    <div style="flex:1;min-width:0">
      <div class="timer-label">${ts.isOvertime?'⚠️ OVERTIME':'🎮 RECREATION'}</div>
      <div class="timer-display">${ts.isOvertime?'-':''}${fmtSecs(ts.secsRemaining)}</div>
      <div class="timer-session-type">${ts.label}</div>
      <div class="timer-sub">${ts.isOvertime?'⚠️ Time is up! Ask a parent to reset':'Time remaining'}</div>
      <div style="margin-top:8px">
        <button class="btn btn-ghost" style="padding:7px 12px;font-size:.78rem" data-a="stop-rec-early" data-cid="${cid}">⏹ Stop Early</button>
      </div>
    </div>
    <div class="ring-wrap">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle class="ring-track" cx="27" cy="27" r="23"/>
        <circle class="ring-prog" cx="27" cy="27" r="23"
          stroke="${ts.isOvertime?'var(--danger)':'var(--success)'}"
          style="stroke-dasharray:${circ};stroke-dashoffset:${offset}"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem">
        ${ts.isOvertime?'⚠️':'📱'}
      </div>
    </div>
  </div>`;
}

// ── CHILD DASHBOARD ───────────────────

// ── LOG ACTIVITY ──────────────────────
function rLog(){
  const c=child(childId);
  const allCats=[{id:'all',name:'All',emoji:'🌈'},...D.categories];
  const acts=filterCat==='all'?D.activities:D.activities.filter(a=>a.cat===filterCat);
  const reqIds=new Set(c.requirements||[]);
  const bal=checkDailyBalance(childId);
  // Build balance state per category: how many done vs required
  const balState={};  // catId -> {done, required, met}
  bal.progress.forEach(p=>{balState[p.catId]={done:p.done,required:p.required,met:p.met,name:p.catName,emoji:p.catEmoji};});
  const balNeeded={};
  bal.progress.forEach(p=>{if(!p.met)balNeeded[p.catId]=p.required-p.done;});
  const hasBalance=bal.configured&&bal.progress.length>0;
  const hasReqs=reqIds.size>0;

  // Progress summary for daily balance
  const balSummary=hasBalance?`<div class="card" style="padding:11px 14px;border-color:${bal.met?'var(--success)44':'rgba(167,139,250,.35)'};background:${bal.met?'rgba(16,185,129,.05)':'rgba(167,139,250,.04)'}">
    <div style="font-weight:800;font-size:.88rem;margin-bottom:8px;color:${bal.met?'var(--success)':'#A78BFA'}">
      🏆 Daily Balance ${bal.met?'— Complete! ✅':`— ${bal.done}/${bal.total} categories done`}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${bal.progress.map(p=>`<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;
        border:1px solid ${p.met?'var(--success)':'rgba(167,139,250,.4)'};
        background:${p.met?'rgba(16,185,129,.1)':'rgba(167,139,250,.08)'}">
        <span style="font-size:.85rem">${p.catEmoji}</span>
        <span style="font-size:.78rem;font-weight:700;color:${p.met?'var(--success)':'#A78BFA'}">${p.catName}</span>
        <span style="font-size:.8rem;font-weight:900;color:${p.met?'var(--success)':'var(--text)'}">
          ${p.done}/${p.required}</span>
        ${p.met?'<span style="font-size:.75rem">✓</span>':`<span style="font-size:.72rem;color:#A78BFA;font-weight:800">need ${p.required-p.done}</span>`}
      </div>`).join('')}
    </div>
  </div>`:'';

  return`<div class="header">
    <button class="back-btn" data-a="go-back">←</button>
    <h2>Log Activity</h2>
    <div class="balance-chip">🪙 ${c.points}</div>
  </div>
  ${balSummary}
  ${hasReqs?`<div style="padding:5px 14px 0;font-size:.73rem;color:var(--gold);font-weight:800">⭐ = required before recreation</div>`:''}
  <div class="cat-filter">${allCats.map(ct=>{
    const bs=balState[ct.id];
    const needsWork=bs&&!bs.met;
    const catDone=bs&&bs.met;
    return`<button class="cat-chip ${filterCat===ct.id?'active':''}" data-a="filter" data-cat="${ct.id}"
      style="${needsWork?'border-color:rgba(167,139,250,.5)':catDone?'border-color:var(--success)44':''}">
      ${ct.emoji} ${ct.name}${bs?` <span style="font-size:.65rem;opacity:.8">${bs.done}/${bs.required}</span>`:''}
    </button>`;
  }).join('')}</div>
  <div>${acts.map(a=>{
    const isReq=reqIds.has(a.id);
    const bs=balState[a.cat];
    const stillNeeded=bs&&!bs.met?bs.required-bs.done:0;
    const catDone=bs&&bs.met;
    const highlight=isReq||(bs&&!bs.met);
    const tags=[];
    if(isReq)tags.push(`<span style="font-size:.68rem;background:var(--gold);color:#1A1000;border-radius:50px;padding:1px 7px;font-weight:800">⭐ Required</span>`);
    if(bs&&!bs.met)tags.push(`<span style="font-size:.68rem;background:rgba(167,139,250,.25);color:#A78BFA;border-radius:50px;padding:1px 7px;font-weight:800">🏆 need ${stillNeeded} more</span>`);
    if(catDone&&bs)tags.push(`<span style="font-size:.68rem;background:rgba(16,185,129,.2);color:var(--success);border-radius:50px;padding:1px 7px;font-weight:800">✓ done</span>`);
    return`<div class="act-item" data-a="log-act" data-aid="${a.id}"
      style="${highlight?`border-color:${isReq?'var(--gold)':'rgba(167,139,250,.5)'};background:${isReq?'rgba(245,158,11,.04)':'rgba(167,139,250,.04)'}`:catDone?'border-color:var(--success)22;background:rgba(16,185,129,.02)':''}">
      <div class="act-emoji" style="background:${catColor(a.cat)}22">${a.emoji}</div>
      <div class="act-info">
        <div class="act-name">${a.name}${tags.length?' ':''} ${tags.join(' ')}</div>
        <div class="act-meta">${catName(a.cat)} · ${a.approval?'⏳ Needs approval':'✅ Auto-approved'}</div>
      </div>
      <div class="act-pts">+${a.points}</div>
    </div>`;
  }).join('')||'<div class="empty-state"><div class="icon">🔍</div><p>Nothing here</p></div>'}</div>`;
}

    const c=child(u.childId);

      <div class="row" style="margin-bottom:8px">
