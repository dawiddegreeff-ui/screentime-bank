function transferGoalFunds(cid,fromGid,toGid,moneyAmount,bonusPtsAmount){
  const c=child(cid);
  const from=c.goals.find(g=>g.id===fromGid);
  const to=c.goals.find(g=>g.id===toGid);
  if(!from||!to)return;

  // Transfer real money (realMoneySaved) — triggers parent match if going to a real goal
  if(moneyAmount>0){
    const avail=from.realMoneySaved||0;
    const actual=Math.min(moneyAmount,avail);
    if(actual>0){
      from.realMoneySaved=Math.max(0,avail-actual);
      // Proportionally reduce parentMatched when real money leaves a goal
      if(!from.isSavingsPocket&&(from.parentMatched||0)>0){
        const matchPct=(c.goalMatchPct||0)/100;
        const matchReduction=Math.min(from.parentMatched,Math.round(actual*matchPct*100)/100);
        if(matchReduction>0){
          from.parentMatched=Math.max(0,(from.parentMatched||0)-matchReduction);
          D.log.unshift({id:uid(),childId:cid,type:'goal-parent-match',
            actName:'🤝 Parent match reduced: −R'+matchReduction.toFixed(2)+' from '+from.name,
            emoji:'🤝',points:0,goalId:from.id,amount:-matchReduction,status:'approved',ts:new Date().toISOString()});
        }
      }
      if(to.isSavingsPocket){
        // Goal → Savings Pocket: real money goes into savings pocket real money bucket
        to.realMoneySaved=(to.realMoneySaved||0)+actual;
        D.log.unshift({id:uid(),childId:cid,type:'goal-money',
          actName:'🏦 R'+actual.toFixed(2)+' real money: '+from.name+' → Savings Pocket',
          emoji:'🏦',points:0,amount:actual,source:'real',status:'approved',ts:new Date().toISOString()});
      } else if(from.isSavingsPocket){
        // Savings Pocket → Goal: put into wallet then save (triggers match)
        c.walletBalance=(c.walletBalance||0)+actual;
        addMoneyToGoal(cid,toGid,actual,false);
        return; // addMoneyToGoal handles save/render
      } else {
        // Goal → Goal: direct transfer of real money, no extra match
        to.realMoneySaved=(to.realMoneySaved||0)+actual;
        D.log.unshift({id:uid(),childId:cid,type:'goal-money',
          actName:'🔄 R'+actual.toFixed(2)+' real money: '+from.name+' → '+to.name,
          emoji:'🔄',points:0,amount:actual,status:'approved',ts:new Date().toISOString()});
      }
    }
  }

  // Transfer bonus money (bonusMoneySaved) — never gets parent matched
  if(bonusPtsAmount>0){
    const avail=from.bonusMoneySaved||0;
    const actual=Math.min(bonusPtsAmount,avail);
    if(actual>0){
      from.bonusMoneySaved=Math.max(0,avail-actual);
      if(to.isSavingsPocket){
        to.bonusMoneySaved=(to.bonusMoneySaved||0)+actual;
      } else if(from.isSavingsPocket){
        to.bonusMoneySaved=(to.bonusMoneySaved||0)+actual;
        D.log.unshift({id:uid(),childId:cid,type:'goal-money',
          actName:'🌟 R'+actual.toFixed(2)+' bonus money → '+to.name,
          emoji:'🌟',points:0,amount:actual,source:'bonus',status:'approved',ts:new Date().toISOString()});
      } else {
        to.bonusMoneySaved=(to.bonusMoneySaved||0)+actual;
        D.log.unshift({id:uid(),childId:cid,type:'goal-money',
          actName:'🔄 R'+actual.toFixed(2)+' bonus money: '+from.name+' → '+to.name,
          emoji:'🌟',points:0,amount:actual,source:'bonus',status:'approved',ts:new Date().toISOString()});
      }
    }
  }

  // Transfer bonus pts (bonusPtsSaved) — unconverted pts
  const bpAvail=from.bonusPtsSaved||0;
  const bpActual=Math.min(bonusPtsAmount||0,bpAvail);
  if(bpActual>0&&!bonusPtsAmount){ // legacy path
    from.bonusPtsSaved=Math.max(0,bpAvail-bpActual);
    if(to.isSavingsPocket){c.bonusPts=(c.bonusPts||0)+bpActual;}
    else{to.bonusPtsSaved=(to.bonusPtsSaved||0)+bpActual;}
  }

  save();render();
}


function deleteGoalWithReturn(cid, gid, returnMoney, returnBonus){
  const c=child(cid);
  const g=c.goals.find(x=>x.id===gid);
  if(!g)return;
  const rate=c.pointsPerRand||10;
  const money=g.realMoneySaved||0;
  const bonus=g.bonusPtsSaved||0;
  if(returnMoney&&money>0){
    c.walletBalance=(c.walletBalance||0)+money;
    D.log.unshift({id:uid(),childId:cid,type:'pocket-money',
      actName:'🗑 Goal deleted — R'+money.toFixed(2)+' returned to wallet from '+g.name,
      emoji:'💰',points:0,amount:money,status:'approved',ts:new Date().toISOString()});
  }
  if(returnBonus&&bonus>0){
    c.bonusPts=(c.bonusPts||0)+bonus;
    D.log.unshift({id:uid(),childId:cid,type:'goal-bonus-pts',
      actName:'🗑 Goal deleted — '+bonus+' bonus pts returned from '+g.name,
      emoji:'🌟',points:bonus,status:'approved',ts:new Date().toISOString()});
  }
  c.goals=c.goals.filter(x=>x.id!==gid);
  save();toast('Goal deleted');render();
}
function goalTotalSaved(goal,c){
  const rate=c.pointsPerRand||10;
  const bonusPts=goal.bonusPtsSaved||0;
  const realMoney=goal.realMoneySaved||0;
  const bonusMoney=goal.bonusMoneySaved||0;
  const parentMatch=goal.parentMatched||0;
  return bonusPts+Math.round((realMoney+bonusMoney+parentMatch)*rate);
}

function addBonusPtsToGoal(cid,goalId,pts){
  const c=child(cid);
  if((c.bonusPts||0)<pts){toast('Not enough bonus points');return;}
  const goal=c.goals.find(g=>g.id===goalId);if(!goal)return;
  const rate=c.pointsPerRand||10;
  const randValue=Math.round((pts/rate)*100)/100;
  c.bonusPts=Math.max(0,(c.bonusPts||0)-pts);
  // Bonus pts convert to bonus money in goal — no parent match
  goal.bonusMoneySaved=(goal.bonusMoneySaved||0)+randValue;
  D.log.unshift({id:uid(),childId:cid,type:'goal-bonus-pts',
    actName:'🌟 '+pts+' bonus pts → R'+randValue.toFixed(2)+' bonus money → '+goal.name,
    emoji:'🌟',points:pts,goalId,amount:randValue,source:'bonus-pts',
    status:'approved',ts:new Date().toISOString()});
  const totalSaved=goalTotalSaved(goal,c);
  const targetPts=goalTargetPts(goal,c);
  if(totalSaved>=targetPts&&!goal.completedAt){
    goal.completedAt=new Date().toISOString();
    toast('🎉 Goal "'+goal.name+'" reached!');
  }else{
    toast('🌟 '+pts+' bonus pts → R'+randValue.toFixed(2)+' bonus money added to "'+goal.name+'"!');
  }
  save();render();
}
function addMoneyToGoal(cid,goalId,amount,isBonusMoney){
  const c=child(cid);
  const goal=c.goals.find(g=>g.id===goalId);
  if(!goal){toast('Goal not found');return;}
  if(!amount||amount<=0){toast('Invalid amount');return;}

  if(isBonusMoney){
    // Bonus money — no parent match, goes into goal bonusMoneySaved
    goal.bonusMoneySaved=(goal.bonusMoneySaved||0)+amount;
    D.log.unshift({id:uid(),childId:cid,type:'goal-money',
      actName:'🌟 R'+amount.toFixed(2)+' bonus money → '+goal.name,
      emoji:'🌟',points:0,goalId,amount,source:'bonus',status:'approved',ts:new Date().toISOString()});
    toast('🌟 R'+amount.toFixed(2)+' bonus money saved to "'+goal.name+'"!');
  } else {
    // Real money — must come from wallet
    if((c.walletBalance||0)<amount-0.001){toast('Not enough in wallet');return;}
    c.walletBalance=Math.max(0,(c.walletBalance||0)-amount);
    goal.realMoneySaved=(goal.realMoneySaved||0)+amount;
    D.log.unshift({id:uid(),childId:cid,type:'goal-money',
      actName:'💰 R'+amount.toFixed(2)+' saved → '+goal.name,
      emoji:'💰',points:0,goalId,amount,source:'real',status:'approved',ts:new Date().toISOString()});
    // Auto parent match
    const matchPct=(c.goalMatchPct||0)/100;
    if(matchPct>0){
      const matchAmt=Math.round(amount*matchPct*100)/100;
      goal.parentMatched=(goal.parentMatched||0)+matchAmt;
      D.log.unshift({id:uid(),childId:cid,type:'goal-parent-match',
        actName:'🤝 Parent matched '+( c.goalMatchPct)+'% = R'+matchAmt.toFixed(2)+' → '+goal.name,
        emoji:'🤝',points:0,goalId,amount:matchAmt,status:'approved',ts:new Date().toISOString()});
      toast('💰 R'+amount.toFixed(2)+' saved + 🤝 R'+matchAmt.toFixed(2)+' parent match → "'+goal.name+'"!');
    } else {
      toast('💰 R'+amount.toFixed(2)+' saved → "'+goal.name+'"!');
    }
  }
  // Check if goal reached
  const total=goalTotalSaved(goal,c);
  const target=goalTargetPts(goal,c);
  if(target>0&&total>=target&&!goal.completedAt){
    goal.completedAt=new Date().toISOString();
    setTimeout(()=>toast('🎉 Goal "'+goal.name+'" reached!'),500);
  }
  save();render();
}

function addToGoal(cid,goalId,points){addBonusPtsToGoal(cid,goalId,points);}

const BONUS_TYPES=new Set(['school-bonus-daily','school-bonus-week','daily-balance-bonus']);
function isBonus(entry){return BONUS_TYPES.has(entry.type);}
function approve(lid){
  const e=D.log.find(l=>l.id===lid);if(!e||e.status!=='pending')return;
  const c=child(e.childId);e.status='approved';
  // Immediately remove from DOM for instant feedback
  const el=document.querySelector(`[data-lid="${lid}"]`);
  if(el){const item=el.closest('.approval-item');if(item)item.remove();}
  if(isBonus(e)){
    c.bonusPts=(c.bonusPts||0)+e.points;
    save();toast(`✅ +${e.points} bonus pts for ${c.name}`);
  }else{
    const reg=e.points||0;
    const bon=e.bonusPoints||0;
    if(reg>0)c.points+=reg;
    if(bon>0)c.bonusPts=(c.bonusPts||0)+bon;
    let msg='✅ Approved for '+c.name;
    if(reg>0)msg+=' +'+reg+'pts';
    if(bon>0)msg+=' +'+bon+'🌟';
    save();toast(msg);
    tryAwardDailyBalanceBonus(e.childId);
  }
  render();
}
function reject(lid){
  const e=D.log.find(l=>l.id===lid);if(!e)return;
  e.status='rejected';
  // If rejecting a school session, deduct from daily accumulator
  if(e.type==='session-school'&&e.durationMins){
    const c=child(e.childId);
    const today=new Date().toISOString().split('T')[0];
    if(c&&c.schoolDailyAccumDate===today){
      c.schoolDailyAccum=Math.max(0,(c.schoolDailyAccum||0)-e.durationMins);
    }
    toast(`🎓 School session rejected — ${e.durationMins} min removed`);
  } else {
    toast('Activity rejected');
  }
  const el=document.querySelector(`[data-lid="${lid}"]`);
  if(el){const item=el.closest('.approval-item');if(item)item.remove();}
  save();render();
}
function adjust(cid,delta,type){
  const c=child(cid);
  const isBonus=type==='bonus'&&delta>0;
  if(isBonus){
    c.bonusPts=Math.max(0,(c.bonusPts||0)+delta);
  }else{
    c.points=Math.max(0,c.points+delta);
  }
  D.log.unshift({id:uid(),childId:cid,
    type:delta>0?(isBonus?'school-bonus-daily':'earn'):'spend',
    actName:`Manual ${isBonus?'bonus ':''} adjustment by parent`,
    emoji:isBonus?'🌟':'🔧',points:delta,status:'approved',ts:new Date().toISOString()});
  save();
  toast(isBonus?`🌟 +${delta} bonus pts added to ${c.name}`:`Points updated to ${c.points}`);
  render();
}
function doOvertimeReset(cid,penalty){
  const c=child(cid);
  // Clear warning state from timer
  if(c.timer){delete c.timer.recWarningStartedAt;delete c.timer.recStrikeRecorded;}
  const ts=getTimerState(c);
  const durationMins=ts?Math.round((ts.secsRemaining<0?c.timer.totalMs/1000+Math.abs(ts.secsRemaining):c.timer.totalMs/1000)/60):0;
  if(penalty>0){
    c.points=Math.max(0,c.points-penalty);
    D.log.unshift({id:uid(),childId:cid,type:'penalty',actName:'Overtime penalty',
      emoji:'⚠️',points:-penalty,status:'approved',ts:new Date().toISOString()});
  }
  c.timer=null;save();toast(`⏹ Timer reset${penalty>0?` · -${penalty} pts penalty`:''}`);
  pendingPostRec={cid,durationMins};navStack=[];view='child';childId=cid;render();
}
function awardStewardship(cid,pts){
  const c=child(cid);c.points+=pts;
  D.log.unshift({id:uid(),childId:cid,type:'earn',actName:'🌿 Stewardship bonus',
    emoji:'🌿',points:pts,status:'approved',ts:new Date().toISOString()});
  save();toast(`🌿 +${pts} stewardship bonus awarded to ${c.name}!`);render();
}

          ⏸ Paused — ${c.timer.pauseReason||'Break'} · ${Math.round((Date.now()-(c.timer.pausedAt||Date.now()))/60000)} min

        <div style="font-size:.78rem;color:rgba(255,255,255,.75);margin-top:2px">${ats.emoji} ${ats.label}</div>

        <svg width="54" height="54" viewBox="0 0 54 54">
          <circle class="ring-track" cx="27" cy="27" r="23"/>
          <circle class="ring-prog" cx="27" cy="27" r="23"
            stroke="${ats.goalMet?'var(--gold)':'#A78BFA'}"
            style="stroke-dasharray:${circ};stroke-dashoffset:${offset}" data-act-ring="${cid}"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem">${ats.emoji}</div>

  // Recreation timer
  const ts=getTimerState(c);if(!ts)return'';

    <div style="flex:1;min-width:0">
      <div class="timer-label">${ts.isOvertime?'⚠️ OVERTIME':'🎮 RECREATION'}</div>

      </div>
    </div>
    <div class="ring-wrap">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle class="ring-track" cx="27" cy="27" r="23"/>
        <circle class="ring-prog" cx="27" cy="27" r="23"
          stroke="${ts.isOvertime?'var(--danger)':'var(--success)'}"
          style="stroke-dasharray:${circ};stroke-dashoffset:${offset}"/>

  ${!ts?`<div style="margin:0 14px 10px;display:flex;gap:8px">

  <div class="action-grid">

// ── LOG ACTIVITY ──────────────────────
function rLog(){
  const c=child(childId);
  const allCats=[{id:'all',name:'All',emoji:'🌈'},...D.categories];
  const acts=filterCat==='all'?D.activities:D.activities.filter(a=>a.cat===filterCat);
  const reqIds=new Set(c.requirements||[]);
  const bal=checkDailyBalance(childId);
  const balState={};
  bal.progress.forEach(p=>{balState[p.catId]={done:p.done,required:p.required,met:p.met,name:p.catName,emoji:p.catEmoji};});
  const balNeeded={};
  bal.progress.forEach(p=>{if(!p.met)balNeeded[p.catId]=p.required-p.done;});
  const hasBalance=bal.configured&&bal.progress.length>0;
  const hasReqs=reqIds.size>0;

  // Count how many times each activity was logged today (approved or pending)
  const todayStr=new Date().toDateString();
  const actTodayCount={};
  D.log.filter(l=>l.childId===childId&&l.type==='earn'&&l.aid&&
    new Date(l.ts).toDateString()===todayStr&&l.status!=='rejected')
    .forEach(l=>{actTodayCount[l.aid]=(actTodayCount[l.aid]||0)+1;});
  // Approved-only count (for drop-off logic)
  const actApprovedCount={};
  D.log.filter(l=>l.childId===childId&&l.type==='earn'&&l.aid&&
    new Date(l.ts).toDateString()===todayStr&&l.status==='approved')
    .forEach(l=>{actApprovedCount[l.aid]=(actApprovedCount[l.aid]||0)+1;});

  // Quick Log state per activity:
  // - 'done': approved once, no balance req OR balance req met → vanish
  // - 'dim': approved at least once but balance not yet met → show dimmed
  // - 'active': not yet approved today → show normally
  function quickLogState(a){
    const approvedToday=actApprovedCount[a.id]||0;
    if(approvedToday===0)return'active';
    const bs=balState[a.cat];
    if(bs){
      // Has balance requirement — dim until met, vanish when met
      if(bs.met||(bs.done>=(bs.required||1)))return'done';
      return'dim';
    }
    // No balance requirement — vanish after first approval
    return'done';
  }

  // Pinned quick-tap section — dim completed, hide fully done
  const pinned=(c.pinnedActivities||[]).map(aid=>D.activities.find(a=>a.id===aid)).filter(Boolean);
  const visiblePinned=pinned.filter(a=>quickLogState(a)!=='done');
  const pinnedSection=visiblePinned.length?`<div style="padding:10px 14px 0">
    <div style="font-size:.82rem;font-weight:800;color:var(--text);margin-bottom:8px">⭐ Quick Log</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
      ${visiblePinned.map(a=>{
        const isReq=reqIds.has(a.id);
        const bs=balState[a.cat];
        const stillNeeded=bs&&!bs.met?bs.required-bs.done:0;
        const count=actTodayCount[a.id]||0;
        const approvedCount=actApprovedCount[a.id]||0;
        const state=quickLogState(a);
        const isDim=state==='dim';
        return`<button data-a="log-act" data-aid="${a.id}"
          style="display:flex;align-items:center;gap:9px;padding:10px 12px;
          background:${isDim?'rgba(148,163,184,.06)':'var(--card2)'};
          border:1px solid ${isDim?'var(--border)':isReq?'var(--gold)':stillNeeded?'rgba(167,139,250,.4)':'var(--border)'};
          border-radius:13px;cursor:pointer;text-align:left;width:100%;
          opacity:${isDim?'.45':'1'}">
          <span style="font-size:1.5rem;flex-shrink:0">${a.emoji}</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:.82rem;color:var(--text);line-height:1.2;word-break:break-word">
              ${isDim?`<s style="opacity:.7">${a.name}</s>`:a.name}
            </div>
            <div style="font-size:.68rem;font-weight:700;display:flex;align-items:center;gap:5px;margin-top:2px">
              ${isDim
                ?`<span style="color:var(--success)">✓ ${approvedCount}× done · ${stillNeeded} more needed</span>`
                :`<span style="color:var(--gold)">+${a.points}pts${a.bonusPoints?` +${a.bonusPoints}🌟`:''}</span>
                 ${count>0?`<span style="color:${approvedCount>0?'var(--success)':'var(--gold)'};font-weight:800">${count}× today${approvedCount<count?' ⏳':''}</span>`:''}`
              }
            </div>
          </div>
          ${isDim?`<span style="font-size:.7rem;flex-shrink:0;color:#A78BFA;font-weight:800">🏆${stillNeeded}</span>`:isReq?`<span style="font-size:.7rem;flex-shrink:0">⭐</span>`:stillNeeded?`<span style="font-size:.7rem;flex-shrink:0;color:#A78BFA;font-weight:800">🏆${stillNeeded}</span>`:''}
        </button>`;
      }).join('')}
    </div>
    <div style="height:1px;background:var(--border);margin:12px 0 2px"></div>
  </div>`:'';
    const balSummary=hasBalance?`<div class="card" style="padding:11px 14px;border-color:${bal.met?'var(--success)44':'rgba(167,139,250,.35)'};background:${bal.met?'rgba(16,185,129,.05)':'rgba(167,139,250,.04)'}">
    <div style="font-weight:800;font-size:.88rem;margin-bottom:8px;color:${bal.met?'var(--success)':'#A78BFA'}">
      🏆 Daily Balance ${bal.met?'— Complete! ✅':`— ${bal.done}/${bal.total} categories done`}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${bal.progress.map(p=>`<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;
        border:1px solid ${p.met?'var(--success)':'rgba(167,139,250,.4)'};
        background:${p.met?'rgba(16,185,129,.1)':'rgba(167,139,250,.08)'}">
        <span style="font-size:.85rem">${p.catEmoji}</span>
        <span style="font-size:.78rem;font-weight:700;color:${p.met?'var(--success)':'#A78BFA'}">${p.catName}</span>
        <span style="font-size:.8rem;font-weight:900;color:${p.met?'var(--success)':'var(--text)'}">
          ${p.done}/${p.required}</span>
        ${p.met?'<span style="font-size:.75rem">✓</span>':p.required-p.done>0?`<span style="font-size:.72rem;color:#A78BFA;font-weight:800">need ${p.required-p.done}</span>`:''}
      </div>`).join('')}
    </div>
  </div>`:'';

  return`<div class="header">
    <button class="back-btn" data-a="go-back">←</button>
    <h2>Log Activity</h2>
    <div class="balance-chip">🪙 ${c.points}</div>
  </div>
  ${pinnedSection}
  ${balSummary}
  ${hasReqs?`<div style="padding:5px 14px 0;font-size:.73rem;color:var(--gold);font-weight:800">⭐ = required before recreation</div>`:''}
  <div class="cat-filter">${allCats.map(ct=>{
    const bs=balState[ct.id];
    const needsWork=bs&&!bs.met;
    const catDone=bs&&bs.met;
    return`<button class="cat-chip ${filterCat===ct.id?'active':''}" data-a="filter" data-cat="${ct.id}"
      style="${needsWork?'border-color:rgba(167,139,250,.5)':catDone?'border-color:var(--success)44':''}">
      ${ct.emoji} ${ct.name}${bs?` <span style="font-size:.65rem;opacity:.8">${bs.done}/${bs.required}</span>`:''}
    </button>`;
  }).join('')}</div>
  <div>${acts.map(a=>{
    const isReq=reqIds.has(a.id);
    const bs=balState[a.cat];
    const stillNeeded=bs&&!bs.met?bs.required-bs.done:0;
    const catDone=bs&&bs.met;
    const highlight=isReq||(bs&&!bs.met);
    const isPinned=(c.pinnedActivities||[]).includes(a.id);
    const todayCount=actTodayCount[a.id]||0;
    const tags=[];
    if(isReq)tags.push(`<span style="font-size:.68rem;background:var(--gold);color:#1A1000;border-radius:50px;padding:1px 7px;font-weight:800">⭐ Required</span>`);
    if(bs&&!bs.met)tags.push(`<span style="font-size:.68rem;background:rgba(167,139,250,.25);color:#A78BFA;border-radius:50px;padding:1px 7px;font-weight:800">🏆 need ${stillNeeded} more</span>`);
    if(catDone&&bs)tags.push(`<span style="font-size:.68rem;background:rgba(16,185,129,.2);color:var(--success);border-radius:50px;padding:1px 7px;font-weight:800">✓ done</span>`);
    return`<div class="act-item" data-a="log-act" data-aid="${a.id}"
      style="${highlight?`border-color:${isReq?'var(--gold)':'rgba(167,139,250,.5)'};background:${isReq?'rgba(245,158,11,.04)':'rgba(167,139,250,.04)'}`:catDone?'border-color:var(--success)22;background:rgba(16,185,129,.02)':a.bonusPoints>0?'border-left:3px solid var(--gold);border-color:rgba(245,158,11,.2)':''}">
      <div class="act-emoji" style="background:${catColor(a.cat)}22">${a.emoji}</div>
      <div class="act-info">
        <div class="act-name">${a.name}${tags.length?' ':''} ${tags.join(' ')}</div>
        <div class="act-meta">${catName(a.cat)} · ${a.approval?'⏳ Needs approval':'✅ Auto-approved'}${todayCount>0?` · <strong style="color:var(--success)">${todayCount}× today</strong>`:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
        <button data-a="toggle-child-pin" data-aid="${a.id}" data-cid="${childId}"
          style="background:${isPinned?'rgba(245,158,11,.15)':'var(--card2)'};border:1px solid ${isPinned?'var(--gold)':'var(--border)'};border-radius:50%;cursor:pointer;font-size:.85rem;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0"
          title="${isPinned?'Unpin from Quick Log':'Pin to Quick Log'}">${isPinned?'⭐':'☆'}</button>
        <div style="text-align:right;flex-shrink:0">
          ${a.bonusPoints>0
            ?`<div style="font-family:'Fredoka One',cursive;font-size:1.15rem;color:var(--gold);line-height:1">+${a.bonusPoints}<span style="font-size:.7rem">🌟</span></div>
              <div style="font-size:.75rem;color:var(--muted);line-height:1.4;font-weight:700">+${a.points}<span style="font-size:.65rem">🪙</span></div>`
            :`<div class="act-pts">+${a.points}</div>`
          }
        </div>
      </div>
    </div>`;
  }).join('')||'<div class="empty-state"><div class="icon">🔍</div><p>Nothing here</p></div>'}</div>`;
}

// ── BUY TIME ──────────────────────────
function rBuy(){
  const c=child(childId);const ts=getTimerState(c);
  const today=new Date().toDateString();
  const bought=D.log.filter(l=>l.childId===childId&&l.type==='spend'&&new Date(l.ts).toDateString()===today);
  const rem=getRemainingRecMins(childId);
  const schoolRunning=ts&&ts.sessionType==='school';
  const dayLabel=isWeekend()?'Weekend':'Weekday';
  // Disabled banner — show early, block purchases
  if(c.recDisabled){
    return`<div class="header">
      <button class="back-btn" data-a="go-back">←</button>
      <h2>Buy Recreation Time</h2>
      <div class="balance-chip">🪙 ${c.points}</div>
    </div>
    <div class="card" style="border-color:var(--danger)44;background:rgba(239,68,68,.07);text-align:center">
      <div style="font-size:2rem;margin-bottom:8px">🚫</div>
      <div style="font-weight:900;font-size:1rem;color:var(--danger);margin-bottom:6px">Screen Time Purchases Disabled</div>
      ${c.recDisabledReason?`<div style="font-size:.85rem;color:var(--muted);margin-bottom:4px">"${c.recDisabledReason}"</div>`:''}
      <div style="font-size:.78rem;color:var(--muted)">A parent has temporarily disabled recreation screen time purchases. Speak to your parent to find out more.</div>
    </div>`;
  }
  return`<div class="header">
    <button class="back-btn" data-a="go-back">←</button>
    <h2>Buy Recreation Time</h2>
    <div class="balance-chip">🪙 ${c.points}</div>
  </div>
  ${schoolRunning?`<div class="card" style="border-color:var(--success)44;background:rgba(16,185,129,.06)">
    <div style="font-size:.87rem;font-weight:700">🎓 School session running<br>
    <span style="color:var(--muted);font-weight:600">Time bought now is banked for after school 🛒</span></div></div>`:''}
  ${rem.limited!==null?`<div class="card" style="padding:11px 14px">
    <div style="font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:7px">🎮 RECREATION ALLOWANCE</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      ${(c.recMaxDay||c.recMaxWeekend)?`<div style="flex:1;min-width:80px">
        <div style="font-size:.7rem;color:var(--muted)">${dayLabel}</div>
        <div style="font-size:1rem;font-weight:900;color:${!rem.remainDay?'var(--danger)':rem.remainDay<30?'var(--gold)':'var(--success)'}">
          ${rem.remainDay!=null?rem.remainDay+'min':'∞'} left</div>
        <div style="font-size:.68rem;color:var(--muted)">${rem.usedDay} of ${isWeekend()?c.recMaxWeekend:c.recMaxDay} used</div>
      </div>`:''}
      ${c.recMaxWeek?`<div style="flex:1;min-width:80px">
        <div style="font-size:.7rem;color:var(--muted)">This week</div>
        <div style="font-size:1rem;font-weight:900;color:${!rem.remainWeek?'var(--danger)':rem.remainWeek<60?'var(--gold)':'var(--success)'}">
          ${rem.remainWeek!=null?rem.remainWeek+'min':'∞'} left</div>
        <div style="font-size:.68rem;color:var(--muted)">${rem.usedWeek} of ${c.recMaxWeek} used</div>
      </div>`:''}
    </div>
  </div>`:''}
  <div class="sec-title">Choose a Time Block</div>
  ${(()=>{
    // Screen-free exchange: find cheapest 60-min block, round cost up to nearest 10
    const blocks60=D.timeBlocks.filter(b=>b.minutes>=60).sort((a,b)=>a.points-b.points);
    // If no 60-min block, calculate 60-min cost from cheapest block per-minute rate
    let rawCost;
    if(blocks60.length){
      rawCost=blocks60[0].points;
    } else {
      const cheapest=D.timeBlocks.slice().sort((a,b)=>a.points/a.minutes-b.points/b.minutes)[0];
      rawCost=cheapest?Math.ceil((cheapest.points/cheapest.minutes)*60):20;
    }
    const exchangeCost=Math.ceil(rawCost/10)*10; // e.g. 18pts → 20pts
    const bonusPtsValue=exchangeCost;             // same pts, different currency
    const randValue=(exchangeCost/(c.pointsPerRand||10)).toFixed(2); // e.g. 20pts ÷ 10 = R2.00
    const todayStr=new Date().toDateString();
    const maxTimes=Math.max(1,Math.floor((c.recMaxDay||120)/60));
    const timesToday=D.log.filter(l=>l.childId===childId&&l.type==='screen-free-exchange'&&new Date(l.ts).toDateString()===todayStr).length;
    const canAfford=c.points>=exchangeCost;
    const capReached=timesToday>=maxTimes;
    const ok=canAfford&&!capReached;
    return'<div class="card" style="border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.04);margin-bottom:4px">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<div style="font-size:2rem">🌿</div>'
      +'<div style="flex:1">'
      +'<div style="font-weight:900;font-size:.92rem;color:var(--text)">Screen-free Exchange</div>'
      +'<div style="font-size:.77rem;color:var(--muted);margin-top:2px">Skip 1 hr of screen time → earn R'+randValue+' real pocket money added straight to your Wallet</div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap">'
      +'<span style="font-size:.8rem;font-weight:800;color:var(--danger)">−'+exchangeCost+' 🪙</span>'
      +'<span style="font-size:.8rem;color:var(--muted)">→</span>'
      +'<span style="font-size:.8rem;font-weight:800;color:var(--gold)">+'+bonusPtsValue+' 🌟 (≈ R'+randValue+')</span>'
      +(capReached?'<span style="font-size:.72rem;color:var(--muted)">Limit reached ('+maxTimes+'× today)</span>':'')
      +'</div>'
      +'</div>'
      +'<button class="btn btn-success" style="flex-shrink:0" '+(ok?'':'disabled ')
      +'data-a="screen-free-exchange" data-cost="'+exchangeCost+'" data-bonus="'+bonusPtsValue+'" data-rand="'+randValue+'">'
      +(capReached?'Used up':!canAfford?'Need '+(exchangeCost-c.points)+' more':'Exchange')
      +'</button>'
      +'</div>'
      +'</div>';
  })()}
  ${D.timeBlocks.map(b=>{
    const canAfford=c.points>=b.points;
    const willGet=rem.limited!=null?Math.min(b.minutes,rem.limited):b.minutes;
    const noRem=rem.limited!=null&&rem.limited<=0;
    const ok=canAfford&&!noRem;
    const capNote=willGet<b.minutes&&willGet>0?` <span style="font-size:.7rem;color:var(--gold)">(capped: ${willGet}min)</span>`:'';
    return`<div class="tb-card" style="opacity:${ok?1:.45}">
      <div class="tb-icon">${b.emoji}</div>
      <div class="tb-info">
        <div class="tb-name">${b.name}${capNote}</div>
        <div class="tb-cost">🪙 ${b.points} pts · ${b.minutes} min</div>
      </div>
      <button class="btn btn-primary" ${ok?'':'disabled'} data-a="confirm-buy" data-bid="${b.id}">
        ${noRem?'Limit reached':!canAfford?'Need '+(b.points-c.points)+' more':'Buy!'}</button>
    </div>`;
  }).join('')}
  ${bought.length?`<div class="sec-title">Bought Today</div>${bought.map(b=>`<div class="log-item">
    <div class="log-icon" style="background:rgba(239,68,68,.12)">${b.emoji}</div>
    <div style="flex:1;min-width:0"><div class="log-name">${b.actName}</div><div class="log-meta">${fmtTime(b.ts)} · ${b.durationMins||0} min</div></div>
    <div style="font-weight:900;color:var(--danger)">${b.points} pts</div>
  </div>`).join('')}`:''}`;
}
// ── PIN ───────────────────────────────
function rPin(){
  const dots=Array(4).fill(0).map((_,i)=>`<div class="pin-dot ${i<pinBuf.length?'filled':''}"></div>`).join('');
  return`<div class="header"><button class="back-btn" data-a="go-back">←</button><h2>🔐 Parent Mode</h2></div>
  <div class="pin-screen anim-pop">
    <p style="color:var(--muted)">Enter your PIN to continue</p>
    <div class="pin-dots">${dots}</div>
    <div class="numpad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="num-btn" data-a="pin" data-d="${n}">${n}</button>`).join('')}

// ── PARENT ────────────────────────────
function rParent(){
  const totalPending=allPending().length+allUnlockPending().length;
  const tabs=[
    {id:'approvals',lbl:'✅ Approvals',badge:totalPending},
    {id:'children',lbl:'👨‍👧‍👦 Kids'},
    {id:'activities',lbl:'📋 Activities'},
    {id:'categories',lbl:'🗂️ Categories'},
    {id:'timeblocks',lbl:'⏱️ Time Blocks'},
    {id:'history',lbl:'📜 History'},
    {id:'review',lbl:'📊 Weekly Review'},
    {id:'settings',lbl:'⚙️ Settings'},
  ];
  let content='';
  if(parentTab==='approvals')content=rApprovals();
  else if(parentTab==='children')content=rChildren();
  else if(parentTab==='activities')content=rActivities();
  else if(parentTab==='categories')content=rCategories();
  else if(parentTab==='timeblocks')content=rTimeblocks();
  else if(parentTab==='history')content=rHistory();
  else if(parentTab==='review')content=rWeeklyReview();
  else if(parentTab==='settings')content=rSettings();
  return`<div class="header"><button class="back-btn" data-a="go-back">←</button><h2>🔐 Parent Mode</h2></div>
  <div class="tab-bar">${tabs.map(t=>`<button class="tab-btn ${parentTab===t.id?'active':''}" data-a="ptab" data-tab="${t.id}">
    ${t.lbl}${t.badge?`<span style="background:#EF4444;color:#fff;border-radius:50px;padding:0 5px;font-size:.65rem;margin-left:3px">${t.badge}</span>`:''}
  </button>`).join('')}</div>
  <div>${content}</div>`;
}

function rApprovals(){
  const unlocks=allUnlockPending();
  const pend=allPending();
  if(!unlocks.length&&!pend.length)return`<div class="empty-state"><div class="icon">✅</div><p>All caught up!</p></div>`;
  const uHtml=unlocks.map(u=>{
    const c=child(u.childId);
    const metList=u.completed.map(a=>`<div style="color:var(--success);font-size:.82rem">✅ ${a.emoji} ${a.name}</div>`).join('');
    const missList=u.missing.map(a=>`<div style="color:var(--danger);font-size:.82rem">❌ ${a.emoji} ${a.name}</div>`).join('');
    return`<div class="approval-item unlock anim-pop">
      <div class="row" style="margin-bottom:8px">
        <span style="font-size:1.4rem">🔓</span>
        <div style="flex:1"><div style="font-weight:800">Recreation unlock: ${c?.name}</div>
          <div style="font-size:.75rem;color:var(--muted)">${fmtTime(u.requestedAt)} · ${u.allMet?'✅ All requirements met':'⚠️ Some requirements missing'}</div></div>
      </div>
      ${metList||missList?`<div style="background:var(--card2);border-radius:10px;padding:9px 11px;margin-bottom:9px">
        ${metList}${missList}</div>`:''}
      <div class="approval-actions" style="flex-direction:column;gap:6px">
        <button class="btn btn-success" data-a="approve-unlock" data-uid="${u.id}">✓ Allow Recreation</button>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          <button class="btn btn-ghost" style="font-size:.72rem;padding:6px 4px;border-color:var(--gold);color:var(--gold)" data-a="deny-unlock" data-uid="${u.id}" data-type="until-met" title="Auto-lifts when requirements are completed">⏳ Not yet<br><span style="font-size:.65rem;opacity:.8">Until reqs met</span></button>
          <button class="btn btn-ghost" style="font-size:.72rem;padding:6px 4px;border-color:var(--danger);color:var(--danger)" data-a="deny-unlock" data-uid="${u.id}" data-type="rest-of-day" title="Blocked for the rest of today">🚫 Not today<br><span style="font-size:.65rem;opacity:.8">Rest of day</span></button>
          <button class="btn btn-danger" style="font-size:.72rem;padding:6px 4px" data-a="deny-unlock" data-uid="${u.id}" data-type="parent-reset" title="Stays blocked until you manually lift it">🔒 Blocked<br><span style="font-size:.65rem;opacity:.8">Until you lift</span></button>
        </div>
      </div>
    </div>`;
  }).join('');
  const schoolOffReqs=pend.filter(p=>p.type==='school-off-request');
  const cashouts=pend.filter(p=>p.type==='payout-request');
  const flags=pend.filter(p=>p.type==='timer-flag');
  const activities=pend.filter(p=>!['payout-request','timer-flag','school-off-request'].includes(p.type));
  const schoolOffHtml=schoolOffReqs.map(p=>{
    const c=child(p.childId);
    return'<div class="approval-item anim-pop" style="border-color:rgba(96,165,250,.3)">'
      +'<div class="row" style="margin-bottom:8px"><span style="font-size:1.35rem">📅</span>'
      +'<div style="flex:1"><div style="font-weight:800;font-size:.9rem">'+c?.name+' — School-off day</div>'
      +'<div style="font-size:.75rem;color:var(--muted)">'+p.actName+' · '+fmtTime(p.ts)+'</div>'
      +'<div style="font-size:.74rem;color:var(--muted)">Development activities count toward stewardship instead of school</div></div></div>'
      +'<div class="approval-actions">'
      +'<button class="btn btn-success" data-a="approve-school-off" data-lid="'+p.id+'">✓ Approve</button>'
      +'<button class="btn btn-danger" data-a="reject-school-off" data-lid="'+p.id+'">✗ Reject</button>'
      +'</div></div>';
  }).join('');
  const flagHtml=flags.map(p=>{
    const c=child(p.childId);
    return`<div class="approval-item anim-pop" style="border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.05)">
      <div class="row" style="margin-bottom:8px"><span style="font-size:1.35rem">🚩</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:.9rem">${p.timerType==='school'?'🎓 School':'🎮 Rec'} timer overran — ${c?.name}</div>
          <div style="font-size:.75rem;color:var(--muted)">${fmtTime(p.ts)} · Timer: ${p.runMins} min · Claimed: <strong style="color:var(--text)">${p.actualMins} min</strong></div>
        </div>
      </div>
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:9px">Ask ${c?.name} what happened, then adjust and approve the actual time.</div>
      <div style="display:flex;gap:7px;margin-bottom:8px">
        <input type="number" class="form-input" style="width:80px;text-align:center" id="flag-adj-${p.id}" value="${p.actualMins}" min="0" max="${p.runMins}">
        <span style="font-size:.8rem;color:var(--muted);align-self:center">actual min (adjust if needed)</span>
      </div>
      <div class="approval-actions">
        <button class="btn btn-success" data-a="approve-flag" data-lid="${p.id}">✓ Approve</button>
        <button class="btn btn-danger" data-a="reject" data-lid="${p.id}">✗ Reject</button>
      </div>
    </div>`;
  }).join('');
  const cashoutHtml=cashouts.map(p=>{
    const c=child(p.childId);
    return`<div class="approval-item anim-pop" style="border-color:rgba(16,185,129,.3)">
      <div class="row" style="margin-bottom:6px"><span style="font-size:1.35rem">💸</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:.9rem">Payout request — ${c?.name}</div>
          <div style="font-size:.75rem;color:var(--muted)">${fmtTime(p.ts)} · <strong style="color:var(--success)">R${(p.amount||0).toFixed(2)}</strong> via ${p.method||'Bank transfer'}</div>
          ${c?.bankAccount?`<div style="font-size:.72rem;color:var(--muted)">Account: ${c.bankAccount}</div>`:''}
        </div>
      </div>
      <div class="approval-actions">
        <button class="btn btn-success" data-a="approve-payout-req" data-lid="${p.id}">✓ Mark as Paid</button>
        <button class="btn btn-danger" data-a="reject" data-lid="${p.id}">✗ Reject</button>
      </div>
    </div>`;
  }).join('');
  const aHtml=activities.map(p=>{
    const c=child(p.childId);
    const bonus=isBonus(p);
    const isSchool=p.type==='session-school';
    return`<div class="approval-item anim-pop" style="${isSchool?'border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.04)':bonus?'border-color:rgba(245,158,11,.35)':''}">
      <div class="row"><span style="font-size:1.35rem">${p.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:.9rem">${p.actName}</div>
          <div style="font-size:.75rem;color:var(--muted)">${c?.name} · ${fmtTime(p.ts)} ·
            ${isSchool
              ?`<strong style="color:#8B5CF6">${p.durationMins} min · ${p.points>0?'+'+p.points+' pts':'no pts (too short)'}</strong>`
              :bonus
                ?`<strong style="color:var(--gold)">+${p.points} 🌟 bonus pts → goals only</strong>`
                :`<strong style="color:var(--gold)">+${p.points} pts</strong>`}
          </div>
          ${isSchool?`<div style="font-size:.74rem;color:var(--muted);margin-top:3px">⚠️ Verify school work was actually completed before approving</div>`:''}
          ${p.note?`<div style="font-size:.75rem;color:var(--muted);margin-top:2px">📝 "${p.note}"</div>`:''}
        </div>
      </div>
      <div class="approval-actions">
        <button class="btn btn-success" data-a="approve" data-lid="${p.id}">✓ Approve</button>
        <button class="btn btn-danger" data-a="reject" data-lid="${p.id}">✗ Reject</button>
      </div>
    </div>`;
  }).join('');
  const childGroups={};
  activities.forEach(p=>{if(!childGroups[p.childId])childGroups[p.childId]=[];childGroups[p.childId].push(p);});
  const bulkHtml=Object.entries(childGroups).map(([cid,items])=>{
    const c=child(cid);
    const totalPts=items.reduce((s,p)=>s+p.points,0);
    return`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;background:var(--card2);border-radius:12px;margin-bottom:6px">
      <div>
        <div style="font-weight:800;font-size:.88rem">${c?.emoji} ${c?.name} — ${items.length} activit${items.length!==1?'ies':'y'}</div>
        <div style="font-size:.75rem;color:var(--muted)">Total: <strong style="color:var(--gold)">+${totalPts} pts</strong></div>
      </div>
      <button class="btn btn-success" style="padding:8px 14px;font-size:.82rem;white-space:nowrap" data-a="approve-all-child" data-cid="${cid}">✓ Approve All</button>
    </div>`;
  }).join('');
  const hasMultiple=activities.length>1;
  return(unlocks.length?`<div class="sec-title">🔓 Recreation Unlock Requests</div>${uHtml}`:'')+
    (flags.length?`<div class="sec-title">🚩 Timer Flags</div>${flagHtml}`:'')+
    (schoolOffReqs.length?'<div class="sec-title">📅 School-off Requests</div>'+schoolOffHtml:'')+
    (cashouts.length?`<div class="sec-title">💸 Payout Requests</div>${cashoutHtml}`:'')+
    (activities.length?`<div class="sec-title" style="display:flex;align-items:center;justify-content:space-between;padding-right:14px">
      <span>📋 Activity Approvals (${activities.length})</span>
      ${hasMultiple?`<button class="btn btn-success" style="padding:5px 12px;font-size:.76rem" data-a="approve-all">✓ All</button>`:''}
    </div>
    ${bulkHtml}
    ${aHtml}`:''
  );
}

const WELLNESS_META={
  meals:    {emoji:'🍽️',label:'Meal Check',msg:"Have you had your meal?",positive:['✅ Yes I ate','🥗 Had a snack','🍽️ Eating now']},
  breakfast:{emoji:'🍳',label:'Breakfast Check',msg:"Did you have breakfast this morning?",positive:['🥣 Cereal','🥚 Eggs','🍞 Toast','🍌 Fruit','✅ Yes I ate']},
  water:    {emoji:'💧',label:'Hydration & Snack',msg:"Have you had some water or a snack recently?",positive:['💧 Water — just now','🍎 Had a snack','🥤 Drink earlier','✅ Both — I am good']},
  movement: {emoji:'🧘',label:'Movement Break',msg:"Time for a quick stretch or movement break!",positive:['🚶 Walked','🤸 Stretched','🏃 Ran','✅ Break taken']},
  rest:     {emoji:'😴',label:'Rest Check',msg:"You have been going for a while. Have you had a proper break?",positive:['😴 Had a rest','🛋️ Chilling','✅ I am ok']},
  freshair: {emoji:'🌿',label:'Fresh Air',msg:"Have you had some fresh air today?",positive:['🌳 Been outside','🪟 Window open','✅ Going now']}
};
function getWellnessCountToday(cid,checkType){
  const today=new Date().toDateString();
  return D.log.filter(l=>l.childId===cid&&l.type==='wellness-check'&&
    l.checkType===checkType&&new Date(l.ts).toDateString()===today).length;
}
function getWellnessPositiveToday(cid){
  const today=new Date().toDateString();
  const shown=D.log.filter(l=>l.childId===cid&&l.type==='wellness-check'&&new Date(l.ts).toDateString()===today);
  const positive=shown.filter(l=>l.positive);
  return{shown:shown.length,positive:positive.length,pct:shown.length>0?Math.round(positive.length/shown.length*100):0};
}
function checkWellnessTrigger(cid,trigger){
  // Returns checkType to show, or null if nothing to show
  const c=child(cid);
  if(!c||!c.wellness||!c.wellness.enabled)return null;
  if(pendingWellnessCheck)return null; // already showing one
  const now=new Date();
  const today=now.toDateString();
  const checks=c.wellness.checks||{};
  // Determine which type to show based on trigger
  let candidates=[];
  // Timer-based triggers — fire at natural transition points
  if(trigger==='school-timer-start'){
    if(now.getHours()<11)candidates.push('breakfast');
    candidates.push('water');
  }
  if(trigger==='school-timer-stop'){
    candidates.push('water');
    candidates.push('movement');
  }
  if(trigger==='activity-timer-start'){
    candidates.push('water');
  }
  if(trigger==='activity-timer-stop'){
    candidates.push('movement');
    candidates.push('water');
  }
  if(trigger==='before-buy'){
    // Only once per day for buy trigger
    const alreadyBuy=D.log.some(l=>l.childId===cid&&l.type==='wellness-check'&&
      l.trigger==='before-buy'&&new Date(l.ts).toDateString()===now.toDateString());
    if(alreadyBuy)return null;
    candidates.push('water');
    candidates.push('freshair');
  }
  if(trigger==='meal-breakfast')candidates.push('meals','breakfast');
  if(trigger==='meal-lunch')candidates.push('meals','movement','water');
  if(trigger==='meal-dinner')candidates.push('meals','rest','freshair');
  // Pick first candidate that is enabled and under frequency limit
  for(const type of candidates){
    const cfg=checks[type];
    if(!cfg||!cfg.enabled)continue;
    const count=getWellnessCountToday(cid,type);
    if(count<(cfg.frequency||1))return type;
  }
  return null;
}
function triggerWellness(cid,trigger){
  const c=child(cid);if(!c||!c.wellness||!c.wellness.enabled)return;
  const checkType=checkWellnessTrigger(cid,trigger);
  if(!checkType)return;
  pendingWellnessCheck={cid,checkType,trigger};
  render();
}
function respondWellness(cid,checkType,response,positive){
  D.log.unshift({id:uid(),childId:cid,type:'wellness-check',checkType,
    trigger:pendingWellnessCheck?.trigger||'unknown',
    response,positive,ts:new Date().toISOString()});
  const c=child(cid);
  const stats=getWellnessPositiveToday(cid);
  const threshold=c.wellness?.threshold||50;
  if(stats.pct>=threshold&&stats.shown>=2){
    // Flag in log so parent can see in Weekly Review
    const existing=D.log.find(l=>l.childId===cid&&l.type==='wellness-bonus-flag'&&
      new Date(l.ts).toDateString()===new Date().toDateString());
    if(!existing){
      D.log.unshift({id:uid(),childId:cid,type:'wellness-bonus-flag',
        actName:'🌿 Wellness goal met today ('+stats.pct+'% responded)',
        emoji:'🌿',points:0,status:'pending',ts:new Date().toISOString()});
    }
  }
  pendingWellnessCheck=null;
  save();render();
}

// ═══════════════════════════════════════
// WEEKLY REVIEW (PARENT)
// ═══════════════════════════════════════
function isSchoolOffDay(cid,dateStr){
  const c=child(cid);
  if((c.schoolOffDates||{})[dateStr]==='approved')return true;
  // Check holiday blocks
  return(c.holidayBlocks||[]).some(h=>h.active&&dateStr>=h.start&&dateStr<=h.end);
}
function isSchoolOffPending(cid,dateStr){
  const c=child(cid);return(c.schoolOffDates||{})[dateStr]==='pending';
}
function getDailyScore(cid,dateStr){
  const c=child(cid);
  const dayDate=new Date(dateStr+'T12:00:00');
  const dayStr=dayDate.toDateString();
  const dayOfWeek=dayDate.getDay(); // 0=Sun,1=Mon...5=Fri,6=Sat
  const schoolOff=isSchoolOffDay(cid,dateStr);
  // Auto school-off for weekends (Fri=5, Sat=6, Sun=0) — 4-day homeschool Mon-Thu
  const isWeekendDay=dayOfWeek===0||dayOfWeek===5||dayOfWeek===6;
  const isHolidayDay=!schoolOff&&!isWeekendDay&&isSchoolOffDay(cid,dateStr);
  const effectiveSchoolOff=schoolOff||isWeekendDay||isHolidayDay;

  // Check if child had ANY meaningful activity today — if not, return zero score
  const hasSchool=D.log.some(l=>l.childId===cid&&l.type==='session-school'&&
    (l.status==='approved'||l.status==='pending')&&new Date(l.ts).toDateString()===dayStr);
  const hasActivity=D.log.some(l=>l.childId===cid&&l.type==='earn'&&
    (l.status==='approved'||l.status==='pending')&&new Date(l.ts).toDateString()===dayStr);
  if(!hasSchool&&!hasActivity&&!effectiveSchoolOff){
    return{score:0,suggested:0,cap:Math.round(((c.weeklyBudget||0)/7)*100)/100,schoolOff:false,noActivity:true,
      breakdown:{school:0,balance:0,bonus:0,timer:false,activities:0,overtime:true,screenFree:true}};
  }

  const schoolMins=D.log.filter(l=>l.childId===cid&&l.type==='session-school'&&
    (l.status==='approved'||l.status==='pending')&&
    new Date(l.ts).toDateString()===dayStr).reduce((s,l)=>s+(l.durationMins||0),0);
  const schoolGoal=c.schoolDailyGoal||180;
  const schoolFactor=effectiveSchoolOff?1:Math.min(1,schoolGoal>0?schoolMins/schoolGoal:1);
  const bal=checkDailyBalance(cid,dateStr);
  const balFactor=bal.total>0?Math.min(1,bal.done/bal.total):1;
  const bonusPtsToday=D.log.filter(l=>l.childId===cid&&BONUS_TYPES.has(l.type)&&l.status==='approved'&&new Date(l.ts).toDateString()===dayStr).reduce((s,l)=>s+(l.points||0),0);
  const bonusFactor=Math.min(1,bonusPtsToday/30);
  const timerUsed=D.log.some(l=>l.childId===cid&&l.type==='earn'&&
    (l.status==='approved'||l.status==='pending')&&
    (l.durationMins||0)>0&&new Date(l.ts).toDateString()===dayStr);
  const actIds=new Set();
  D.log.filter(l=>l.childId===cid&&l.type==='earn'&&
    (l.status==='approved'||l.status==='pending')&&
    new Date(l.ts).toDateString()===dayStr).forEach(l=>{if(l.aid)actIds.add(l.aid);});
  const actsToday=actIds.size;
  const actTarget=c.dailyActivityTarget||5;
  const actFactor=Math.min(1,actsToday/actTarget);
  const hadOvertime=D.log.some(l=>l.childId===cid&&l.type==='penalty'&&new Date(l.ts).toDateString()===dayStr);
  const hadRec=D.log.some(l=>l.childId===cid&&l.type==='spend'&&new Date(l.ts).toDateString()===dayStr);
  let score;
  if(effectiveSchoolOff){
    score=balFactor*0.40+bonusFactor*0.20+(timerUsed?0.15:0)+actFactor*0.15+(hadOvertime?0:0.10)+(hadRec?0:0.05);
  } else {
    score=schoolFactor*0.30+balFactor*0.25+bonusFactor*0.15+(timerUsed?0.10:0)+actFactor*0.10+(hadOvertime?0:0.10)+(hadRec?0:0.05);
  }
  score=Math.min(1,Math.max(0,score));
  const cap=Math.round(((c.weeklyBudget||0)/7)*100)/100;
  return{score:Math.round(score*100),suggested:Math.round(cap*score*100)/100,cap,schoolOff:effectiveSchoolOff,isWeekend:isWeekendDay,noActivity:false,
    breakdown:{school:Math.round(schoolFactor*100),balance:Math.round(balFactor*100),bonus:bonusPtsToday,timer:timerUsed,activities:actsToday,overtime:!hadOvertime,screenFree:!hadRec}};
}

function getMonthPeriod(c,refDate){
  // Returns {start, end} Date objects for the current monthly period
  const d=refDate||new Date();
  const startDay=c.monthStartDay||1;
  let start,end;
  if(d.getDate()>=startDay){
    start=new Date(d.getFullYear(),d.getMonth(),startDay);
    end=new Date(d.getFullYear(),d.getMonth()+1,startDay-1);
    end.setHours(23,59,59,999);
  } else {
    start=new Date(d.getFullYear(),d.getMonth()-1,startDay);
    end=new Date(d.getFullYear(),d.getMonth(),startDay-1);
    end.setHours(23,59,59,999);
  }
  return{start,end};
}
function getDailyCap(c){
  // Daily cap = monthlyBudget ÷ days in current month period
  const period=getMonthPeriod(c);
  const days=Math.round((period.end-period.start)/(1000*60*60*24))+1;
  return Math.round((c.monthlyBudget||0)/days*100)/100;
}
function getDailyExchangeCap(c){
  return Math.round(getDailyCap(c)*(c.exchangeCapPct||25)/100*100)/100;
}
function getDailyEarned(cid,dateStr){
  // Returns {stewardship, exchange, total, cap} for a specific day
  const c=child(cid);
  // Before child start date → not tracked
  if(c.childStartDate&&dateStr<c.childStartDate){
    return{stewardship:0,exchange:0,exchangeRaw:0,total:0,cap:getDailyCap(c),score:0,noActivity:true,beforeStart:true,schoolOff:false};
  }
  const sc=getDailyScore(cid,dateStr);
  const cap=getDailyCap(c);
  const stewardship=sc.noActivity?0:Math.round(cap*sc.score/100*100)/100;
  // Exchange earnings capped at exchangeCapPct% of daily cap
  const exchangeCap=getDailyExchangeCap(c);
  const dayStr=new Date(dateStr+'T12:00:00').toDateString();
  const exchangeRaw=D.log.filter(l=>l.childId===cid&&l.type==='screen-free-exchange'&&
    new Date(l.ts).toDateString()===dayStr)
    .reduce((s,l)=>s+(l.amount||0),0);
  const exchange=Math.min(exchangeRaw,exchangeCap);
  const total=Math.min(stewardship+exchange,cap);
  return{stewardship,exchange,exchangeRaw,total,cap,score:sc.score,noActivity:sc.noActivity,schoolOff:sc.schoolOff||sc.isWeekend};
}
function getMonthlyEarned(cid){
  // Sum of daily earned across current month period
  const c=child(cid);
  const period=getMonthPeriod(c);
  const today=new Date();today.setHours(23,59,59,999);
  const endDate=today<period.end?today:period.end;
  let total=0,days=[];
  const d=new Date(period.start);
  while(d<=endDate){
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const de=getDailyEarned(cid,ds);
    total+=de.total;
    days.push({date:ds,earned:de});
    d.setDate(d.getDate()+1);
  }
  return{total:Math.round(total*100)/100,days,period};
}
function getMonthlyPaid(cid){
  const c=child(cid);
  const period=getMonthPeriod(c);
  return D.log.filter(l=>l.childId===cid&&l.type==='pocket-money'&&
    l.status==='approved'&&new Date(l.ts)>=period.start&&new Date(l.ts)<=period.end)
    .reduce((s,l)=>s+(l.amount||0),0);
}
function getMonthlyUnpaid(cid){
  return Math.max(0,Math.round((getMonthlyEarned(cid).total-getMonthlyPaid(cid))*100)/100);
}

            </div>
            <div style="flex:1;min-width:0">
              ${de.beforeStart?`<div style="font-size:.68rem;color:var(--muted)">— before start</div>`:de.noActivity?`<div style="font-size:.68rem;color:var(--muted)">${isSchoolOffDay(c.id,ds)&&!de.schoolOff?'🏖️ Holiday':'🌿 Day off'}</div>`:
              `<div style="display:flex;gap:4px;align-items:center;margin-bottom:2px">
                <div style="flex:1;height:4px;background:var(--border);border-radius:2px">
                  <div style="height:4px;border-radius:2px;background:${barColor};width:${pct}%"></div>
                </div>
                <span style="font-size:.66rem;font-weight:800;color:${barColor}">${pct}%</span>
              </div>
              <div style="font-size:.65rem;color:var(--muted)">
                🎓 R${de.stewardship.toFixed(2)}${de.exchange>0?` + 🌿 R${de.exchange.toFixed(2)}`:''}
                ${de.exchangeRaw>de.exchange?`<span style="color:var(--danger)"> (R${(de.exchangeRaw-de.exchange).toFixed(2)} over cap)</span>`:''}
              </div>`}
            </div>
            <div style="text-align:right;flex-shrink:0;min-width:80px">
              ${de.noActivity?'<span style="font-size:.72rem;color:var(--muted)">—</span>':
              assigned!==null?
              `<div style="font-size:.75rem;font-weight:800;color:var(--success)">R${assigned.toFixed(2)} ✓</div>`:
              `<div style="font-size:.75rem;font-weight:800;color:var(--text)">R${de.total.toFixed(2)}</div>
              <select id="dest-${c.id}-${ds}" style="font-size:.6rem;padding:1px 3px;border-radius:5px;border:1px solid var(--border);background:var(--card2);color:var(--text);margin-top:2px;display:block;width:100%">
                <option value="wallet">💰 Wallet</option>
                <option value="savings-pocket">🏦 Savings</option>
                ${goals4.map(g=>`<option value="${g.id}">${g.emoji} ${g.name}</option>`).join('')}
              </select>
              <button class="btn btn-ghost" style="padding:2px 7px;font-size:.62rem;margin-top:2px;width:100%" data-a="assign-day" data-cid="${c.id}" data-date="${ds}" data-amount="${de.total.toFixed(2)}" data-destsel="dest-${c.id}-${ds}">Assign</button>`}
            </div>
          </div>`;
        }).join('')}
        ${weekUnpaid>0?`<div style="display:flex;align-items:center;justify-content:space-between;padding-top:8px;margin-top:4px;border-top:1px solid var(--border)">

            <div style="font-size:.78rem;font-weight:800">This week: R${weekEarned.toFixed(2)} earned</div>
            <div style="font-size:.7rem;color:var(--gold)">R${weekUnpaid.toFixed(2)} unpaid</div>
          </div>
          <button class="btn btn-success" style="padding:7px 14px;font-size:.8rem" data-a="assign-all-pending" data-cid="${c.id}">💰 Assign All</button>
        </div>`:'<div style="font-size:.72rem;color:var(--success);padding-top:8px;text-align:center">✅ All days assigned this week</div>'}
      </div>

      <!-- PAY SECTION -->
      ${(()=>{
        const owed=c.walletBalance||0;
        const minPayout=c.minPayoutBalance||0;
        const pendingRequest=D.log.find(l=>l.childId===c.id&&l.type==='payout-request'&&l.status==='pending');
        const method=c.preferredPayMethod||'Bank transfer';
        const account=c.bankAccount||'';
        if(!owed&&!pendingRequest)return'';
        return`<div style="background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:10px 12px;margin-bottom:10px">
          <div style="font-size:.72rem;font-weight:800;color:var(--success);margin-bottom:8px">💸 PAY OUT</div>
          <div style="font-size:.8rem;margin-bottom:6px">
            Wallet balance: <strong style="color:${owed>0?'var(--gold)':'var(--muted)'}">R${owed.toFixed(2)}</strong>
            ${account?`<span style="color:var(--muted)"> · ${method}: ${account}</span>`:''}
          </div>
          ${pendingRequest?`<div style="background:rgba(245,158,11,.08);border:1px solid var(--gold)44;border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:.82rem;font-weight:700;color:var(--gold)">
            ⏳ Payout request: R${(pendingRequest.amount||0).toFixed(2)} pending
            <div style="display:flex;gap:7px;margin-top:6px">
              <button class="btn btn-success" style="flex:1;padding:7px;font-size:.8rem" data-a="approve-payout-req" data-lid="${pendingRequest.id}">✓ Pay</button>
              <button class="btn btn-danger" style="flex:1;padding:7px;font-size:.8rem" data-a="reject" data-lid="${pendingRequest.id}">✗ Reject</button>
            </div>
          </div>`:''}
          ${owed>0?`<div style="display:grid;grid-template-columns:90px 1fr auto auto;gap:6px;align-items:end">
            <div>
              <label class="form-label" style="font-size:.65rem">Amount (R)</label>
              <input type="number" class="form-input" id="pay-amount-${c.id}" value="${owed.toFixed(2)}" min="0.50" max="${owed.toFixed(2)}" step="0.5">
            </div>
            <div>
              <label class="form-label" style="font-size:.65rem">Method</label>
              <select class="rate-sel" id="pay-method-${c.id}" style="width:100%">
                <option value="Cash" ${method==='Cash'?'selected':''}>💵 Cash</option>
                <option value="Bank transfer" ${method==='Bank transfer'?'selected':''}>🏦 Bank transfer</option>
              </select>
            </div>
            <button class="btn btn-success" style="padding:9px 12px;white-space:nowrap" data-a="do-pay-owed" data-cid="${c.id}">💸 Pay</button>
            <button class="btn btn-ghost" style="padding:9px 12px;white-space:nowrap;font-size:.8rem" data-a="parent-wallet-to-savings" data-cid="${c.id}" data-amtid="pay-amount-${c.id}">🏦 → Savings</button>
          </div>`:''}
        </div>`;
      })()}

      <!-- BONUS MONEY VISIBILITY -->
      ${(()=>{
        const sp=(c.goals||[]).find(g=>g.isSavingsPocket);
        const spBonus=sp?(sp.bonusMoneySaved||0):0;
        const goalBonus=(c.goals||[]).filter(g=>!g.isSavingsPocket).reduce((s,g)=>s+(g.bonusMoneySaved||0),0);
        const totalBonus=spBonus+goalBonus;
        if(!totalBonus)return'';
        return`<div style="background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 12px;margin-bottom:10px">
          <div style="font-size:.72rem;font-weight:800;color:var(--gold);margin-bottom:4px">🌟 BONUS MONEY SAVED (info only)</div>
          <div style="font-size:.8rem;color:var(--muted)">
            ${c.name} has saved <strong style="color:var(--gold)">R${totalBonus.toFixed(2)}</strong> in bonus money
            ${spBonus>0?`(R${spBonus.toFixed(2)} in Savings Pocket`:''}${goalBonus>0?`${spBonus>0?', ':' ('}R${goalBonus.toFixed(2)} in Goals)`:''}
          </div>
          <div style="font-size:.72rem;color:var(--muted);margin-top:3px">This is outside your monthly budget — child earned it through bonus points</div>
        </div>`;
      })()}

      <!-- GOAL PARENT MATCH EXTRA CONTRIBUTION -->
      ${(c.goals||[]).filter(g=>!g.completedAt&&!g.isSavingsPocket).length?`<div style="border-top:1px solid var(--border);padding-top:10px">
        <div style="font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:7px">🤝 EXTRA GOAL CONTRIBUTION (optional)</div>
        ${(c.goals||[]).filter(g=>!g.completedAt&&!g.isSavingsPocket).map(g=>{
          const rate=c.pointsPerRand||10;
          const total=(g.realMoneySaved||0)+(g.bonusMoneySaved||0)+(g.parentMatched||0);
          const target=g.targetRand||(goalTargetPts(g,c)/rate);
          const pct=target>0?Math.min(100,Math.round(total/target*100)):0;
          return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)22">
            <span style="font-size:1.2rem">${g.emoji}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:.82rem;font-weight:700">${g.name}</div>
              <div style="font-size:.68rem;color:var(--muted)">R${total.toFixed(2)} of R${target.toFixed(2)} · ${pct}%</div>
            </div>
            <div style="display:flex;gap:5px;align-items:center">
              <input type="number" class="form-input" id="gmatch-${c.id}-${g.id}" value="0" min="0" max="100" step="1" style="width:65px;padding:4px;font-size:.8rem;text-align:center">
              <button class="btn btn-ghost" style="padding:5px 8px;font-size:.75rem" data-a="parent-add-goal-match" data-cid="${c.id}" data-gid="${g.id}" data-inputid="gmatch-${c.id}-${g.id}">+ Add</button>
            </div>
          </div>`;
        }).join('')}
      </div>`:''}

      <!-- WELLNESS SUMMARY -->
      ${(()=>{
        const today2=new Date().toDateString();
        const stats=getWellnessPositiveToday(c.id);
        const threshold=c.wellness?.threshold||50;
        const flag=D.log.find(l=>l.childId===c.id&&l.type==='wellness-bonus-flag'&&
          new Date(l.ts).toDateString()===today2);
        if(!c.wellness?.enabled||stats.shown===0)return'';
        const pctColor=stats.pct>=threshold?'var(--success)':stats.pct>=threshold*0.6?'var(--gold)':'var(--muted)';
        return'<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px">'+
          '<div style="display:flex;align-items:center;justify-content:space-between">'+
          '<div style="font-size:.72rem;font-weight:800;color:var(--success)">🌿 WELLNESS TODAY</div>'+
          '<div style="font-size:.82rem;font-weight:800;color:'+pctColor+'">'+stats.pct+'% ('+stats.positive+'/'+stats.shown+')</div>'+
          '</div>'+
          (flag?'<div style="font-size:.76rem;color:var(--success);font-weight:700;margin-top:2px">✅ Wellness goal met — eligible for reward!</div>':'')
          +'</div>';
      })()}
    </div>`;
  }).join('')}`;
}

      ${[0,1,2].map(i=>`<div style="display:inline-block;font-size:1.2rem;margin:0 3px">${i<strikes?'🔴':'⭕'}</div>`).join('')}

let _emailjsLoaded=false;
function loadEmailJS(){
  if(_emailjsLoaded)return Promise.resolve();
  return new Promise(res=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
    s.onload=()=>{_emailjsLoaded=true;res();};
    s.onerror=()=>{console.warn('EmailJS failed to load');res();};
    document.head.appendChild(s);
  });
}

function playChime(){
  if(!D?.settings?.notifChime)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Two-tone chime: pleasant and distinct
    [[523,0],[659,0.15],[784,0.3]].forEach(([freq,delay])=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(0,ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+delay+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.6);
      osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+0.6);
    });
  }catch(e){}
}
function playTimerEnd(){
  if(!D?.settings?.notifChime)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Three descending tones — distinct "done!" sound
    [[784,0,0.4],[659,0.35,0.4],[523,0.7,0.7]].forEach(([freq,delay,dur])=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(0,ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.35,ctx.currentTime+delay+0.04);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
      osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+dur);
    });
  }catch(e){}
}

async function sendEmailNotif(title,body){
  if(!D?.settings?.notifEmail2)return;
  const s=D.settings;
  if(!s.notifEmail||!s.emailjsServiceId||!s.emailjsTemplateId||!s.emailjsPublicKey)return;
  await loadEmailJS();
  if(!window.emailjs)return;
  try{
    emailjs.init({publicKey:s.emailjsPublicKey});
    await emailjs.send(s.emailjsServiceId,s.emailjsTemplateId,{
      to_email:s.notifEmail,
      subject:title,
      message:body,
      app_url:s.appUrl||window.location.href
    });
  }catch(e){console.warn('EmailJS error:',e);}
}

function sendBrowserNotif(title,body){
  if(!D?.settings?.notifBrowser)return;
  if(!('Notification' in window))return;
  const show=()=>{
    try{new Notification(title,{body,icon:'',tag:'screentime-bank'});}catch(e){}
  };
  if(Notification.permission==='granted'){show();}
  else if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted')show();});
  }
}

function notify(title,body){
  playChime();
  sendBrowserNotif(title,body);
  sendEmailNotif(title,body);
}

  const a=el.dataset.a;
  function push(){navStack.push({view,childId});}
  if(a==='go-home'){navStack=[];view='home';childId=null;filterCat='all';editMode={type:null,id:null};pendingBuy=null;pendingNote=null;pendingSessionType=null;pendingGoalSave=null;pendingGoalDelete=null;pendingGoalTransfer=null;pendingDaySummary=null;pendingScoreBreakdown=null;pendingRecWarning=null;pendingSchoolConfirm=null;pendingActivityConfirm=null;emojiPickerTarget=null;pendingSchoolPause=null;pendingActivityPause=null;welcomeDismissed={};render();}

    if(prev){view=prev.view;childId=prev.childId;}
    else{view='home';childId=null;}
    filterCat='all';editMode={type:null,id:null};render();
  }
  else if(a==='go-child'){push();childId=el.dataset.cid||childId;view='child';render();}
  else if(a==='go-log'){
    const c=child(childId||el.dataset.cid);
    if(c?.timer?.sessionType==='school'){toast('📚 Finish your school session before logging activities');return;}
    if(c?.timer?.sessionType==='activity'){toast('⏱ Finish your activity timer before logging activities');return;}
    push();filterCat='all';view='log';render();
  }
  else if(a==='go-buy'){
    const c=child(childId||el.dataset.cid);
    if(c?.timer?.sessionType==='school'){toast('📚 School session is running — finish school first');return;}
    if(c?.timer?.sessionType==='activity'){toast('⏱ Finish your activity timer first');return;}
    push();view='buy';render();
  }
  else if(a==='open-activity-timer'){
    const cid=el.dataset.cid||childId;
    const c=child(cid);
    if(c?.timer?.sessionType==='school'){toast('📚 Finish your school session before starting an activity timer');return;}
    if(c?.timer?.sessionType==='activity'){toast('⏱ An activity timer is already running');return;}
    pendingActivityTimer={cid};render();
  }
  else if(a==='log-act'){
    const aid=el.dataset.aid;
    const act=D.activities.find(x=>x.id===aid);
    if(!act)return;
    const c=child(childId);
    // If activity has a timer and no timer is currently running, prompt to start timer

      // Show choice: start timer or just log
      pendingNote={aid,childId,timerChoice:true};render();return;
    }
    if(act?.approval){pendingNote={aid,childId};render();}
    else logActivity(childId,aid,'');

  else if(a==='go-leaderboard'){push();view='leaderboard';render();}
  else if(a==='go-pin'){push();pinBuf='';view='pin';render();}
  else if(a==='go-wallet'){
    const cid=el.dataset.cid||childId;

    const before=(D.dailyReports||[]).length;
    D.dailyReports=(D.dailyReports||[]).filter(r=>r.childId!==cid);
    // Also deduct assigned amounts from wallet
    const assigned_total=D.log.filter(l=>l.childId===cid&&l.type==='pocket-money'&&
      l.actName&&l.actName.includes('Daily allowance')).reduce((s,l)=>s+(l.amount||0),0);
    save();toast('📅 Stewardship Bank cleared for '+c?.name+' — '+( before-(D.dailyReports||[]).length)+' entries removed');render();
  }
  else if(a==='reset-wellness-today'){
    const cid=el.dataset.cid;
    const c=child(cid);
    const today=new Date().toDateString();
    const before=D.log.length;
    D.log=D.log.filter(l=>!(l.childId===cid&&
      ['wellness-check','wellness-welcome','wellness-bonus-flag'].includes(l.type)&&
      new Date(l.ts).toDateString()===today));
    const cleared=before-D.log.length;
    save();toast('🌿 Cleared '+cleared+' wellness entries for '+c?.name+' today — triggers will fire fresh');render();
  }
  else if(a==='reset-child'){
    if(!confirm(`Reset ${child(el.dataset.cid)?.name}? This clears all their points, timer and history.`))return;
    resetChild(el.dataset.cid);
  }
  else if(a==='reset-all'){
    if(!confirm('Reset ALL children? This clears all points, timers and history for everyone.'))return;
    resetAll();
  }
  else if(a==='pin'){
    if(pinBuf.length>=4)return;
    pinBuf+=el.dataset.d;
    if(pinBuf.length===4){
      if(pinBuf===D.settings.pin){view='parent';parentTab='approvals';}
      else{pinBuf='';toast('❌ Wrong PIN');}
    }
    render();
  }
  else if(a==='pin-del'){pinBuf=pinBuf.slice(0,-1);render();}
  else if(a==='ptab'){parentTab=el.dataset.tab;editMode={type:null,id:null};render();}
  else if(a==='approve'){approve(el.dataset.lid);}
  else if(a==='reject'){reject(el.dataset.lid);}
  else if(a==='approve-all'){
    const pend=allPending();
    pend.forEach(p=>{
      const c=child(p.childId);p.status='approved';
      if(isBonus(p)){c.bonusPts=(c.bonusPts||0)+p.points;}
      else{c.points+=(p.points||0);if(p.bonusPoints)c.bonusPts=(c.bonusPts||0)+p.bonusPoints;tryAwardDailyBalanceBonus(p.childId);}
    });
    save();toast(`✅ Approved all ${pend.length} activities!`);render();
  }
  else if(a==='approve-all-child'){
    const cid=el.dataset.cid;
    const pend=allPending().filter(p=>p.childId===cid);
    const c=child(cid);let bonusTotal=0,ptsTotal=0;
    pend.forEach(p=>{
      p.status='approved';
      if(isBonus(p)){c.bonusPts=(c.bonusPts||0)+p.points;bonusTotal+=p.points;}
      else{c.points+=(p.points||0);ptsTotal+=p.points||0;if(p.bonusPoints){c.bonusPts=(c.bonusPts||0)+p.bonusPoints;bonusTotal+=p.bonusPoints;}}
    });
    tryAwardDailyBalanceBonus(cid);
    save();toast(`✅ Approved all for ${c.name}${ptsTotal?` +${ptsTotal}pts`:''}${bonusTotal?` +${bonusTotal}🌟`:''}`);render();
  }
  else if(a==='setadj-type'){adjVals[el.dataset.cid+'_type']=el.dataset.val;render();}
  else if(a==='addpts'){
    const cid=el.dataset.cid;
    const pts=parseInt(document.querySelector(`[data-a="setadj"][data-cid="${cid}"]`)?.value)||10;
    const type=adjVals[cid+'_type']||'regular';
    adjust(cid,pts,type);
  }
  else if(a==='subpts'){
    const cid=el.dataset.cid;
    const pts=parseInt(document.querySelector(`[data-a="setadj"][data-cid="${cid}"]`)?.value)||10;
    adjust(cid,-pts,'regular');
  }
  // Activity CRUD
  else if(a==='add-act'){tempSubActivities=[];editMode={type:'activity',id:null,draft:null};render();}
  else if(a==='edit-act'){
    const act=D.activities.find(x=>x.id===el.dataset.aid);
    tempSubActivities=act?[...(act.subActivities||[])]:[];
    editMode={type:'activity',id:el.dataset.aid};render();
  }
  else if(a==='del-act'){
    if(!confirm('Delete this activity?'))return;
    D.activities=D.activities.filter(x=>x.id!==el.dataset.aid);
    D.children.forEach(c=>{c.requirements=c.requirements.filter(r=>r!==el.dataset.aid);});
    save();toast('Deleted');render();
  }
  else if(a==='save-act'){
    const name=document.getElementById('aname')?.value?.trim();
    const emoji=document.getElementById('aemoji')?.value?.trim()||'⭐';
    const pts=parseInt(document.getElementById('apts')?.value)||0;
    const bonusPoints=parseInt(document.getElementById('abonuspts')?.value)||0;
    const minMins=parseInt(document.getElementById('aminmins')?.value)||0;
    const bonusIntervalMins=parseInt(document.getElementById('abonusinterval')?.value)||10;
    const cat=document.getElementById('acat')?.value||'cat-general';
    const approval=document.getElementById('aapproval')?.checked!==false;
    if(!name){toast('Please enter a name');return;}
    if(editMode.id){
      // For existing: subActivities already updated live by add/del handlers
      Object.assign(D.activities.find(x=>x.id===editMode.id),{name,emoji,points:pts,bonusPoints,minMins,bonusIntervalMins,cat,approval});
    } else {
      // For new: use tempSubActivities buffer
      D.activities.push({id:uid(),name,emoji,points:pts,bonusPoints,minMins,bonusIntervalMins,cat,approval,subActivities:[...tempSubActivities]});
    }
    tempSubActivities=[];
    editMode={type:null,id:null,draft:null};save();toast('Saved ✅');render();
  }
  else if(a==='cancel-edit'){tempSubActivities=[];editMode={type:null,id:null,draft:null};render();}
  else if(a==='add-sub-act'){
    const val=document.getElementById('new-sub-act')?.value?.trim();
    if(!val){toast('Enter a chip name');return;}
    if(editMode.id){
      const act=D.activities.find(x=>x.id===editMode.id);
      if(act){if(!act.subActivities)act.subActivities=[];act.subActivities.push(val);}
    } else {
      tempSubActivities.push(val);
    }
    document.getElementById('new-sub-act').value='';
    render();
  }
  else if(a==='del-sub-act'){
    const idx=parseInt(el.dataset.idx);
    if(editMode.id){
      const act=D.activities.find(x=>x.id===editMode.id);
      if(act)act.subActivities.splice(idx,1);
    } else {
      tempSubActivities.splice(idx,1);
    }
    render();
  }
  // Category CRUD
  else if(a==='add-holiday-block'){
    editMode={type:'holiday-block',id:el.dataset.cid,draft:null};render();
  }
  else if(a==='save-holiday-block'){
    const cid=el.dataset.cid;const c=child(cid);
    const name=document.getElementById('holiday-name-'+cid)?.value?.trim()||'Holiday';
    const start=document.getElementById('holiday-start-'+cid)?.value;
    const end=document.getElementById('holiday-end-'+cid)?.value;
    if(!start||!end||start>end){toast('Please set valid dates');return;}
    if(!c.holidayBlocks)c.holidayBlocks=[];
    c.holidayBlocks.push({name,start,end,active:true,createdAt:new Date().toISOString()});
    editMode={type:null,id:null,draft:null};
    save();toast('🏖️ Holiday block added for '+c.name+'!');render();
  }
  else if(a==='del-holiday-block'){
    const c=child(el.dataset.cid);const idx=parseInt(el.dataset.idx);
    if(!c.holidayBlocks)return;
    c.holidayBlocks.splice(idx,1);
    save();render();
  }
  else if(a==='kids-switch-child'){
    activeKidsChild=el.dataset.cid;
    render();
  }
  else if(a==='add-cat'){editMode={type:'category',id:null,draft:null};render();}
  else if(a==='edit-cat'){editMode={type:'category',id:el.dataset.cid,draft:null};render();}
  else if(a==='del-cat'){
    if(!confirm('Delete category? Activities in it will move to General.'))return;
    D.activities.forEach(a=>{if(a.cat===el.dataset.cid)a.cat='cat-general';});
    D.categories=D.categories.filter(x=>x.id!==el.dataset.cid);
    save();toast('Category deleted');render();
  }
  else if(a==='save-cat'){
    const name=document.getElementById('catname')?.value?.trim();
    const emoji=document.getElementById('catemoji')?.value?.trim()||'📌';
    if(!name){toast('Please enter a name');return;}
    if(editMode.id)Object.assign(D.categories.find(x=>x.id===editMode.id),{name,emoji});
    else D.categories.push({id:'cat-'+uid(),name,emoji});
    editMode={type:null,id:null};save();toast('Saved ✅');render();
  }
  // Time blocks CRUD
  else if(a==='add-tb'){editMode={type:'timeblock',id:null};render();}
  else if(a==='edit-tb'){editMode={type:'timeblock',id:el.dataset.bid};render();}
  else if(a==='del-tb'){
    if(!confirm('Delete this time block?'))return;
    D.timeBlocks=D.timeBlocks.filter(x=>x.id!==el.dataset.bid);
    save();toast('Deleted');render();
  }
  else if(a==='save-tb'){
    const name=document.getElementById('tbname')?.value?.trim();
    const emoji=document.getElementById('tbemoji')?.value?.trim()||'⏱️';
    const pts=parseInt(document.getElementById('tbpts')?.value)||10;
    const mins=parseInt(document.getElementById('tbmins')?.value)||60;
    if(!name){toast('Please enter a name');return;}
    if(editMode.id)Object.assign(D.timeBlocks.find(x=>x.id===editMode.id),{name,emoji,points:pts,minutes:mins});
    else D.timeBlocks.push({id:uid(),name,emoji,points:pts,minutes:mins});
    editMode={type:null,id:null};save();toast('Saved ✅');render();
  }
  // Settings
  else if(a==='bal-inc'||a==='bal-dec'){
    const c=child(el.dataset.cid);if(!c)return;
    if(!c.dailyBalance)c.dailyBalance={};
    const cat=el.dataset.cat;
    const cur=c.dailyBalance[cat]||0;
    if(a==='bal-inc')c.dailyBalance[cat]=cur+1;
    else c.dailyBalance[cat]=Math.max(0,cur-1);
    if(c.dailyBalance[cat]===0)delete c.dailyBalance[cat];
    save();render();
  }
  else if(a==='set-min-payout-days'){
    const c=child(el.dataset.cid);if(!c)return;
    c.minPayoutDays=parseInt(el.dataset.val)||4;
    save();toast(`Min active days set to ${c.minPayoutDays} for ${c.name}`);render();
  }
  else if(a==='set-school-min'){
    D.settings.schoolMinMins=parseInt(el.dataset.val)||15;
    save();toast(`Min school session set to ${D.settings.schoolMinMins} min`);render();
  }
  else if(a==='save-notif-settings'){
    D.settings.notifEmail=document.getElementById('notif-email')?.value?.trim()||'';
    D.settings.emailjsServiceId=document.getElementById('emailjs-service')?.value?.trim()||'';
    D.settings.emailjsTemplateId=document.getElementById('emailjs-template')?.value?.trim()||'';
    D.settings.emailjsPublicKey=document.getElementById('emailjs-key')?.value?.trim()||'';
    D.settings.appUrl=window.location.href;
    save();toast('🔔 Notification settings saved!');render();
  }
  else if(a==='test-notif'){
    notify('🔔 ScreenTime Bank Test','Notifications are working! You will be alerted when children send requests.');
    toast('Test notification sent!');
  }
  else if(a==='save-pin'){
    const np=document.getElementById('newpin')?.value;
    if(!np||!/^\d{4}$/.test(np)){toast('PIN must be exactly 4 digits');return;}
    D.settings.pin=np;save();toast('PIN updated 🔐');document.getElementById('newpin').value='';
  }
  else if(a==='weekly-reset'){
    let n=0;
    D.children.forEach(c=>{
      if(c.rollover==='weekly'){c.points=0;n++;}
      else if(c.rollover==='capped'){c.points=Math.min(c.points,50);n++;}
    });
    save();toast(`Weekly reset done for ${n} child${n!==1?'ren':''} ✅`);render();
  }
});

});

document.addEventListener('change',e=>{
  const el=e.target;const a=el.dataset.a;
  if(a==='ename'){const c=child(el.dataset.cid);if(c&&el.value.trim()){c.name=el.value.trim();save();}}
  else if(a==='eage'){const c=child(el.dataset.cid);if(c&&el.value){c.age=parseInt(el.value);save();}}
  else if(a==='rollover'){const c=child(el.dataset.cid);if(c){c.rollover=el.value;save();toast('Rollover updated');}}
  else if(a==='setadj'){adjVals[el.dataset.cid]=parseInt(el.value)||10;}
  else if(a==='toggle-req'){
    const c=child(el.dataset.cid);if(!c)return;
    if(!c.requirements)c.requirements=[];
    if(el.checked){if(!c.requirements.includes(el.dataset.aid))c.requirements.push(el.dataset.aid);}
    else c.requirements=c.requirements.filter(r=>r!==el.dataset.aid);
    save();toast(el.checked?'Requirement added':'Requirement removed');
  }
  else if(a==='toggle-pin'){
    const c=child(el.dataset.cid);if(!c)return;

    else c.pinnedActivities=c.pinnedActivities.filter(x=>x!==el.dataset.aid);

  else if(a==='points-per-rand'){

  else if(a==='school-point-amt'){
    D.settings.schoolPointAmt=parseInt(el.value)||2;save();toast('School point amount updated');render();
  }
});

  s2.src='https://accounts.google.com/gsi/client';
  s2.onload=()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:resp=>{
      if(resp.error){syncStatus='error';if(!D){D=migrateData(loadLocal()||clone(DEFAULT_DATA));}view='home';render();return;}
      loadFromDrive();
    }});
    gisReady=true;if(gapiReady&&gisReady)maybeConnect();
  };
  s2.onerror=()=>{D=migrateData(loadLocal()||clone(DEFAULT_DATA));view='home';syncStatus='offline';checkDailyReset();render();startTick();};
  document.head.appendChild(s2);
  setTimeout(()=>{if(view==='loading'){D=migrateData(loadLocal()||clone(DEFAULT_DATA));view='home';syncStatus='offline';checkDailyReset();render();startTick();}},5000);
});
</script>
</body>
